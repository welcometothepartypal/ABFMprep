<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2024 ITE Quiz - Questions 21-30</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        const ChevronLeft = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" /></svg>;
        const ChevronRight = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" /></svg>;
        const CheckCircle = () => <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd" /></svg>;
        const XCircle = () => <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clipRule="evenodd" /></svg>;
        const BookOpen = () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>;
        const RotateCcw = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>;
        const Trophy = () => <svg className="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z" /></svg>;

        const questionsData = [
  {
    "id": 21,
    "question": "Which one of the following is associated with at least 6 months of exclusive breastfeeding in infants?",
    "options": [
      "A) Higher incidence of infant peanut allergy",
      "B) Higher infant HDL-cholesterol levels",
      "C) Lower risk for infant atopic dermatitis",
      "D) Lower maternal incidence of endometrial cancer",
      "E) Lower maternal incidence of hypothyroidism"
    ],
    "correctAnswer": 2,
    "rationale": "Exclusively breastfeeding infants for at least 6 months confers multiple health benefits \nto both the mother and the infant. Breastfeeding persons have decreased risks for \nbreast and ovarian cancers, postpartum depression, hypertension, cardiovascular \ndisease, and type 2 diabetes. Breastfed infants have decreased risks for atopic \ndermatitis and gastroenteritis. Other potential infant benefits, based on observational \nstudies, include lower risks for childhood leukemia, hypertension, obesity, otitis media, \nsudden infant death syndrome, and type 1 and 2 diabetes."
  },
  {
    "id": 22,
    "question": "A 30-year-old male comes to your office because of a nonpainful lump in his genitalia that has been \npresent for a few years. He shares that he and his partner have been trying to conceive for 2 years. On \nexamination you note a nontender “bag of worms” mass in the left scrotum. \n \nThis patient’s condition is concerning for which one of the following reasons?",
    "options": [
      "A) It may become painful",
      "B) It may be contributing to his infertility",
      "C) It is associated with a higher risk for testicular cancer",
      "D) It is indicative of an inguinal hernia",
      "E) It requires treatment with antibiotics"
    ],
    "correctAnswer": 1,
    "rationale": "Varicoceles appear and feel like a “bag of worms” on palpation and are usually located \nin the left scrotum. This condition is benign and does not require treatment. However, \nvaricoceles can cause low sperm count and contribute to infertility. The differential \ndiagnosis of scrotal mass includes varicocele, testicular cancer, epididymitis, inguinal \nhernia, hydrocele, and epidermoid cyst."
  },
  {
    "id": 23,
    "question": "A previously healthy 38-year-old female presents with an acute onset of near-syncope and shortness \nof breath. An examination reveals a BMI of 34 kg/m2, a temperature of 36.9 °C (98.4 °F), an oxygen \nsaturation of 92% on room air, a respiratory rate of 24/min, a heart rate of 105 beats/min, and a blood \npressure of 118/70 mm Hg. She has some tenderness and swelling of her left lower leg. \n \nWhich one of the following is the most appropriate next step in diagnosis?",
    "options": [
      "A) An arterial blood gas measurement",
      "B) A D-dimer level",
      "C) Echocardiography",
      "D) CT angiography of the chest",
      "E) A ventilation-perfusion (V/Q) scan"
    ],
    "correctAnswer": 3,
    "rationale": "This patient’s case is highly concerning for acute pulmonary embolism. She has a high \n(>50%) pretest probability of a pulmonary embolus based on both the Wells criteria \nand Geneva score. Patients with a high pretest probability of pulmonary embolism \nshould have CT angiography (CTA) as the initial test, while patients with a low to \nintermediate risk should start with a D-dimer level. An arterial blood gas measurement \nmay be helpful but is less likely to yield the specific diagnosis. Echocardiography may be \npart of the evaluation of pulmonary embolus if there are signs of heart strain, but it is \nnot the most appropriate next step. A ventilation-perfusion (V/Q) scan is less sensitive \nand specific than CTA and takes longer to perform, but it would be indicated if CTA is \ncontraindicated or not available."
  },
  {
    "id": 24,
    "question": "A 64-year-old male with obesity sees you for follow-up. He started semaglutide (Wegovy) 6 months \nago and has lost 6% of his starting weight. He has a 1-month history of worsening dizziness upon \nstanding. In addition to semaglutide, his current medications include atorvastatin (Lipitor), \nescitalopram (Lexapro), and lisinopril (Zestril). \n \nYou note a fine tremor in his hand when he holds up his phone to show you his home blood pressure \nreadings. On examination his blood pressure while sitting is 112/64 mm Hg. Three minutes after \nstanding, his systolic blood pressure drops by 25 mm Hg and his pulse rate increases by 15 beats/min. \nA CBC is normal and an EKG shows sinus rhythm. \n \nWhich one of the following would be the most appropriate next step?",
    "options": [
      "A) Discontinuing escitalopram",
      "B) Discontinuing lisinopril",
      "C) Discontinuing semaglutide",
      "D) Adding carbidopa/levodopa (Sinemet)",
      "E) Adding midodrine"
    ],
    "correctAnswer": 1,
    "rationale": "A >20 mm Hg decrease in systolic blood pressure 3 minutes after moving from supine \nto standing indicates orthostatic hypotension, whereas an increase in pulse rate >0.5 \nbpm/mm Hg is consistent with a nonneurogenic cause. This patient has lost a \nconsiderable amount of weight and anti-obesity medications are a common etiology of \nhypotension in this setting. When this occurs, treatments for other comorbidities may \nneed to be adjusted. While midodrine is appropriate to alleviate the symptoms of \northostatic hypotension if no other causes can be found, discontinuing this patient’s \nantihypertensive is a more appropriate first step. Escitalopram is not a common cause \nof orthostatic hypotension. The patient is tolerating semaglutide and losing an \nappropriate amount of weight, so discontinuing it is not an appropriate step. GLP-1 \nreceptor agonists can rarely cause a slight increase in heart rate, but not to the degree \nseen here. This patient’s intention tremor is not consistent with Parkinson disease, and \nbeginning carbidopa/levodopa is not appropriate."
  },
  {
    "id": 25,
    "question": "A 69-year-old female comes to your office for a routine health maintenance visit. She drinks 1 glass \nof wine every night with dinner, walks 30 minutes per day, and does not smoke. Her medical history \nis significant for knee osteoarthritis. She has never had surgery and does not take any medications \nexcept as-needed ibuprofen. \n \nOn examination she has a BMI of 28 kg/m\n2, a blood pressure of 112/78 mm Hg, and a heart rate of \n82 beats/min. Other than bilateral knee crepitus, the physical examination findings are unremarkable. \nLaboratory findings include: \nTotal cholesterol 165 mg/dL \nHDL-cholesterol 32 mg/dL \nLDL-cholesterol 109 mg/dL \nTriglycerides 120 mg/dL \nHemoglobin A1c 7.5% \nHer calculated 10-year risk of cardiovascular disease is 13.2%. \n \nIn addition to appropriately treating her diabetes mellitus, which one of the following is \nrecommended by the U.S. Preventive Services Task Force regarding statin use in this patient?",
    "options": [
      "A) No statin at this time",
      "B) A low-intensity statin",
      "C) A moderate-intensity statin",
      "D) A high-intensity statin"
    ],
    "correctAnswer": 2,
    "rationale": "According to the U.S. Preventive Services Task Force, statin therapy with a moderate-\nintensity dosage is recommended for primary prevention of cardiovascular disease \n(CVD) in adults 40–75 years of age with a CVD risk of ≥10% with 1 or more CVD risk \nfactors such as diabetes mellitus, hypertension, dyslipidemia, or smoking tobacco (B \nrecommendation). Not initiating statin therapy increases the cardiovascular risk for this \npatient with identified CVD risk factors. Initiating low-intensity statin therapy is not \nsufficient. This patient does not have any additional risk factors that would require a \nhigh-intensity statin and her calculated 10-year risk of CVD is <20%."
  },
  {
    "id": 26,
    "question": "A 53-year-old female sees you for follow-up of an emergency department (ED) visit for abdominal \npain. CT of the abdomen in the ED did not identify the cause of her pain but did reveal a 3-cm \nhomogeneous right adrenal mass. Her abdominal pain has since resolved. \n \nHer medical history includes stage 2 hypertension, prediabetes, menopause, and moderate obesity \nwith a BMI of 35 kg/m2. She does not have any history of malignancy and is up to date on \nmammography and colon cancer screenings. \n \nAccording to the American College of Radiology and the American Association of Clinical \nEndocrinology, which one of the following would be the most appropriate next step regarding this \npatient’s adrenal mass?",
    "options": [
      "A) Reassurance and no further evaluation unless symptoms develop",
      "B) Repeating CT with adrenal protocol in 1 year",
      "C) Ordering a 1-g dexamethasone suppression test and, if normal, repeating CT imaging in 6 months",
      "D) Ordering urine metanephrines and, if normal, recommending CT-guided biopsy",
      "E) Ordering adrenal MRI and biochemical testing for evidence of adrenal hyperfunctioning"
    ],
    "correctAnswer": 4,
    "rationale": "As the number of cross-sectional imaging studies has increased, so have incidental \nfindings. This often creates a dilemma for primary care physicians as they guide their \npatients toward the most appropriate follow-up of these findings. Adrenal gland \nincidentalomas are particularly common and concerning as even benign lesions may \nhave hormonal activity. The most current recommendations from the American \nAssociation of Clinical Endocrinology and the American College of Radiology suggest \nthat all patients with masses >1 cm should be tested for autonomous cortisol secretion \nand that patients without a history of malignancy who have lesions >2 cm and <4 cm \non initial imaging should have adrenal-specific imaging via either CT or MRI. This \npatient’s history of hypertension, obesity, and prediabetes would also result in a \nrecommendation for testing to rule out hyperaldosteronism.  \nReassurance or repeating the study in 1 year would not be appropriate for this \nparticular lesion. Biochemical studies for pheochromocytoma are unnecessary in this \npatient unless there is clinical suspicion or the dedicated study demonstrates \ncharacteristics that make the condition likely. Biopsy of the gland would be appropriate \nonly if suspicious characteristics were identified on adrenal-specific imaging and would \ngenerally be done as a surgical procedure, not a needle biopsy."
  },
  {
    "id": 27,
    "question": "A 30-year-old soccer player presents with a hyperextension injury of his right wrist after falling and \nlanding on his outstretched hand. On examination the wrist is swollen and tender over the anatomic \nsnuffbox. A plain radiograph shows soft tissue swelling. \n \nIn addition to ice and elevation, which one of the following is the most appropriate initial treatment?",
    "options": [
      "A) Gutter splint",
      "B) Thumb spica splint",
      "C) Volar splint",
      "D) Short arm cast",
      "E) Long arm cast"
    ],
    "correctAnswer": 1,
    "rationale": "The patient should be presumed to have a scaphoid fracture and treated with a thumb \nspica splint for up to 8 weeks. An initial plain radiograph may be normal in up to 20% \nof scaphoid fractures. Radiography can be repeated in 2 weeks if the wrist remains \ntender. A gutter splint, volar splint, short arm cast, and long arm cast would not be \nappropriate for treatment of a scaphoid fracture."
  },
  {
    "id": 28,
    "question": "A 33-year-old gravida 1 para 1 presents to your office requesting contraceptive management. She \nrecently experienced an acute stroke due to a hypertensive emergency. She is not interested in \npermanent sterilization at this time and asks your advice regarding the most appropriate contraception \ngiven her medical history. \n \nWhich one of the following contraceptive options would be safest for this patient?",
    "options": [
      "A) A combined oral contraceptive",
      "B) A progestin-only oral contraceptive",
      "C) Depot medroxyprogesterone acetate (Depo-Provera CI)",
      "D) A copper IUD (Paragard)",
      "E) A levonorgestrel IUD (Mirena)"
    ],
    "correctAnswer": 3,
    "rationale": "The 2016 U.S Medical Eligibility Criteria for Contraceptive Use was developed to assist \nproviders in determining the safest forms of contraception for patients with certain \nhealth conditions and characteristics, and was updated in 2020 to address \ncontraception use for women at high risk for HIV. In this case, a woman in her 30s \ndesires reversible contraception following an acute stroke in the setting of hypertension. \nFor a person with a history of stroke, combined hormonal contraception carries \nunacceptable health risks and should not be used. Use of a progestin-containing pill, \ninjection, or subdermal implant carries risks that usually outweigh the benefits. Use of a \nlevonorgestrel IUD carries risks, but the benefit outweighs the risk. However, only a \ncopper IUD has no restriction on use and is considered the safest contraceptive option."
  },
  {
    "id": 29,
    "question": "A 60-year-old female presents to your office with a 5-day history of pain inside her mouth. She has a \nmedical history of hypertension, dyslipidemia, asthma, and hypothyroidism. A physical examination \nreveals several patches of white plaques in her mouth. You scrape the plaques off with a tongue \ndepressor and find inflamed, erythematous tissue under them. \n \nWhich one of the following medications, if included in this patient’s regimen, may have contributed \nto the development of this condition?",
    "options": [
      "A) Atorvastatin (Lipitor)",
      "B) Beclomethasone dipropionate (Qvar RediHaler)",
      "C) Ipratropium bromide (Atrovent)",
      "D) Isosorbide mononitrate",
      "E) Losartan/hydrochlorothiazide (Hyzaar)"
    ],
    "correctAnswer": 1,
    "rationale": "This patient has oral candidiasis and requires treatment with an antifungal. Medications \nassociated with this diagnosis include antibiotics and inhaled corticosteroids. Additional \nrisk factors include immunocompromise, diabetes mellitus, malnourishment, and use of \ndentures. If the lesions do not resolve with 2–3 weeks of treatment, a biopsy should be \nperformed to rule out precancerous or cancerous findings."
  },
  {
    "id": 30,
    "question": "A 65-year-old male presents to the emergency department with a large amount of painful \nhematochezia over the last 24 hours. His medical history is significant for chronic, generalized \nosteoarthritis, for which he takes the maximum daily dosage of ibuprofen. \n \nThe patient is noticeably pale. On examination he has a blood pressure of 80/40 mm Hg and a pulse \nrate that is 135 beats/min and regular. An abdominal examination is remarkable for diffuse \ntenderness over the umbilical area. Bowel sounds are hyperactive. There is no significant abdominal \ndistention. \n \nAggressive fluid resuscitation and transfusions are initiated. The gastroenterologist thinks that it is \nunsafe to proceed with endoscopy, given the patient's current medical instability. \n \nWhich one of the following would be most appropriate to perform instead of endoscopy?",
    "options": [
      "A) Radiography of the abdomen",
      "B) Ultrasonography of the abdomen",
      "C) CT angiography of the abdomen and pelvis",
      "D) Technetium Tc 99m–labeled red blood cell scintigraphy",
      "E) Laparoscopy"
    ],
    "correctAnswer": 2,
    "rationale": "Colonoscopy is the gold standard for isolating the source of gastrointestinal bleeding. \nHowever, this patient is too unstable to tolerate the risk of colonoscopy. The most \nappropriate option is CT angiography of the abdomen and pelvis to determine the \nsource of bleeding.  \n \nBoth radiography and ultrasonography of the abdomen would be nonspecific and \nnondiagnostic. Compared to CT angiography, technetium Tc 99m–labeled red blood cell \nscintigraphy is less preferred to isolate the source of bleeding. Laparoscopy would be \ntoo invasive and risky in this patient, and would likely not isolate the source of bleeding."
  }
];

        function ITEQuizApp() {
          const [currentQuestion, setCurrentQuestion] = useState(0);
          const [selectedAnswer, setSelectedAnswer] = useState(null);
          const [showRationale, setShowRationale] = useState(false);
          const [score, setScore] = useState(0);
          const [answeredQuestions, setAnsweredQuestions] = useState([]);
          const [quizComplete, setQuizComplete] = useState(false);

          const question = questionsData[currentQuestion];

          const handleAnswerSelect = (index) => {
            if (!showRationale) {
              setSelectedAnswer(index);
            }
          };

          const handleSubmit = () => {
            if (selectedAnswer !== null && !showRationale) {
              setShowRationale(true);
              const isCorrect = selectedAnswer === question.correctAnswer;
              
              if (isCorrect) {
                setScore(score + 1);
              }
              
              setAnsweredQuestions([...answeredQuestions, {
                questionId: question.id,
                correct: isCorrect
              }]);
            }
          };

          const handleNext = () => {
            if (currentQuestion < questionsData.length - 1) {
              setCurrentQuestion(currentQuestion + 1);
              setSelectedAnswer(null);
              setShowRationale(false);
            } else {
              setQuizComplete(true);
            }
          };

          const handlePrevious = () => {
            if (currentQuestion > 0) {
              setCurrentQuestion(currentQuestion - 1);
              setSelectedAnswer(null);
              setShowRationale(false);
            }
          };

          const handleRestart = () => {
            setCurrentQuestion(0);
            setSelectedAnswer(null);
            setShowRationale(false);
            setScore(0);
            setAnsweredQuestions([]);
            setQuizComplete(false);
          };

          const getOptionClass = (index) => {
            let baseClass = "p-4 mb-3 rounded-lg border-2 cursor-pointer transition-all ";
            
            if (!showRationale) {
              if (selectedAnswer === index) {
                return baseClass + "border-blue-500 bg-blue-50";
              }
              return baseClass + "border-gray-300 hover:border-blue-300 hover:bg-gray-50";
            } else {
              if (index === question.correctAnswer) {
                return baseClass + "border-green-500 bg-green-50";
              }
              if (selectedAnswer === index && index !== question.correctAnswer) {
                return baseClass + "border-red-500 bg-red-50";
              }
              return baseClass + "border-gray-300 bg-gray-50";
            }
          };

          if (quizComplete) {
            const percentage = Math.round((score / questionsData.length) * 100);
            
            return (
              <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
                <div className="max-w-2xl mx-auto">
                  <div className="bg-white rounded-xl shadow-lg p-8 text-center">
                    <div className="flex justify-center mb-4"><Trophy /></div>
                    <h1 className="text-3xl font-bold mb-4 text-gray-800">Quiz Complete!</h1>
                    <div className="mb-6">
                      <p className="text-6xl font-bold text-indigo-600 mb-2">{percentage}%</p>
                      <p className="text-xl text-gray-600">
                        You scored {score} out of {questionsData.length}
                      </p>
                    </div>
                    
                    <div className="mb-6 p-4 bg-gray-50 rounded-lg">
                      <h3 className="font-semibold mb-3 text-gray-700">Results Summary:</h3>
                      <div className="space-y-2">
                        {answeredQuestions.map((answer, idx) => (
                          <div key={idx} className="flex items-center justify-between">
                            <span className="text-gray-600">Question {answer.questionId}</span>
                            <div className="flex items-center">
                              {answer.correct ? <CheckCircle /> : <XCircle />}
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                    
                    <button
                      onClick={handleRestart}
                      className="bg-indigo-600 text-white px-8 py-3 rounded-lg hover:bg-indigo-700 transition-colors inline-flex items-center gap-2"
                    >
                      <RotateCcw />
                      Start Over
                    </button>
                  </div>
                </div>
              </div>
            );
          }

          return (
            <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
              <div className="max-w-4xl mx-auto">
                <div className="bg-white rounded-xl shadow-lg p-6 mb-6">
                  <div className="flex items-center justify-between mb-4">
                    <h1 className="text-2xl font-bold text-gray-800 flex items-center gap-2">
                      <BookOpen />
                      2024 ITE Quiz (Questions 21-30)
                    </h1>
                    <div className="text-right">
                      <p className="text-sm text-gray-600">Score</p>
                      <p className="text-2xl font-bold text-indigo-600">{score}/{answeredQuestions.length}</p>
                    </div>
                  </div>
                  
                  <div className="flex items-center gap-2 mb-2">
                    <div className="flex-1 bg-gray-200 rounded-full h-2">
                      <div 
                        className="bg-indigo-600 h-2 rounded-full transition-all duration-300"
                        style={{ width: `${((currentQuestion + 1) / questionsData.length) * 100}%` }}
                      />
                    </div>
                    <span className="text-sm text-gray-600 whitespace-nowrap">
                      {currentQuestion + 1} / {questionsData.length}
                    </span>
                  </div>
                </div>

                <div className="bg-white rounded-xl shadow-lg p-6 mb-6">
                  <div className="mb-6">
                    <p className="text-sm text-gray-500 mb-2">Question {question.id}</p>
                    <p className="text-lg text-gray-800 leading-relaxed">{question.question}</p>
                    {question.image && (
                      <div className="mt-4">
                        <img src={question.image} alt={`Question ${question.id} figure`} className="max-w-full rounded-lg border" />
                      </div>
                    )}
                  </div>

                  <div className="space-y-3 mb-6">
                    {question.options.map((option, index) => (
                      <div
                        key={index}
                        onClick={() => handleAnswerSelect(index)}
                        className={getOptionClass(index)}
                      >
                        <div className="flex items-start gap-3">
                          <span className="text-gray-700 flex-1">{option}</span>
                          {showRationale && index === question.correctAnswer && (
                            <div className="flex-shrink-0 mt-1"><CheckCircle /></div>
                          )}
                          {showRationale && selectedAnswer === index && index !== question.correctAnswer && (
                            <div className="flex-shrink-0 mt-1"><XCircle /></div>
                          )}
                        </div>
                      </div>
                    ))}
                  </div>

                  {showRationale && (
                    <div className="bg-blue-50 border-l-4 border-blue-500 p-4 mb-6">
                      <h3 className="font-semibold text-blue-900 mb-2">Explanation:</h3>
                      <p className="text-blue-800 leading-relaxed">{question.rationale}</p>
                    </div>
                  )}

                  <div className="flex gap-3">
                    <button
                      onClick={handlePrevious}
                      disabled={currentQuestion === 0}
                      className="px-4 py-2 rounded-lg border-2 border-gray-300 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition-colors flex items-center gap-2"
                    >
                      <ChevronLeft />
                      Previous
                    </button>
                    
                    {!showRationale ? (
                      <button
                        onClick={handleSubmit}
                        disabled={selectedAnswer === null}
                        className="flex-1 bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                      >
                        Submit Answer
                      </button>
                    ) : (
                      <button
                        onClick={handleNext}
                        className="flex-1 bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 transition-colors flex items-center justify-center gap-2"
                      >
                        {currentQuestion < questionsData.length - 1 ? (
                          <>
                            Next Question
                            <ChevronRight />
                          </>
                        ) : (
                          <>
                            Finish Quiz
                            <CheckCircle />
                          </>
                        )}
                      </button>
                    )}
                  </div>
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ITEQuizApp />);
    </script>
</body>
</html>
