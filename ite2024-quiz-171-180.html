  {
    "id": 171,
    "question": "A generally healthy 13-month-old female is brought to the urgent care clinic by her parent because of
concerns that she might have pneumonia. The parent says that the toddler has been coughing for the
last week and has low energy and decreased appetite. She does not have a history of wheezing or
breathing problems.
Which one of the following history or physical examination findings, if present, would be the most
concerning for community-acquired pneumonia as a cause of this toddler’s cough?",
    "choices": [
      "A 3-day history of fevers up to 100.2 °F",
      "Cloudy nasal drainage",
      "Coughing that wakes the child",
      "Grunting and retractions",
      "Recent pneumococcal vaccination"
    ],
    "answer": "D",
    "rationale": "An abnormal chest examination, including grunting and retractions, is one of the
physical examination findings most predictive of community-acquired pneumonia in
pediatric patients and one of the criteria used in the Pediatric Acute Febrile Respiratory
Illness rule. Nasal drainage and the absence of significant fever are negative predictors
in this rule. Cough that disrupts sleep is a common reason for children to be seen by a
physician for medical care, but it is not necessarily suggestive of pneumonia.
Pneumococcal vaccination decreases a child’s risk for significant bacterial community-
acquired pneumonia.",
    "image": null

    "id": 172,
    "question": "An 89-year-old female with end-stage, widely metastatic lung cancer is receiving hospice care. Her
symptoms, including pain, have been well controlled until recently. According to her caregiver, she is
now experiencing excessive oropharyngeal secretions.
Which one of the following medications would most effectively control this patient’s secretions?",
    "choices": [
      "Chlorpheniramine/hydrocodone suspension",
      "Glycopyrrolate",
      "Haloperidol",
      "Hydroxyzine",
      "Morphine"
    ],
    "answer": "B",
    "rationale": "Symptom management at the end of life aims to provide comfort and dignity for
patients and their families. One of the common symptoms at the end of life is excessive
oropharyngeal secretions. This can cause increased noisy breathing in the last hours to
days of life, often referred to as a death rattle. Terminal secretions do not result in
airway obstruction or respiratory distress for the patient but can be distressing to family
members who are concerned that the patient is “drowning” in secretions. Family
members often request that suctioning be performed; however, this does not reduce
the rattling noise and can cause further distress to the patient.
Anticholinergic medications can be used to reduce the volume of secretions and noisy
breathing, but there is little high-quality evidence to support this practice.
Glycopyrrolate, hyoscyamine, and transdermal scopolamine may also be used. Neither
chlorpheniramine/hydrocodone nor hydroxyzine has a role in typical end-of-life care.
Haloperidol is effective for the treatment of delirium. Opioids such as morphine are
used to treat dyspnea (SOR B) but have no effect on secretions.",
    "image": null
  },

    "id": 173,
    "question": "Which one of the following is a best practice strategy for avoiding the use of stigmatizing or

    "answer": "E",
    "rationale": "Person-first language focuses on the patient and not the condition and is an important
humanizing strategy that should be used in clinical documentation. For example, “a
patient with diabetes” is preferred over referring to a patient as “a diabetic.” It is
important to avoid blaming the patient by attributing responsibility for their condition to
them. Documenting that a patient “refuses” a recommendation carries a negative
connotation and it is preferable to use a neutral alternative such “chooses.” Social
identifiers such as race, ethnicity, or socioeconomic status can be markers of
marginalization and trigger unconscious bias. These identifiers should not be used to
lead the history of present illness or included in a “one-liner.” Instead, they can be
included in the social history if verified by the patient.",

    "question": "A 32-year-old male has presented to your office 4 times over the past several months because of

    "answer": "B",
    "rationale": "Cannabinoid hyperemesis syndrome (CHS) has become more common with increased

  {

    "question": "Which one of the following conditions is most associated with an increased risk for venous

    "id": 178,
    "question": "A 62-year-old female sees you for evaluation of pain and stiffness in her neck. For several years she
has attributed these symptoms to the aging process, but she has recently developed a loss of dexterity
in her hands that makes typing and knitting difficult. She does not have any loss of sensation or

On examination you note mild tenderness of the spinous processes and paraspinous muscles of the

        function ITEQuizApp() {
          const [currentQuestion, setCurrentQuestion] = useState(0);
          const [selectedAnswer, setSelectedAnswer] = useState(null);
          const [showRationale, setShowRationale] = useState(false);
          const [score, setScore] = useState(0);
          const [answeredQuestions, setAnsweredQuestions] = useState([]);
          const [quizComplete, setQuizComplete] = useState(false);

          const question = questionsData[currentQuestion];

          const handleAnswerSelect = (index) => {
            if (!showRationale) {
              setSelectedAnswer(index);
            }
          };

          const handleSubmit = () => {
            if (selectedAnswer !== null && !showRationale) {
              setShowRationale(true);
              const isCorrect = selectedAnswer === question.correctAnswer;
              
              if (isCorrect) {
                setScore(score + 1);
              }
              
              setAnsweredQuestions([...answeredQuestions, {
                questionId: question.id,
                correct: isCorrect
              }]);
            }
          };

          const handleNext = () => {
            if (currentQuestion < questionsData.length - 1) {
              setCurrentQuestion(currentQuestion + 1);
              setSelectedAnswer(null);
              setShowRationale(false);
            } else {
              setQuizComplete(true);
            }
          };

          const handlePrevious = () => {
            if (currentQuestion > 0) {
              setCurrentQuestion(currentQuestion - 1);
              setSelectedAnswer(null);
              setShowRationale(false);
            }
          };

          const handleRestart = () => {
            setCurrentQuestion(0);
            setSelectedAnswer(null);
            setShowRationale(false);
            setScore(0);
            setAnsweredQuestions([]);
            setQuizComplete(false);
          };

          const getOptionClass = (index) => {
            let baseClass = "p-4 mb-3 rounded-lg border-2 cursor-pointer transition-all ";
            
            if (!showRationale) {
              if (selectedAnswer === index) {
                return baseClass + "border-blue-500 bg-blue-50";
              }
              return baseClass + "border-gray-300 hover:border-blue-300 hover:bg-gray-50";
            } else {
              if (index === question.correctAnswer) {
                return baseClass + "border-green-500 bg-green-50";
              }
              if (selectedAnswer === index && index !== question.correctAnswer) {
                return baseClass + "border-red-500 bg-red-50";
              }
              return baseClass + "border-gray-300 bg-gray-50";
            }
          };

          if (quizComplete) {
            const percentage = Math.round((score / questionsData.length) * 100);
            
            return (
              <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
                <div className="max-w-2xl mx-auto">
                  <div className="bg-white rounded-xl shadow-lg p-8 text-center">
                    <div className="flex justify-center mb-4"><Trophy /></div>
                    <h1>ITE 2024: Quiz 18</h1>
                    <div className="mb-6">
                      <p className="text-6xl font-bold text-indigo-600 mb-2">{percentage}%</p>
                      <p className="text-xl text-gray-600">
                        You scored {score} out of {questionsData.length}
                      </p>
                    </div>
                    
                    <div className="mb-6 p-4 bg-gray-50 rounded-lg">
                      <h3 className="font-semibold mb-3 text-gray-700">Results Summary:</h3>
                      <div className="space-y-2">
                        {answeredQuestions.map((answer, idx) => (
                          <div key={idx} className="flex items-center justify-between">
                            <span className="text-gray-600">Question {answer.questionId}</span>
                            <div className="flex items-center">
                              {answer.correct ? <CheckCircle /> : <XCircle />}
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                    
                    <button
                      onClick={handleRestart}
                      className="bg-indigo-600 text-white px-8 py-3 rounded-lg hover:bg-indigo-700 transition-colors inline-flex items-center gap-2"
                    >
                      <RotateCcw />
                      Start Over
                    </button>
                  </div>
                </div>
              </div>
            );
          }

          return (
            <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
              <div className="max-w-4xl mx-auto">
                <div className="bg-white rounded-xl shadow-lg p-6 mb-6">
                  <div className="flex items-center justify-between mb-4">
                    <h1 className="text-2xl font-bold text-gray-800 flex items-center gap-2">
                      <BookOpen />
                      2025 ITE Quiz (Questions 1-10)
                    </h1>
                    <div className="text-right">
                      <p className="text-sm text-gray-600">Score</p>
                      <p className="text-2xl font-bold text-indigo-600">{score}/{answeredQuestions.length}</p>
                    </div>
                  </div>
                  
                  <div className="flex items-center gap-2 mb-2">
                    <div className="flex-1 bg-gray-200 rounded-full h-2">
                      <div 
                        className="bg-indigo-600 h-2 rounded-full transition-all duration-300"
                        style={{ width: `${((currentQuestion + 1) / questionsData.length) * 100}%` }}
                      />
                    </div>
                    <span className="text-sm text-gray-600 whitespace-nowrap">
                      {currentQuestion + 1} / {questionsData.length}
                    </span>
                  </div>
                </div>

                <div className="bg-white rounded-xl shadow-lg p-6 mb-6">
                  <div className="mb-6">
                    <p className="text-sm text-gray-500 mb-2">Question {question.id}</p>
                    <p className="text-lg text-gray-800 leading-relaxed">{question.question}</p>
                  </div>

                  <div className="space-y-3 mb-6">
                    {question.options.map((option, index) => (
                      <div
                        key={index}
                        onClick={() => handleAnswerSelect(index)}
                        className={getOptionClass(index)}
                      >
                        <div className="flex items-start gap-3">
                          <span className="text-gray-700 flex-1">{option}</span>
                          {showRationale && index === question.correctAnswer && (
                            <div className="flex-shrink-0 mt-1"><CheckCircle /></div>
                          )}
                          {showRationale && selectedAnswer === index && index !== question.correctAnswer && (
                            <div className="flex-shrink-0 mt-1"><XCircle /></div>
                          )}
                        </div>
                      </div>
                    ))}
                  </div>

                  {showRationale && (
                    <div className="bg-blue-50 border-l-4 border-blue-500 p-4 mb-6">
                      <h3 className="font-semibold text-blue-900 mb-2">Explanation:</h3>
                      <p className="text-blue-800 leading-relaxed">{question.rationale}</p>
                    </div>
                  )}

                  <div className="flex gap-3">
                    <button
                      onClick={handlePrevious}
                      disabled={currentQuestion === 0}
                      className="px-4 py-2 rounded-lg border-2 border-gray-300 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition-colors flex items-center gap-2"
                    >
                      <ChevronLeft />
                      Previous
                    </button>
                    
                    {!showRationale ? (
                      <button
                        onClick={handleSubmit}
                        disabled={selectedAnswer === null}
                        className="flex-1 bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                      >
                        Submit Answer
                      </button>
                    ) : (
                      <button
                        onClick={handleNext}
                        className="flex-1 bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 transition-colors flex items-center justify-center gap-2"
                      >
                        {currentQuestion < questionsData.length - 1 ? (
                          <>
                            Next Question
                            <ChevronRight />
                          </>
                        ) : (
                          <>
                            Finish Quiz
                            <CheckCircle />
                          </>
                        )}
                      </button>
                    )}
                  </div>
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ITEQuizApp />);
    </script>
</body>
</html>
