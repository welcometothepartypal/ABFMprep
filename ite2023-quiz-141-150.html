    "question": "A 55-year-old male with oxygen-dependent COPD plans to visit family 2000 miles away. For\nthe last year, his COPD has been well controlled on medications and oxygen at 2 L/min. He\nwants to travel by commercial airline.\nWhich one of the following would be the most appropriate advice for this patient regarding air\ntravel?",

    "rationale": "Commercial airline carriers typically permit Federal Aviation Administration–approved portable oxygen\ncompressors. Patients whose usual oxygen requirements are <4 L/min are advised to double the flow rate\nduring the flight. Conditions such as bullous lung disease, cystic fibrosis, and severe COPD may require\nthe Hypoxia Altitude Simulation Test to determine in-flight oxygen requirements prior to air travel. It\nwould not be appropriate to recommend this patient choose another mode of transit, fly first class only,\ncontinue his current oxygen flow rate, or lower his oxygen flow rate.\nRef: Powell-Dunford N, Adams JR, Grace C. Medical advice for commercial air travel. Am Fam Physician.\n2021;104(4):403-410."

    "rationale": "Patellofemoral pain syndrome (PFPS) involves pain around the patella during weight bearing on a flexed\nknee. PFPS is a clinical diagnosis and does not require imaging to make the diagnosis, although imaging\nmay be indicated if other pathology is suspected. Exercise therapy is the mainstay of treatment. A medial\nunloading knee brace may be beneficial for symptomatic pain relief in knee osteoarthritis, but knee braces\nin general have poor evidence of benefit in PFPS. Intra-articular corticosteroids may be beneficial for pain\nrelief in refractory cases but are not generally appropriate for initial treatment. Surgery may be indicated\nfor refractory cases to correct patellar maltracking.\nRef: Armstrong AD, Hubbard MC, eds. Essentials of Musculoskeletal Care. 5th ed. American Academy of Orthopaedic\nSurgeons; 2018:739-745. 2) Gaitonde DY, Ericksen A, Robbins RC. Patellofemoral pain syndrome. Am Fam Physician.\n2019;99(2):88-94."

    "question": "A 51-year-old male presents to your office with right arm weakness. He has a history of multiple\nsclerosis (MS) with infrequent flares only. His MS is managed with interferon as the long-term\ndisease-modifying therapy. After a thorough history and examination, you diagnose a flare of\nMS.\nIn addition to notifying his neurologist, which one of the following would be the most\nappropriate next step?",

    "question": "You are preparing to inform a patient of a diagnosis of terminal metastatic cancer. When sharing\nbad news with a patient, which one of the following is the most appropriate next step?",

    "correctAnswer": 2,
    "rationale": "As health care has moved to a patient-centered, decision-making model, there is a focus on communication\nskills and patient preferences. These apply when physicians share serious or bad news with patients.\nThe Setting, Perception, Invitation, Knowledge, Emotions, and Strategy/Summary (SPIKES) protocol can\nbe used for sharing bad news.\nIt is during the invitation step of SPIKES that a physician determines how much information or detail a\npatient desires to hear. Patient preferences vary and are influenced by demographics including age, sex,\neducation, and culture (SOR B). While most patients want to know their diagnosis, the amount of detail\nvaries. It is important to recognize this before sharing serious or bad news.\nAsking permission to discuss the information enables the patient to control the conversation. The following\nquestions are examples of how to ask for patient permission: Would it be okay if I give you those test\nresults now? Are you someone who likes to know all of the details, or would you prefer that I focus on\nthe most important results? If the patient declines, then offer to review the diagnosis again when they are\nready or when a family member is present.\nPreviously in the paternalistic patient care model, the physician would select the information to share to\nhelp steer the patient toward the best decision. While the family is important, SPIKES is directed toward\nthe patient because it is the patient, not the family, who controls the amount of detail that is discussed.\nThe last S in SPIKES is for Strategy and Summary. While palliative care and hospice could be included\nin that discussion, it would vary based upon what the patient wants to discuss at the time the bad news is\ninitially shared.\nRef: Berkey FJ, Wiedemer JP, Vithalani ND. Delivering bad or life-altering news. Am Fam Physician. 2018;98(2):99-104."

    "question": "A young adult who has been one of your patients for several years begins to exhibit symptoms\nof a thought disorder, and you are concerned about schizophrenia. In a review of the diagnostic\ncriteria for schizophrenia, your resources refer to positive and negative symptoms.\nWhich one of the following is a negative symptom associated with schizophrenia?",

finger and jersey finger injuries in the athlete. Curr Rev\nMusculoskelet Med. 2017;10(1):1-9. 3) Shapiro LM, Kamal RN. Evaluation and treatment of flexor tendon and pulley\ninjuries in athletes. Clin Sports Med. 2020;39(2):279-297."

        function ITEQuizApp() {
          const [currentQuestion, setCurrentQuestion] = useState(0);
          const [selectedAnswer, setSelectedAnswer] = useState(null);
          const [showRationale, setShowRationale] = useState(false);
          const [score, setScore] = useState(0);
          const [answeredQuestions, setAnsweredQuestions] = useState([]);
          const [quizComplete, setQuizComplete] = useState(false);

          const question = questionsData[currentQuestion];

          const handleAnswerSelect = (index) => {
            if (!showRationale) {
              setSelectedAnswer(index);
            }
          };

          const handleSubmit = () => {
            if (selectedAnswer !== null && !showRationale) {
              setShowRationale(true);
              const isCorrect = selectedAnswer === question.correctAnswer;
              
              if (isCorrect) {
                setScore(score + 1);
              }
              
              setAnsweredQuestions([...answeredQuestions, {
                questionId: question.id,
                correct: isCorrect
              }]);
            }
          };

          const handleNext = () => {
            if (currentQuestion < questionsData.length - 1) {
              setCurrentQuestion(currentQuestion + 1);
              setSelectedAnswer(null);
              setShowRationale(false);
            } else {
              setQuizComplete(true);
            }
          };

          const handlePrevious = () => {
            if (currentQuestion > 0) {
              setCurrentQuestion(currentQuestion - 1);
              setSelectedAnswer(null);
              setShowRationale(false);
            }
          };

          const handleRestart = () => {
            setCurrentQuestion(0);
            setSelectedAnswer(null);
            setShowRationale(false);
            setScore(0);
            setAnsweredQuestions([]);
            setQuizComplete(false);
          };

          const getOptionClass = (index) => {
            let baseClass = "p-4 mb-3 rounded-lg border-2 cursor-pointer transition-all ";
            
            if (!showRationale) {
              if (selectedAnswer === index) {
                return baseClass + "border-blue-500 bg-blue-50";
              }
              return baseClass + "border-gray-300 hover:border-blue-300 hover:bg-gray-50";
            } else {
              if (index === question.correctAnswer) {
                return baseClass + "border-green-500 bg-green-50";
              }
              if (selectedAnswer === index && index !== question.correctAnswer) {
                return baseClass + "border-red-500 bg-red-50";
              }
              return baseClass + "border-gray-300 bg-gray-50";
            }
          };

          if (quizComplete) {
            const percentage = Math.round((score / questionsData.length) * 100);
            
            return (
              <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
                <div className="max-w-2xl mx-auto">
                  <div className="bg-white rounded-xl shadow-lg p-8 text-center">
                    <div className="flex justify-center mb-4"><Trophy /></div>
                    <h1 className="text-3xl font-bold mb-4 text-gray-800">Quiz Complete!</h1>
                    <div className="mb-6">
                      <p className="text-6xl font-bold text-indigo-600 mb-2">{percentage}%</p>
                      <p className="text-xl text-gray-600">
                        You scored {score} out of {questionsData.length}
                      </p>
                    </div>
                    
                    <div className="mb-6 p-4 bg-gray-50 rounded-lg">
                      <h3 className="font-semibold mb-3 text-gray-700">Results Summary:</h3>
                      <div className="space-y-2">
                        {answeredQuestions.map((answer, idx) => (
                          <div key={idx} className="flex items-center justify-between">
                            <span className="text-gray-600">Question {answer.questionId}</span>
                            <div className="flex items-center">
                              {answer.correct ? <CheckCircle /> : <XCircle />}
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                    
                    <button
                      onClick={handleRestart}
                      className="bg-indigo-600 text-white px-8 py-3 rounded-lg hover:bg-indigo-700 transition-colors inline-flex items-center gap-2"
                    >
                      <RotateCcw />
                      Start Over
                    </button>
                  </div>
                </div>
              </div>
            );
          }

          return (
            <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
              <div className="max-w-4xl mx-auto">
                <div className="bg-white rounded-xl shadow-lg p-6 mb-6">
                  <div className="flex items-center justify-between mb-4">
                    <h1 className="text-2xl font-bold text-gray-800 flex items-center gap-2">
                      <BookOpen />
                      2023 ITE Quiz (Questions 141-150)
                    </h1>
                    <div className="text-right">
                      <p className="text-sm text-gray-600">Score</p>
                      <p className="text-2xl font-bold text-indigo-600">{score}/{answeredQuestions.length}</p>
                    </div>
                  </div>
                  
                  <div className="flex items-center gap-2 mb-2">
                    <div className="flex-1 bg-gray-200 rounded-full h-2">
                      <div 
                        className="bg-indigo-600 h-2 rounded-full transition-all duration-300"
                        style={{ width: `${((currentQuestion + 1) / questionsData.length) * 100}%` }}
                      />
                    </div>
                    <span className="text-sm text-gray-600 whitespace-nowrap">
                      {currentQuestion + 1} / {questionsData.length}
                    </span>
                  </div>
                </div>

                <div className="bg-white rounded-xl shadow-lg p-6 mb-6">
                  <div className="mb-6">
                    <p className="text-sm text-gray-500 mb-2">Question {question.id}</p>
                    <p className="text-lg text-gray-800 leading-relaxed">{question.question}</p>
                    {question.image && (
                      <div className="mt-4">
                        <img src={question.image} alt={`Question ${question.id} figure`} className="max-w-full rounded-lg border" />
                      </div>
                    )}
                  </div>

                  <div className="space-y-3 mb-6">
                    {question.options.map((option, index) => (
                      <div
                        key={index}
                        onClick={() => handleAnswerSelect(index)}
                        className={getOptionClass(index)}
                      >
                        <div className="flex items-start gap-3">
                          <span className="text-gray-700 flex-1">{option}</span>
                          {showRationale && index === question.correctAnswer && (
                            <div className="flex-shrink-0 mt-1"><CheckCircle /></div>
                          )}
                          {showRationale && selectedAnswer === index && index !== question.correctAnswer && (
                            <div className="flex-shrink-0 mt-1"><XCircle /></div>
                          )}
                        </div>
                      </div>
                    ))}
                  </div>

                  {showRationale && (
                    <div className="bg-blue-50 border-l-4 border-blue-500 p-4 mb-6">
                      <h3 className="font-semibold text-blue-900 mb-2">Explanation:</h3>
                      <p className="text-blue-800 leading-relaxed">{question.rationale}</p>
                    </div>
                  )}

                  <div className="flex gap-3">
                    <button
                      onClick={handlePrevious}
                      disabled={currentQuestion === 0}
                      className="px-4 py-2 rounded-lg border-2 border-gray-300 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition-colors flex items-center gap-2"
                    >
                      <ChevronLeft />
                      Previous
                    </button>
                    
                    {!showRationale ? (
                      <button
                        onClick={handleSubmit}
                        disabled={selectedAnswer === null}
                        className="flex-1 bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                      >
                        Submit Answer
                      </button>
                    ) : (
                      <button
                        onClick={handleNext}
                        className="flex-1 bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 transition-colors flex items-center justify-center gap-2"
                      >
                        {currentQuestion < questionsData.length - 1 ? (
                          <>
                            Next Question
                            <ChevronRight />
                          </>
                        ) : (
                          <>
                            Finish Quiz
                            <CheckCircle />
                          </>
                        )}
                      </button>
                    )}
                  </div>
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ITEQuizApp />);
    </script>
</body>
</html>
