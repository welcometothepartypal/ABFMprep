<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        // ── SAVE QUIZ RESULT FOR SCORE CALCULATOR ──
        // Call this function when the quiz is scored / results are shown.
        function saveQuizResult(correctCount, totalCount, missedQuestionsArray) {
          try {
            localStorage.setItem(
              'ite_quiz_result_2024_4',
              JSON.stringify({
                correct: correctCount,
                total:   totalCount,
                missed:  missedQuestionsArray
              })
            );
          } catch(e) {}
        }


        const ChevronLeft = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" /></svg>;
        const ChevronRight = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" /></svg>;
        const CheckCircle = () => <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd" /></svg>;

        const questionsData = [
  {
    "id": 31,
    "question": "A patient presents with right-sided facial weakness. You suspect Bell palsy, but an assessment \nsuggests a central brain lesion. \n \nA central brain lesion would result in which one of the following findings on the affected side?",
    "options": [
      "A) Ability to wrinkle the forehead",
      "B) Inability to close the eye",
      "C) Normal extraocular movements",
      "D) Flattening of the nasolabial fold",
      "E) Drooping of the mouth"
    ],
    "correctAnswer": 0,
    "rationale": "Patients with Bell palsy present with acute weakness or paralysis of the face caused by \ndysfunction of peripheral cranial nerve VII (the facial nerve). A central lesion should be \nsuspected if the patient is able to wrinkle the forehead on the affected side during the \nexamination. This is also true if the patient is able to close both eyes tightly.  \n \nWhile central nervous system lesions such as multiple sclerosis, stroke, or tumor can \nalso cause facial nerve palsy, some motor neurons to the forehead cross sides at the \nlevel of the brain stem, so the fibers in the facial nerve going to the forehead come \nfrom both cerebral hemispheres. Therefore, central lesions affecting the facial nerve will \nnot paralyze the forehead on the affected side. This causes unilateral facial paralysis \nwith sparing of the forehead.  \n \nExpected findings on the affected side in Bell palsy include inability to close the eye, \nnormal extraocular movements, flattening of the nasolabial fold, and drooping of the \nmouth."
  },
  {
    "id": 32,
    "question": "A 54-year-old female with Hashimoto thyroiditis sees you for follow-up. She does not report any \nclinical symptoms, but her TSH level is <0.1 μU/mL (N 0.5–5.0) and her free T4 level is elevated at \n1.9 ng/dL (N 0.6–1.6). Her only medication is levothyroxine (Synthroid), and she reports taking more \nthan the prescribed dosage to help with weight loss. You tell her that this may have several dangerous \noutcomes. \n \nWhich one of the following adverse reactions is the most likely to occur with misuse of this \nmedication?",
    "options": [

  {
    "id": 36,
    "question": "A 62-year-old female sees you for follow-up of bilateral lower extremity edema that worsens \nthroughout the day. A BNP level, TSH level, comprehensive metabolic panel, urinalysis, chest x-ray, \nEKG, and lower extremity venous ultrasound have all been normal. \n \nWhich one of the following diagnoses should you consider in this patient?",
    "options": [

    ],
    "correctAnswer": 3,
    "rationale": "Obstructive sleep apnea is an increasingly recognized possible etiology of lower \nextremity edema and should be considered during the evaluation of this patient. While \nthe exact pathophysiology is unknown, nocturnal hypoxemia is thought to lead to \nincreased sympathetic tone resulting in systemic hypertension. This nocturnal \nhypoxemia can lead to neuroendocrine activation and salt and water retention. Celiac \ndisease, Cushing syndrome, Lyme disease, and Raynaud disease are not associated \nwith lower extremity edema."

  {
    "id": 37,
    "question": "A 42-year-old female sees you for routine follow-up of adrenal insufficiency diagnosed 2 years ago. \nToday she reports a 2-month history of fatigue, decreased energy, difficulty concentrating, and \nnausea. She has also had an unintentional 5-lb weight loss over the past 3 months. She takes oral \nhydrocortisone, 10 mg in the morning and 5 mg in the afternoon. She is adherent to her medication \nregimen and has not had any illnesses in the past year. \n \nWhich one of the following would be the most appropriate initial step in the management of this \npatient’s adrenal insufficiency?",
    "options": [
      "A) Increasing the hydrocortisone dosage",
      "B) A random cortisol level",
      "C) A cortisol stimulation test",
      "D) CT of the adrenal glands"
    ],
    "correctAnswer": 0,
    "rationale": "Hydrocortisone is the preferred glucocorticoid for replacement therapy of adrenal \ninsufficiency, and the goal of treatment is to use the lowest dosage of glucocorticoids to \ncontrol symptoms. After initial replacement, the management of chronic adrenal \ninsufficiency includes assessment of signs and symptoms of under- or overreplacement. \nThis patient has signs and symptoms of underreplacement including fatigue, weight \nloss, nausea, decreased energy, and difficulty concentrating. Her glucocorticoid dosage \nshould be increased by 2.5–5 mg daily and her symptoms reassessed in 1 week. \nMeasurement of an early morning corticotropin (ACTH) level is helpful in assessing for \noverreplacement as indicated by a low level; however, an elevated corticotropin level is \nnot necessarily indicative of underreplacement.  \n \nChecking a random cortisol level is typically not necessary. A cortisol stimulation test is \nuseful in the diagnosis of adrenal insufficiency but not in monitoring replacement after \ndiagnosis. CT of the adrenal glands can be useful in evaluating the etiology of adrenal \ninsufficiency but not in the ongoing management of glucocorticoid replacement therapy."
  },
  {

    "question": "Which one of the following findings on a HINTS (head-impulse, nystagmus, test of skew) \nexamination suggests a central etiology for a patient with vertigo?",
    "options": [

    "id": 40,
    "question": "A 55-year-old female presents with numbness and tingling in the ring and little fingers of her right \nhand. She also reports weakness when gripping objects and difficulty spreading her fingers apart. A \nphysical examination reveals weakness of the first dorsal interosseous muscle and clawing of the ring \nand little fingers. A Tinel sign is positive over the medial epicondyle of the right elbow. \n \nWhich one of the following is the most likely diagnosis?",
    "options": [
      "A) Axillary nerve compression",
      "B) Carpal tunnel syndrome",
      "C) Cubital tunnel syndrome",
      "D) Median nerve neuropathy",
      "E) Radial tunnel syndrome"
    ],
    "correctAnswer": 2,
    "rationale": "This patient's symptoms and the physical examination findings are classic for ulnar \nnerve compression at the elbow, also known as cubital tunnel syndrome. Numbness \nand tingling in the ring and little fingers, weakness in grip, and clawing of the fingers \nare all indicative of ulnar nerve dysfunction. A positive Tinel sign over the medial \nepicondyle further strengthens the diagnosis of cubital tunnel syndrome. Early diagnosis \nand treatment are crucial to prevent permanent nerve damage.  \n \nAxillary nerve compression would produce paresthesias or pain of the lateral shoulder \nand weakness in external shoulder rotation, extension, abduction, and forward flexion. \nCarpal tunnel syndrome affects the median nerve, not the ulnar nerve, and causes \nnumbness and tingling in the thumb, index finger, middle finger, and half of the ring \nfinger. Median nerve neuropathy would cause symptoms similar to carpal tunnel \nsyndrome, but not weakness of the first dorsal interosseous muscle or clawing of the \nfingers. Radial tunnel syndrome affects the radial nerve and causes weakness and \nsensory loss in the back of the hand and thumb."
  }
];

        function ITEQuizApp() {
          const [currentQuestion, setCurrentQuestion] = useState(0);
          const [selectedAnswer, setSelectedAnswer] = useState(null);
          const [showRationale, setShowRationale] = useState(false);
          const [score, setScore] = useState(0);
          const [answeredQuestions, setAnsweredQuestions] = useState([]);
          const [quizComplete, setQuizComplete] = useState(false);

          const question = questionsData[currentQuestion];

          const handleAnswerSelect = (index) => {
            if (!showRationale) {
              setSelectedAnswer(index);
            }
          };

          const handleSubmit = () => {
            if (selectedAnswer !== null && !showRationale) {
              setShowRationale(true);
              const isCorrect = selectedAnswer === question.correctAnswer;
              
              if (isCorrect) {
                setScore(score + 1);
              }
              
              setAnsweredQuestions([...answeredQuestions, {
                questionId: question.id,
                correct: isCorrect
              }]);
            }
          };

          const handleNext = () => {
            if (currentQuestion < questionsData.length - 1) {
              setCurrentQuestion(currentQuestion + 1);
              setSelectedAnswer(null);
              setShowRationale(false);
            } else {
              setQuizComplete(true);
            }
          };

          const handlePrevious = () => {
            if (currentQuestion > 0) {
              setCurrentQuestion(currentQuestion - 1);
              setSelectedAnswer(null);
              setShowRationale(false);
            }
          };

          const handleRestart = () => {
            setCurrentQuestion(0);
            setSelectedAnswer(null);
            setShowRationale(false);
            setScore(0);
            setAnsweredQuestions([]);
            setQuizComplete(false);
          };

          const getOptionClass = (index) => {
            let baseClass = "p-4 mb-3 rounded-lg border-2 cursor-pointer transition-all ";
            
            if (!showRationale) {
              if (selectedAnswer === index) {
                return baseClass + "border-blue-500 bg-blue-50";
              }
              return baseClass + "border-gray-300 hover:border-blue-300 hover:bg-gray-50";
            } else {
              if (index === question.correctAnswer) {
                return baseClass + "border-green-500 bg-green-50";
              }
              if (selectedAnswer === index && index !== question.correctAnswer) {
                return baseClass + "border-red-500 bg-red-50";
              }
              return baseClass + "border-gray-300 bg-gray-50";
            }
          };

          if (quizComplete) {
            const percentage = Math.round((score / questionsData.length) * 100);
            
            return (
              <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
                <div className="max-w-2xl mx-auto">
                  <div className="bg-white rounded-xl shadow-lg p-8 text-center">
                    <div className="flex justify-center mb-4"><Trophy /></div>
                    <h1 className="text-3xl font-bold mb-4 text-gray-800">Quiz Complete!</h1>
                    <div className="mb-6">
                      <p className="text-6xl font-bold text-indigo-600 mb-2">{percentage}%</p>
                      <p className="text-xl text-gray-600">
                        You scored {score} out of {questionsData.length}
                      </p>
                    </div>
                    
                    <div className="mb-6 p-4 bg-gray-50 rounded-lg">
                      <h3 className="font-semibold mb-3 text-gray-700">Results Summary:</h3>
                      <div className="space-y-2">
                        {answeredQuestions.map((answer, idx) => (
                          <div key={idx} className="flex items-center justify-between">
                            <span className="text-gray-600">Question {answer.questionId}</span>
                            <div className="flex items-center">
                              {answer.correct ? <CheckCircle /> : <XCircle />}
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                    
                    <button
                      onClick={handleRestart}
                      className="bg-indigo-600 text-white px-8 py-3 rounded-lg hover:bg-indigo-700 transition-colors inline-flex items-center gap-2"
                    >
                      <RotateCcw />
                      Start Over
                    </button>
                  </div>
                </div>
              </div>
            );
          }

          return (
            <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
              <div className="max-w-4xl mx-auto">
                <div className="bg-white rounded-xl shadow-lg p-6 mb-6">
                  <div className="flex items-center justify-between mb-4">
                    <h1 className="text-2xl font-bold text-gray-800 flex items-center gap-2">
                      <BookOpen />
                      2025 ITE Quiz (Questions 31-40)
                    </h1>
                    <div className="text-right">
                      <p className="text-sm text-gray-600">Score</p>
                      <p className="text-2xl font-bold text-indigo-600">{score}/{answeredQuestions.length}</p>
                    </div>
                  </div>
                  
                  <div className="flex items-center gap-2 mb-2">
                    <div className="flex-1 bg-gray-200 rounded-full h-2">
                      <div 
                        className="bg-indigo-600 h-2 rounded-full transition-all duration-300"
                        style={{ width: `${((currentQuestion + 1) / questionsData.length) * 100}%` }}
                      />
                    </div>
                    <span className="text-sm text-gray-600 whitespace-nowrap">
                      {currentQuestion + 1} / {questionsData.length}
                    </span>
                  </div>
                </div>

                <div className="bg-white rounded-xl shadow-lg p-6 mb-6">
                  <div className="mb-6">
                    <p className="text-sm text-gray-500 mb-2">Question {question.id}</p>
                    <p className="text-lg text-gray-800 leading-relaxed">{question.question}</p>
                    {question.image && (
                      <div className="mt-4">
                        <img src={question.image} alt={`Question ${question.id} figure`} className="max-w-full rounded-lg border" />
                      </div>
                    )}
                  </div>

                  <div className="space-y-3 mb-6">
                    {question.options.map((option, index) => (
                      <div
                        key={index}
                        onClick={() => handleAnswerSelect(index)}
                        className={getOptionClass(index)}
                      >
                        <div className="flex items-start gap-3">
                          <span className="text-gray-700 flex-1">{option}</span>
                          {showRationale && index === question.correctAnswer && (
                            <div className="flex-shrink-0 mt-1"><CheckCircle /></div>
                          )}
                          {showRationale && selectedAnswer === index && index !== question.correctAnswer && (
                            <div className="flex-shrink-0 mt-1"><XCircle /></div>
                          )}
                        </div>
                      </div>
                    ))}
                  </div>

                  {showRationale && (
                    <div className="bg-blue-50 border-l-4 border-blue-500 p-4 mb-6">
                      <h3 className="font-semibold text-blue-900 mb-2">Explanation:</h3>
                      <p className="text-blue-800 leading-relaxed">{question.rationale}</p>
                    </div>
                  )}

                  <div className="flex gap-3">
                    <button
                      onClick={handlePrevious}
                      disabled={currentQuestion === 0}
                      className="px-4 py-2 rounded-lg border-2 border-gray-300 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition-colors flex items-center gap-2"
                    >
                      <ChevronLeft />
                      Previous
                    </button>
                    
                    {!showRationale ? (
                      <button
                        onClick={handleSubmit}
                        disabled={selectedAnswer === null}
                        className="flex-1 bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                      >
                        Submit Answer
                      </button>
                    ) : (
                      <button
                        onClick={handleNext}
                        className="flex-1 bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 transition-colors flex items-center justify-center gap-2"
                      >
                        {currentQuestion < questionsData.length - 1 ? (
                          <>
                            Next Question
                            <ChevronRight />
                          </>
                        ) : (
                          <>
                            Finish Quiz
                            <CheckCircle />
                          </>
                        )}
                      </button>
                    )}
                  </div>
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ITEQuizApp />);
    </script>
</body>
</html>
