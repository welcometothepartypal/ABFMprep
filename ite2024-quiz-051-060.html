<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2024 ITE Quiz - Questions 51-60</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        const ChevronLeft = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" /></svg>;
        const ChevronRight = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" /></svg>;
        const CheckCircle = () => <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd" /></svg>;
        const XCircle = () => <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clipRule="evenodd" /></svg>;
        const BookOpen = () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>;
        const RotateCcw = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>;
        const Trophy = () => <svg className="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z" /></svg>;

        const questionsData = [
  {
    "id": 51,
    "question": "A generally healthy 5-month-old female is brought to your office by her parent for follow-up of a \nworsening, painless, red lesion on her right earlobe that has been present since birth. The parent is \nconcerned because the lesion has rapidly increased in size over the last few months. A physical \nexamination reveals a nontender, bluish-red, exophytic plaque on the right earlobe (shown below).  \nWhich one of the following would be an appropriate treatment for this condition?",
    "options": [
      "A) Topical hydrocortisone 0.5%, twice daily",
      "B) Oral propranolol hydrochloride, 2–3 mg/kg daily",
      "C) Embolization",
      "D) Excisional surgery"
    ],
    "correctAnswer": 1,
    "rationale": "Infantile hemangiomas are the most common benign tumors in childhood, and are \nmostly small and self-resolving. However, patients with large lesions, lesions >2 mm \nabove the skin, or lesions near the eyes, ears, and nose are considered to be at high \nrisk for disfigurement.  \n \nFirst-line treatment includes oral propranolol hydrochloride, 2–3 mg/kg daily. Alternative \ntreatments include topical timolol 0.5% gel-forming solution, twice daily, and high-\npotency corticosteroids such as clobetasol propionate 0.05%, but not hydrocortisone \n0.5%. Embolization and excisional surgery are reserved for select cases in which \nmedical treatment has failed.",
    "image": "quiz_images_2024/2024_mc_page_022.png"
  },
  {
    "id": 52,
    "question": "A 24-year-old female sees you for treatment of significant depression and associated hypomanic \nsymptoms. She has been experiencing racing thoughts, agitation, and a decreased need for sleep. \n \nWhich one of the following is CONTRAINDICATED in this patient?",
    "options": [
      "A) Cariprazine (Vraylar) monotherapy",
      "B) Quetiapine (Seroquel) monotherapy",
      "C) Sertraline (Zoloft) monotherapy",
      "D) Lurasidone (Latuda) plus valproic acid",
      "E) Quetiapine plus lithium"
    ],
    "correctAnswer": 2,
    "rationale": "Antidepressant monotherapy is contraindicated in patients with depression who have \nmixed features of associated hypomania or mania because it may precipitate or worsen \nmania. First-line treatment is mood stabilizers such as lithium, anticonvulsants, and \nantipsychotics."
  },
  {
    "id": 53,
    "question": "A 59-year-old male presents to your office accompanied by his wife for evaluation of a 6-month \nhistory of worsening weakness. He reports having difficulty lifting light items to the top shelf at \nwork. His wife adds that he has recently been clumsier around the house. \n \nThe patient’s vital signs are normal today. On physical examination you note mild dysarthria during \nconversation, proximal weakness of the upper extremities that is more pronounced on the left, \nhyperreflexia of the biceps tendon reflex bilaterally, atrophy of the quadriceps that is more \npronounced on the right, and absent reflexes of the patellar tendon. \n \nWhich one of the following is the most likely diagnosis?",
    "options": [
      "A) Amyotrophic lateral sclerosis",
      "B) Guillain-Barré syndrome",
      "C) Hypothyroidism",
      "D) Multiple sclerosis",
      "E) Myasthenia gravis"
    ],
    "correctAnswer": 0,
    "rationale": "Weakness is a chief concern that is frequently encountered in medical settings, and a \ncareful history and thorough physical examination are critical to developing an \nappropriate diagnosis. This patient displays features of asymmetric weakness and \nfindings of both upper and lower motor neuron disease, which should lead to a clinical \nsuspicion of amyotrophic lateral sclerosis (ALS), also known as Lou Gehrig disease. ALS \nis an insidious paralytic disorder that is currently incurable. Upper motor signs include \nhyperreflexia, dysarthria, clonus, and a positive Babinski sign. Lower motor signs \ninclude muscle atrophy and hyporeflexia or areflexia.  \n \nGuillain-Barré syndrome is an acute neuromuscular disorder characterized by ascending \nmuscle weakness and lower motor neuron signs that may progress to include the \nrespiratory muscles. While hypothyroidism may lead to hyporeflexia, it is unlikely to lead \nto the other physical examination findings in this case. Multiple sclerosis can have a \nvariable presentation and may display signs of unilateral weakness and upper motor \nneuron signs depending on the location of the lesion. Myasthenia gravis is characterized \nby proximal weakness that progresses throughout the day, often includes ocular \nmuscles, and displays lower motor neuron signs."
  },
  {
    "id": 54,
    "question": "A 49-year-old female presents to your office with severe left ear pain. The patient describes the pain \nas sharp and deep inside her ear and reports that it has been occurring occasionally for several years. \nThe pain has become more constant over the last 2 months, and she currently rates it as 8 out of 10 on \na pain scale. She has not previously sought an evaluation. \n \nOn physical examination you find a normal ear canal and tympanic membrane. The patient is only \nable to open her mouth 2 finger widths, has clicking over the left temporomandibular joint with \nopening, and has pain with palpation of the submandibular musculature. \n \nWhich one of the following is the most appropriate next step in the management of this disorder?",
    "options": [
      "A) Reassurance that her ear is normal, and follow-up in 4 weeks if symptoms have not improved",
      "B) A trial of naproxen and cyclobenzaprine",
      "C) Noncontrast CT of the facial bones",
      "D) Referral to an otolaryngologist for further evaluation",
      "E) Referral to a maxillofacial surgeon for consideration of jaw realignment surgery"
    ],
    "correctAnswer": 1,
    "rationale": "There is no need for imaging or further workup to determine the cause of pain in this \npatient with uncomplicated temporomandibular joint dysfunction with muscle spasms. \nThe initial treatment is naproxen for inflammation and pain, as well as cyclobenzaprine \nfor muscle spasms. Scheduling a follow-up visit without treatment is not appropriate in \na patient with a clear diagnosis and available medications that can safely provide relief. \nA referral to either an otolaryngologist or a maxillofacial surgeon should be deferred \nuntil a trial of medication is completed."
  },
  {
    "id": 55,
    "question": "A 6-month-old male is brought to your office by his parents for a well baby examination. This is the \npatient’s first visit to your office as his family recently immigrated to the United States. The infant \nappears to be developing normally, but the parents are concerned because they have not observed a \nright testicle. \n \nOn examination you are able to palpate the left testicle in the normal location. The right testicle is not \nlocated in the scrotum but is palpable along the inguinal canal. It can be moved into the upper \nscrotum but requires constant tension to remain in this position and immediately retracts after release. \n \nWhich one of the following would be the most appropriate next step in management?",
    "options": [
      "A) Reassurance that the condition will resolve spontaneously",
      "B) Follow-up in 2 months",
      "C) An ultrasound of the scrotum and pelvis",
      "D) Referral to an endocrinologist",
      "E) Referral to a urologist"
    ],
    "correctAnswer": 4,
    "rationale": "Cryptorchidism is the most common genitourinary malformation in male children, and \nprimary care physicians play a key role in the early identification of this condition. The \nnext step in management would be referral to a urologist (SOR C). Reassuring the \nparents that the patient’s condition will spontaneously resolve is not sufficient. If the \ntesticle were located in the upper scrotum or lower inguinal canal, then an annual \nexamination to ensure spontaneous resolution would be acceptable. If the patient had \nbilateral undescended testicles that were nonpalpable, then referral to an \nendocrinologist would be the most appropriate next step. Imaging is not recommended \nbefore consultation with a surgical specialist (SOR C). After surgery, patients need \nlifelong surveillance and counseling regarding fertility implications and increased risk for \ntesticular conditions."
  },
  {
    "id": 56,
    "question": "A 23-year-old kindergarten teacher presents with a 2-day history of fever up to 102 °F, a sore throat, \nheadache, and swollen glands. She has not had a runny nose or cough. Her throat is hyperemic and \nhas tonsillar exudates. The anterior cervical nodes are enlarged and tender, but there is no other \nlymphadenopathy. She requests an antibiotic to prevent complications and to reduce the likelihood of \nspreading the infection to her students. A throat swab for group A Streptococcus is positive. \n \nWhich one of the following is true regarding the use of antibiotics in this patient?",
    "options": [
      "A) Her current symptoms will not be reduced",
      "B) Her risk for developing poststreptococcal glomerulonephritis will not change",
      "C) Her risk for developing rheumatic fever will not change",
      "D) She will remain contagious for 7–10 days even with treatment"
    ],
    "correctAnswer": 1,
    "rationale": "Up to 90% of cases of pharyngitis in adults are viral in etiology. The patient in this \nclinical scenario, however, has a high clinical likelihood of group A β-hemolytic \nstreptococcal (GABS) pharyngitis, as she meets 4 of the 5 Modified Centor Criteria \n(fever, hyperemic/exudative tonsillitis, cervical adenopathy, and absence of cough). \nAntibiotic treatment is recommended to reduce communicability, relieve symptoms, and \nhelp prevent rheumatic fever (SOR C). Antibiotic treatment for GABS pharyngitis does \nnot lower the risk for acute poststreptococcal glomerulonephritis. The use of the \nModified Centor Criteria for acute pharyngitis is endorsed by both the American \nAcademy of Family Physicians and the American College of Physicians."
  },
  {
    "id": 57,
    "question": "A 23-year-old female presents to your office for evaluation of amenorrhea. A pregnancy test is \npositive, and you determine that she is at 6 weeks’ gestation based on her last menstrual period. She \nhas a history of acne, allergic rhinitis, gastroesophageal reflux, and anxiety. The patient’s current \nmedications include the following: \nAdapalene 0.1% gel (Differin Gel) daily \nFamotidine (Pepcid), 20 mg as needed \nFluticasone propionate (Flonase), 50 μg daily \nHydroxyzine (Vistaril), 25 mg as needed \nPolyethylene glycol (MiraLAX), 17 g as needed \nWhich one of the patient’s current medications should be discontinued at this time?",
    "options": [
      "A) Adapalene",
      "B) Famotidine",
      "C) Fluticasone propionate",
      "D) Hydroxyzine",
      "E) Polyethylene glycol"
    ],
    "correctAnswer": 0,
    "rationale": "Family physicians should be familiar with medications contraindicated in pregnancy that \nare commonly used by women of reproductive age. Topical adapalene, along with other \nretinoids, is contraindicated in pregnancy due to lack of safety data and known harm \nfrom oral formulations. Famotidine, fluticasone propionate, hydroxyzine, and \npolyethylene glycol are generally considered safe in all trimesters of pregnancy."
  },
  {
    "id": 58,
    "question": "A 17-year-old male sustains an injury while playing in a high school football game. As the sideline \nphysician, you determine that he needs to be transported to the emergency department with neck \nstabilization. He is awake, talking, and in no acute distress. There is no concern for airway \ncompromise. \n \nDepending on the nature of his other injuries, which one of the following pieces of protective \nequipment should you remove before transporting the patient?",
    "options": [
      "A) Only the helmet if required",
      "B) Only the shoulder pads if required",
      "C) Both the helmet and the shoulder pads",
      "D) Neither the helmet nor the shoulder pads"
    ],
    "correctAnswer": 3,
    "rationale": "In general, helmets and pads should remain in place during transportation after a \nfootball injury requiring neck stabilization. The facemask may be removed with a special \ntool if there are airway issues or loss of consciousness. If the athlete’s injuries require \neither the helmet or pads to be removed, both should be removed by a trained team. \nRemoval of only one can cause hyperflexion or hyperextension of the neck."
  },
  {
    "id": 59,
    "question": "A 16-year-old female presents for a routine checkup. During the visit, she discloses that she is sexually \nactive and wants to discuss contraceptive options. However, she is hesitant to inform her parents, fearing \ntheir disapproval. \n \nWhich one of the following is the most ethical course of action?",
    "options": [
      "A) Providing the patient with contraception without informing her parents, and respecting her \nconfidentiality by not noting this discussion in her medical record",
      "B) Offering confidential counseling and contraceptive options while encouraging open \ncommunication with her parents",
      "C) Insisting on parental involvement in the decision-making process, emphasizing the importance of \nopen communication",
      "D) Referring the patient to a mental health professional to address her concerns about parental \ndisapproval before discussing contraception",
      "E) Refusing to discuss contraception without parental consent, citing the patient’s age"
    ],
    "correctAnswer": 1,
    "rationale": "While respecting the patient’s autonomy and confidentiality is important, ethical \nobligations also extend to ensuring her well-being and safety, and accurately \nmaintaining the medical record. Encouraging open communication with parents can \nfoster trust and support, but forcing it might create a harmful environment. Offering \ncounseling and contraceptive options while advocating for open communication allows \nthe physician to foster patient autonomy as well as uphold responsible guidance. This \napproach aligns with ethical guidelines from the American Academy of Pediatrics that \nemphasize respect for minors’ confidentiality while considering parental involvement in \nsensitive situations."
  },
  {
    "id": 60,
    "question": "A previously healthy 72-year-old female presents to your office 7 days after hospitalization for an \nacute ischemic stroke diagnosed by MRI. The inpatient evaluation confirmed that she experienced a \nminor noncardioembolic ischemic stroke. She was not a candidate for reperfusion therapy and did not \nreceive rtPA. Her family reports that her speech impairment and confusion have completely resolved \nand that she is now back to her baseline. \n \nWhich one of the following would be the most appropriate pharmacotherapy at this time?",
    "options": [
      "A) A direct oral anticoagulant",
      "B) Low-molecular-weight heparin",
      "C) A vitamin K antagonist",
      "D) Single antiplatelet therapy",
      "E) Dual antiplatelet therapy"
    ],
    "correctAnswer": 4,
    "rationale": "This patient has been diagnosed with a minor noncardioembolic ischemic stroke and \nshould be treated with dual antiplatelet therapy with aspirin and clopidogrel for 21–90 \ndays post stroke (SOR A). The benefit of reducing recurrent stroke risk outweighs the \nrisk for major bleeding. Using aspirin and clopidogrel longer than 90 days offers no \nadditional benefit but results in significantly increased bleeding risk compared to using \nsingle antiplatelet therapy. Following 21–90 days post stroke, either aspirin \nmonotherapy or aspirin in combination with dipyridamole may be used indefinitely. If a \ncardioembolic source is later diagnosed, appropriate anticoagulation therapy with a \ndirect oral anticoagulant or vitamin K antagonist, such as warfarin, can be initiated. \nLow-molecular-weight heparin does not play a role in secondary stroke prevention."
  }
];

        function ITEQuizApp() {
          const [currentQuestion, setCurrentQuestion] = useState(0);
          const [selectedAnswer, setSelectedAnswer] = useState(null);
          const [showRationale, setShowRationale] = useState(false);
          const [score, setScore] = useState(0);
          const [answeredQuestions, setAnsweredQuestions] = useState([]);
          const [quizComplete, setQuizComplete] = useState(false);

          const question = questionsData[currentQuestion];

          const handleAnswerSelect = (index) => {
            if (!showRationale) {
              setSelectedAnswer(index);
            }
          };

          const handleSubmit = () => {
            if (selectedAnswer !== null && !showRationale) {
              setShowRationale(true);
              const isCorrect = selectedAnswer === question.correctAnswer;
              
              if (isCorrect) {
                setScore(score + 1);
              }
              
              setAnsweredQuestions([...answeredQuestions, {
                questionId: question.id,
                correct: isCorrect
              }]);
            }
          };

          const handleNext = () => {
            if (currentQuestion < questionsData.length - 1) {
              setCurrentQuestion(currentQuestion + 1);
              setSelectedAnswer(null);
              setShowRationale(false);
            } else {
              setQuizComplete(true);
            }
          };

          const handlePrevious = () => {
            if (currentQuestion > 0) {
              setCurrentQuestion(currentQuestion - 1);
              setSelectedAnswer(null);
              setShowRationale(false);
            }
          };

          const handleRestart = () => {
            setCurrentQuestion(0);
            setSelectedAnswer(null);
            setShowRationale(false);
            setScore(0);
            setAnsweredQuestions([]);
            setQuizComplete(false);
          };

          const getOptionClass = (index) => {
            let baseClass = "p-4 mb-3 rounded-lg border-2 cursor-pointer transition-all ";
            
            if (!showRationale) {
              if (selectedAnswer === index) {
                return baseClass + "border-blue-500 bg-blue-50";
              }
              return baseClass + "border-gray-300 hover:border-blue-300 hover:bg-gray-50";
            } else {
              if (index === question.correctAnswer) {
                return baseClass + "border-green-500 bg-green-50";
              }
              if (selectedAnswer === index && index !== question.correctAnswer) {
                return baseClass + "border-red-500 bg-red-50";
              }
              return baseClass + "border-gray-300 bg-gray-50";
            }
          };

          if (quizComplete) {
            const percentage = Math.round((score / questionsData.length) * 100);
            
            return (
              <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
                <div className="max-w-2xl mx-auto">
                  <div className="bg-white rounded-xl shadow-lg p-8 text-center">
                    <div className="flex justify-center mb-4"><Trophy /></div>
                    <h1 className="text-3xl font-bold mb-4 text-gray-800">Quiz Complete!</h1>
                    <div className="mb-6">
                      <p className="text-6xl font-bold text-indigo-600 mb-2">{percentage}%</p>
                      <p className="text-xl text-gray-600">
                        You scored {score} out of {questionsData.length}
                      </p>
                    </div>
                    
                    <div className="mb-6 p-4 bg-gray-50 rounded-lg">
                      <h3 className="font-semibold mb-3 text-gray-700">Results Summary:</h3>
                      <div className="space-y-2">
                        {answeredQuestions.map((answer, idx) => (
                          <div key={idx} className="flex items-center justify-between">
                            <span className="text-gray-600">Question {answer.questionId}</span>
                            <div className="flex items-center">
                              {answer.correct ? <CheckCircle /> : <XCircle />}
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                    
                    <button
                      onClick={handleRestart}
                      className="bg-indigo-600 text-white px-8 py-3 rounded-lg hover:bg-indigo-700 transition-colors inline-flex items-center gap-2"
                    >
                      <RotateCcw />
                      Start Over
                    </button>
                  </div>
                </div>
              </div>
            );
          }

          return (
            <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
              <div className="max-w-4xl mx-auto">
                <div className="bg-white rounded-xl shadow-lg p-6 mb-6">
                  <div className="flex items-center justify-between mb-4">
                    <h1 className="text-2xl font-bold text-gray-800 flex items-center gap-2">
                      <BookOpen />
                      2024 ITE Quiz (Questions 51-60)
                    </h1>
                    <div className="text-right">
                      <p className="text-sm text-gray-600">Score</p>
                      <p className="text-2xl font-bold text-indigo-600">{score}/{answeredQuestions.length}</p>
                    </div>
                  </div>
                  
                  <div className="flex items-center gap-2 mb-2">
                    <div className="flex-1 bg-gray-200 rounded-full h-2">
                      <div 
                        className="bg-indigo-600 h-2 rounded-full transition-all duration-300"
                        style={{ width: `${((currentQuestion + 1) / questionsData.length) * 100}%` }}
                      />
                    </div>
                    <span className="text-sm text-gray-600 whitespace-nowrap">
                      {currentQuestion + 1} / {questionsData.length}
                    </span>
                  </div>
                </div>

                <div className="bg-white rounded-xl shadow-lg p-6 mb-6">
                  <div className="mb-6">
                    <p className="text-sm text-gray-500 mb-2">Question {question.id}</p>
                    <p className="text-lg text-gray-800 leading-relaxed">{question.question}</p>
                    {question.image && (
                      <div className="mt-4">
                        <img src={question.image} alt={`Question ${question.id} figure`} className="max-w-full rounded-lg border" />
                      </div>
                    )}
                  </div>

                  <div className="space-y-3 mb-6">
                    {question.options.map((option, index) => (
                      <div
                        key={index}
                        onClick={() => handleAnswerSelect(index)}
                        className={getOptionClass(index)}
                      >
                        <div className="flex items-start gap-3">
                          <span className="text-gray-700 flex-1">{option}</span>
                          {showRationale && index === question.correctAnswer && (
                            <div className="flex-shrink-0 mt-1"><CheckCircle /></div>
                          )}
                          {showRationale && selectedAnswer === index && index !== question.correctAnswer && (
                            <div className="flex-shrink-0 mt-1"><XCircle /></div>
                          )}
                        </div>
                      </div>
                    ))}
                  </div>

                  {showRationale && (
                    <div className="bg-blue-50 border-l-4 border-blue-500 p-4 mb-6">
                      <h3 className="font-semibold text-blue-900 mb-2">Explanation:</h3>
                      <p className="text-blue-800 leading-relaxed">{question.rationale}</p>
                    </div>
                  )}

                  <div className="flex gap-3">
                    <button
                      onClick={handlePrevious}
                      disabled={currentQuestion === 0}
                      className="px-4 py-2 rounded-lg border-2 border-gray-300 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition-colors flex items-center gap-2"
                    >
                      <ChevronLeft />
                      Previous
                    </button>
                    
                    {!showRationale ? (
                      <button
                        onClick={handleSubmit}
                        disabled={selectedAnswer === null}
                        className="flex-1 bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                      >
                        Submit Answer
                      </button>
                    ) : (
                      <button
                        onClick={handleNext}
                        className="flex-1 bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 transition-colors flex items-center justify-center gap-2"
                      >
                        {currentQuestion < questionsData.length - 1 ? (
                          <>
                            Next Question
                            <ChevronRight />
                          </>
                        ) : (
                          <>
                            Finish Quiz
                            <CheckCircle />
                          </>
                        )}
                      </button>
                    )}
                  </div>
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ITEQuizApp />);
    </script>
</body>
</html>
