<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        // ── SAVE QUIZ RESULT FOR SCORE CALCULATOR ──
        // Call this function when the quiz is scored / results are shown.
        function saveQuizResult(correctCount, totalCount, missedQuestionsArray) {
          try {
            localStorage.setItem(
              'ite_quiz_result_2025_18',
              JSON.stringify({
                correct: correctCount,        // number of correct answers, e.g. 7
                total:   totalCount,          // total questions, always 10
                missed:  missedQuestionsArray // array of question numbers wrong, e.g. [2, 5, 9]
              })
            );
          } catch(e) {}
        }


        const ChevronLeft = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" /></svg>;
        const ChevronRight = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" /></svg>;
        const CheckCircle = () => <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd" /></svg>;
        const XCircle = () => <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clipRule="evenodd" /></svg>;
        const BookOpen = () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>;
        const RotateCcw = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>;
        const Trophy = () => <svg className="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z" /></svg>;

        const questionsData = [
  {
    "id": 171,
    "question": "You are participating in a continuing medical education (CME) course at a Colorado ski resort that is 9600 ft (2926 m) above sea level. You and your travel companions have had intermittent issues with headaches, loss of appetite, and difficulty sleeping. On the third day, one of your companions starts to experience shortness of breath that is not relieved with rest. Their symptoms worsen throughout the day and they become slightly tachycardic. Later that evening, they develop a cough that produces frothy sputum. Which one of the following would be the most appropriate next step?",
    "options": [
      "A) Acetazolamide",
      "B) Dexamethasone",
      "C) Nifedipine",
      "D) A COVID-19 test",
      "E) Oxygen supplementation, and descending to a lower elevation"
    ],
    "correctAnswer": 4,
    "rationale": "The risk for acute mountain sickness increases when sleeping above altitudes of about 8200 ft (2499 m). Symptoms can include difficulty sleeping, headaches, and decreased appetite. This patient has more severe symptoms of high-altitude pulmonary edema (HAPE), which is a medical emergency, and should begin supplemental oxygen and descend to a lower altitude if possible. Acetazolamide can be used to prevent acute mountain sickness, but it is not a treatment. Dexamethasone is a supplemental treatment for high-altitude cerebral edema. Nifedipine can be used in the prevention of HAPE and as a treatment in emergency situations in which descent or a hyperbaric chamber is not available. In this case, the patient is at a modern ski resort and descent should be feasible. COVID-19 infection is unlikely in this scenario."

  {

    "correctAnswer": 4,
    "rationale": "Antibiotics are the most common cause of Stevens-Johnson syndrome (SJS) and toxic epidermal necrolysis, accounting for more than one-quarter of cases worldwide. Sulfonamide antibiotics, such as sulfamethoxazole/trimethoprim, are associated with the majority of antibiotic-associated SJS cases worldwide. Antibiotic stewardship is always important, and consideration for both relatively benign and life-threatening side effects should be considered with every prescription written."

    "rationale": "The U.S. Preventive Services Task Force recommends screening all adults for unhealthy alcohol use and implementing brief counseling interventions for those who screen positive (B recommendation). The screening, brief intervention, and referral to treatment (SBIRT) approach has been shown to decrease the number of patients with risky drinking after the intervention. Motivational interviewing is often used for brief counseling in primary care settings. Cognitive behavioral therapy, mindfulness-based therapy, and interpersonal psychotherapy are different psychotherapy approaches that are used as longer-term counseling methods and would not be appropriate for use as brief counseling interventions for adults with unhealthy alcohol use. Patients identified as having alcohol use disorder (AUD) by DSM-5 criteria should be referred for treatment."
  },
  {
    "id": 176,
    "question": "A 30-year-old female presents with constipation and severe anal pain following bowel movements. On examination, you observe an anal fissure. In addition to increasing fluids, fiber, and warm sitz baths, which one of the following would be effective and least likely to result in side effects?",
    "options": [
      "A) Topical calcium channel blockers",
      "B) Topical capsaicin",

    ],
    "correctAnswer": 0,
    "rationale": "For anal fissures, topical sphincter relaxants applied externally around the anus 2–4 times per day help reduce sphincter tone and promote healing. Topical calcium channel blockers such as diltiazem are best tolerated. Topical nitroglycerin is also effective but is associated with more side effects such as headaches and lightheadedness, which results in 1 in 5 patients stopping therapy. Botulinum toxin is also effective. Topical capsaicin is an irritant. Oral calcium channel blockers are not effective for treatment of anal fissures."
  },
  {
    "id": 177,
    "question": "Which one of the following interventions lowers the risk of diverticulitis?",
    "options": [
      "A) Avoiding consumption of popcorn, nuts, and seeds",
      "B) Regular consumption of red meat",
      "C) A vegetarian diet",
      "D) Long-term NSAID use"
    ],
    "correctAnswer": 2,
    "rationale": "Diverticulitis is an inflammation of diverticula caused by a protrusion through the intestinal wall. Risk factors include constipation, a low-fiber diet, increasing age, red meat consumption, smoking, obesity, lack of exercise, aspirin and NSAID use, and genetic susceptibility. Consuming a vegetarian diet may help to prevent diverticulitis. Red meat intake, long-term NSAID use, and tobacco use are risk factors for diverticulitis. After years of research, it was concluded that consumption of nuts, seeds, and popcorn is not a risk factor for diverticulitis (SOR B). The incidence of diverticulitis is increasing, yet screening is not recommended. Tenderness located in the left lower quadrant of the abdomen is the most specific finding of diverticulitis. Evaluation includes a CBC, a basic metabolic panel, a C-reactive protein level, and urine analysis. CT with contrast is the imaging modality of choice if the diagnosis is uncertain. Treatment is based on severity and includes oral and intravenous antibiotics, bowel rest and a clear liquid diet, and surgical management for abscess formation or peritonitis as well as for prevention of recurrences."

    "question": "An 82-year-old male presents to your office because he has been experiencing severe, stabbing pain that feels like an electric shock on the left side of his face in his cheek, lips, and chin. The episodes are usually triggered by light touch or eating and last for a few seconds. Which one of the following cranial nerves is associated with this disorder?",

    "rationale": "Social determinants of health (SDOH) are the conditions in which people are born, work, live, and age as well as the wider set of forces and systems that shape the conditions of daily life. Several SDOH affect cognition and risk of Alzheimer disease and related dementias (ADRDs). For example, higher levels of social engagement have a protective effect against ADRDs. Conversely, SDOH such as decreasing BMI with older age, early-life adversity, low education level, food insecurity, midlife obesity, manual labor, and low socioeconomic status are associated with a greater risk of ADRDs."

  {
    "id": 180,
    "question": "A 72-year-old male with a history of type 2 diabetes comes to your office for evaluation of muscle aches and fatigue. His current medications include rosuvastatin (Crestor), dapagliflozin (Farxiga), and semaglutide (Ozempic). Over the past month he has noticed increasing pain in his hips, thighs, and shoulders without any apparent trigger. He feels so stiff in the morning that it is becoming difficult to get out of bed. On examination his strength is diminished (4/5) in the proximal muscle groups. You do not note any swelling or redness of any joints, muscles, or extremities. He has normal reflexes and no clonus. Laboratory Findings Hemoglobin A 6.4% 1c Hemoglobin 12.2 g/dL (N 13.2–16.6) Creatinine 1.1 mg/dL (N 0.7–1.3) Potassium 4.2 mEq/L (N 3.5–5.1) Creatine kinase 84 U/L (N 55–170) Erythrocyte sedimentation rate 88 mm/hr (N 0–20) C-reactive protein 9.2 mg/L (N 0–0.3) Antinuclear antibody <1:40 (N <1:40) Which one of the following is the most likely cause of this patient's myalgias?",
    "options": [
      "A) Fibromyalgia",
      "B) Polymyalgia rheumatica",
      "C) Polymyositis",
      "D) Statin-induced myopathy",
      "E) Systemic lupus erythematosus"
    ],
    "correctAnswer": 1,
    "rationale": "These findings are concerning for polymyalgia rheumatica (PMR), an inflammatory condition that typically affects adults ≥50 years of age. This patient's proximal muscle pain, fatigue, and decreased proximal muscle strength are consistent with this diagnosis, as are the elevated inflammatory markers (erythrocyte sedimentation rate and C-reactive protein level) and mild anemia. A normal creatine kinase level is expected in patients with PMR. PMR is diagnosed clinically and treated with oral glucocorticoids. Rapid improvement with therapy is expected; if improvement does not occur, an alternate diagnosis should be explored. Giant cell arteritis, also known as temporal arteritis, is associated with PMR. It causes temporal headaches, visual changes, and constitutional symptoms. Early identification and treatment are essential to prevent permanent vision change. Fibromyalgia does not cause elevated inflammatory markers. Polymyositis and statin- induced myopathy may cause myalgias but are typically associated with elevations in creatine kinase, which this patient does not have. Almost all patients with systemic lupus erythematosus have an elevated antinuclear antibody titer, which this patient also does not have."
  }
];

        function ITEQuizApp() {
          const [currentQuestion, setCurrentQuestion] = useState(0);
          const [selectedAnswer, setSelectedAnswer] = useState(null);
          const [showRationale, setShowRationale] = useState(false);
          const [score, setScore] = useState(0);
          const [answeredQuestions, setAnsweredQuestions] = useState([]);
          const [quizComplete, setQuizComplete] = useState(false);

          const question = questionsData[currentQuestion];

          const handleAnswerSelect = (index) => {
            if (!showRationale) {
              setSelectedAnswer(index);
            }
          };

          const handleSubmit = () => {
            if (selectedAnswer !== null && !showRationale) {
              setShowRationale(true);
              const isCorrect = selectedAnswer === question.correctAnswer;
              
              if (isCorrect) {
                setScore(score + 1);
              }
              
              setAnsweredQuestions([...answeredQuestions, {
                questionId: question.id,
                correct: isCorrect
              }]);
            }
          };

          const handleNext = () => {
            if (currentQuestion < questionsData.length - 1) {
              setCurrentQuestion(currentQuestion + 1);
              setSelectedAnswer(null);
              setShowRationale(false);
            } else {
              setQuizComplete(true);
            }
          };

          const handlePrevious = () => {
            if (currentQuestion > 0) {
              setCurrentQuestion(currentQuestion - 1);
              setSelectedAnswer(null);
              setShowRationale(false);
            }
          };

          const handleRestart = () => {
            setCurrentQuestion(0);
            setSelectedAnswer(null);
            setShowRationale(false);
            setScore(0);
            setAnsweredQuestions([]);
            setQuizComplete(false);
          };

          const getOptionClass = (index) => {
            let baseClass = "p-4 mb-3 rounded-lg border-2 cursor-pointer transition-all ";
            
            if (!showRationale) {
              if (selectedAnswer === index) {
                return baseClass + "border-blue-500 bg-blue-50";
              }
              return baseClass + "border-gray-300 hover:border-blue-300 hover:bg-gray-50";
            } else {
              if (index === question.correctAnswer) {
                return baseClass + "border-green-500 bg-green-50";
              }
              if (selectedAnswer === index && index !== question.correctAnswer) {
                return baseClass + "border-red-500 bg-red-50";
              }
              return baseClass + "border-gray-300 bg-gray-50";
            }
          };

          if (quizComplete) {
            const percentage = Math.round((score / questionsData.length) * 100);
            
            return (
              <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
                <div className="max-w-2xl mx-auto">
                  <div className="bg-white rounded-xl shadow-lg p-8 text-center">
                    <div className="flex justify-center mb-4"><Trophy /></div>
                    <h1 className="text-3xl font-bold mb-4 text-gray-800">Quiz Complete!</h1>
                    <div className="mb-6">
                      <p className="text-6xl font-bold text-indigo-600 mb-2">{percentage}%</p>
                      <p className="text-xl text-gray-600">
                        You scored {score} out of {questionsData.length}
                      </p>
                    </div>
                    
                    <div className="mb-6 p-4 bg-gray-50 rounded-lg">
                      <h3 className="font-semibold mb-3 text-gray-700">Results Summary:</h3>
                      <div className="space-y-2">
                        {answeredQuestions.map((answer, idx) => (
                          <div key={idx} className="flex items-center justify-between">
                            <span className="text-gray-600">Question {answer.questionId}</span>
                            <div className="flex items-center">
                              {answer.correct ? <CheckCircle /> : <XCircle />}
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                    
                    <button
                      onClick={handleRestart}
                      className="bg-indigo-600 text-white px-8 py-3 rounded-lg hover:bg-indigo-700 transition-colors inline-flex items-center gap-2"
                    >
                      <RotateCcw />
                      Start Over
                    </button>
                  </div>
                </div>
              </div>
            );
          }

          return (
            <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
              <div className="max-w-4xl mx-auto">
                <div className="bg-white rounded-xl shadow-lg p-6 mb-6">
                  <div className="flex items-center justify-between mb-4">
                    <h1 className="text-2xl font-bold text-gray-800 flex items-center gap-2">
                      <BookOpen />
                      2025 ITE Quiz (Questions 171-180)
                    </h1>
                    <div className="text-right">
                      <p className="text-sm text-gray-600">Score</p>
                      <p className="text-2xl font-bold text-indigo-600">{score}/{answeredQuestions.length}</p>
                    </div>
                  </div>
                  
                  <div className="flex items-center gap-2 mb-2">
                    <div className="flex-1 bg-gray-200 rounded-full h-2">
                      <div 
                        className="bg-indigo-600 h-2 rounded-full transition-all duration-300"
                        style={{ width: `${((currentQuestion + 1) / questionsData.length) * 100}%` }}
                      />
                    </div>
                    <span className="text-sm text-gray-600 whitespace-nowrap">
                      {currentQuestion + 1} / {questionsData.length}
                    </span>
                  </div>
                </div>

                <div className="bg-white rounded-xl shadow-lg p-6 mb-6">
                  <div className="mb-6">
                    <p className="text-sm text-gray-500 mb-2">Question {question.id}</p>
                    <p className="text-lg text-gray-800 leading-relaxed">{question.question}</p>
                    {question.image && (
                      <div className="mt-4">
                        <img src={question.image} alt={`Question ${question.id} figure`} className="max-w-full rounded-lg border" />
                      </div>
                    )}
                  </div>

                  <div className="space-y-3 mb-6">
                    {question.options.map((option, index) => (
                      <div
                        key={index}
                        onClick={() => handleAnswerSelect(index)}
                        className={getOptionClass(index)}
                      >
                        <div className="flex items-start gap-3">
                          <span className="text-gray-700 flex-1">{option}</span>
                          {showRationale && index === question.correctAnswer && (
                            <div className="flex-shrink-0 mt-1"><CheckCircle /></div>
                          )}
                          {showRationale && selectedAnswer === index && index !== question.correctAnswer && (
                            <div className="flex-shrink-0 mt-1"><XCircle /></div>
                          )}
                        </div>
                      </div>
                    ))}
                  </div>

                  {showRationale && (
                    <div className="bg-blue-50 border-l-4 border-blue-500 p-4 mb-6">
                      <h3 className="font-semibold text-blue-900 mb-2">Explanation:</h3>
                      <p className="text-blue-800 leading-relaxed">{question.rationale}</p>
                    </div>
                  )}

                  <div className="flex gap-3">
                    <button
                      onClick={handlePrevious}
                      disabled={currentQuestion === 0}
                      className="px-4 py-2 rounded-lg border-2 border-gray-300 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition-colors flex items-center gap-2"
                    >
                      <ChevronLeft />
                      Previous
                    </button>
                    
                    {!showRationale ? (
                      <button
                        onClick={handleSubmit}
                        disabled={selectedAnswer === null}
                        className="flex-1 bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                      >
                        Submit Answer
                      </button>
                    ) : (
                      <button
                        onClick={handleNext}
                        className="flex-1 bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 transition-colors flex items-center justify-center gap-2"
                      >
                        {currentQuestion < questionsData.length - 1 ? (
                          <>
                            Next Question
                            <ChevronRight />
                          </>
                        ) : (
                          <>
                            Finish Quiz
                            <CheckCircle />
                          </>
                        )}
                      </button>
                    )}
                  </div>
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ITEQuizApp />);
    </script>
</body>
</html>
