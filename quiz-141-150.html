<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        // ── SAVE QUIZ RESULT FOR SCORE CALCULATOR ──
        // Call this function when the quiz is scored / results are shown.
        function saveQuizResult(correctCount, totalCount, missedQuestionsArray) {
          try {
            localStorage.setItem(
              'ite_quiz_result_2025_15',
              JSON.stringify({
                correct: correctCount,        // number of correct answers, e.g. 7
                total:   totalCount,          // total questions, always 10
                missed:  missedQuestionsArray // array of question numbers wrong, e.g. [2, 5, 9]
              })
            );
          } catch(e) {}
        }


        const ChevronLeft = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" /></svg>;
        const ChevronRight = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" /></svg>;
        const CheckCircle = () => <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd" /></svg>;
        const XCircle = () => <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clipRule="evenodd" /></svg>;

        const Trophy = () => <svg className="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z" /></svg>;

        const questionsData = [
  {
    "id": 141,
    "question": "A 72-year-old male presents to your office with his daughter who is concerned about her father's recent decline in memory. His history is notable for hypertension, urinary urgency with occasional incontinence, and GERD. On examination, you notice a slow, wide-based gait. A Mini-Mental State Examination (MMSE) score is 22/30. MRI of the brain is notable for diffuse dilation of the lateral, third, and fourth ventricles, and the diagnosis is confirmed with a high-volume lumbar puncture. Which one of the following is the most appropriate treatment for this condition?",
    "options": [
      "A) Carbidopa/levodopa (Sinemet), 12.5/50 mg daily",
      "B) Donepezil (Aricept), 5 mg daily",
      "C) Levothyroxine (Synthroid), 50 μg daily",
      "D) Ventriculoperitoneal shunt",
      "E) Surgery with postoperative chemotherapy"
    ],
    "correctAnswer": 3,
    "rationale": "This patient presents with the classic triad symptoms associated with normal-pressure hydrocephalus: gait change, urinary incontinence, and dementia. MRI will show evidence of hydrocephalus, and gait changes will often improve with high-volume removal of cerebrospinal fluid. Treatment involves placing a ventriculoperitoneal shunt to relieve hydrocephalus. Carbidopa/levodopa, donepezil, levothyroxine, and surgery with chemotherapy are all treatments for other causes of dementia including Parkinson disease with Lewy body dementia, Alzheimer dementia, hypothyroidism, and brain tumor or neoplasm, respectively."

    "options": [
      "A) Repeating the urinalysis in 1 month",
      "B) Initiating empiric antibiotic therapy and re-evaluating in 1 week",
      "C) Ordering urine cytology",
      "D) Referring the patient for immediate cystoscopy and imaging studies"
    ],
    "correctAnswer": 3,
    "rationale": "The American College of Physicians recommends that all adults with gross hematuria be referred for further urologic evaluation, including cystoscopy and imaging, due to the high association with malignancy. The sensitivity and specificity of cystoscopy for detecting bladder cancer are high, with a sensitivity ranging from 87% to 100% and a specificity of 64% to 100%. The positive predictive value of gross hematuria for urologic malignancy in older men is high. Gross hematuria warrants immediate investigation to rule out serious underlying conditions; thus a repeat urinalysis in 1 month would not be appropriate. Initiating empiric antibiotic therapy and re-evaluating in 1 week would not be appropriate without evidence of infection. Urine cytology has limited sensitivity and specificity and should not replace cystoscopy and imaging for the initial evaluation of hematuria."

  },
  {

    "question": "A 35-year-old female with type 1 diabetes presents with a skin lesion on her leg. The lesion began as a small, dusky red, elevated nodule with a sharply circumscribed border, and slowly enlarged to become the lesion shown below. The most likely diagnosis is",
    "options": [

    "question": "Metformin can cause which one of the following?",
    "options": [
      "A) Chromatopsia",

      "C) Renal failure",

    ],
    "correctAnswer": 3,
    "rationale": "Asymptomatic vitamin B deficiency has been reported in a significant proportion of 12 patients taking metformin (SOR A). A randomized, placebo-controlled trial showed that patients taking metformin had a 19% decrease in vitamin B levels and a 7% increase in 12 absolute risk of vitamin B deficiency compared to the placebo group. 12 Chromatopsia, which is a visual disturbance of color perception, is associated with use of phosphodiesterase-5 inhibitors, such as sildenafil. Metformin use is not associated with ileus. Although metformin use is contraindicated in patients with impaired renal function, metformin itself does not cause renal failure. Because diarrhea occurs relatively frequently with metformin therapy, metformin use is not commonly associated with weight gain."
  },
  {
    "id": 146,
    "question": "A 3-year-old female is brought to your office by her parents with fever, cough, and decreased appetite. On examination you hear crackles in the left upper lobe and a chest x-ray confirms a left upper lobe consolidation. She appears well hydrated and her vital signs are normal. On examination she is drinking water and interacting normally. Which one of the following would be the most appropriate antibiotic for this patient's condition?",
    "options": [
      "A) Amoxicillin",
      "B) Azithromycin (Zithromax)",
      "C) Cefdinir",
      "D) Doxycycline",
      "E) Sulfamethoxazole/trimethoprim"
    ],
    "correctAnswer": 0,
    "rationale": "The majority of cases of community-acquired pneumonia (CAP) in children are caused by viruses. If bacterial pneumonia were suspected, then antibiotics would be warranted. Given this patient's focal lung examination and x-ray findings, the most likely causative bacteria would be a typical pathogen such as Streptococcus pneumoniae or Haemophilus influenzae. The first-line choice of antibiotics would be amoxicillin for 7 days. Azithromycin is appropriate for treatment of atypical pneumonia. While cefdinir does treat the typical pathogens seen in CAP, it would not be recommended for first-line treatment due to its broader spectrum. Doxycycline is used to treat CAP but should not be used in a 3-year-old. Sulfamethoxazole/trimethoprim is not indicated for CAP treatment."
  },
  {
    "id": 147,
    "question": "A 35-year-old male presents to the urgent care clinic with pain in his right index finger after jamming it during basketball practice. An examination demonstrates a gross deformity of the proximal interphalangeal (PIP) joint of the affected finger. There is dorsal angulation of the proximal phalanx. Capillary refill, sensation, and pulses are all intact. Because the patient has pain with attempted movement of the finger, a digital block using 1% lidocaine without epinephrine is used to complete the examination. Complete x-rays, including true lateral films, reveal a very small fracture of the middle phalanx involving a minimal (<20%) area of the articular surface. Which one of the following would be the most appropriate next step in the treatment of this patient's finger dislocation?",
    "options": [
      "A) Discharging home, and repeating x-rays in 1 week",
      "B) Reduction, followed by splinting in a flexed position and buddy taping",

    ],
    "correctAnswer": 1,
    "rationale": "This patient has a dorsal dislocation of the proximal interphalangeal (PIP) joint of the finger, which is the most commonly dislocated joint in the body. Examination of the patient's finger reveals intact neurovascular findings. Conservative management is indicated given the limited articular surface involvement. A simple, stable dorsal PIP dislocation can be managed with in-office reduction, followed by splinting in approximately 30° of flexion for 2–4 weeks. Buddy taping is also recommended to prevent hyperextension deformities. X- rays should be repeated directly after reduction, and again in 1 week. Neither MRI nor physical therapy are indicated. Immediate surgical referral is necessary for finger fracture-dislocations that are irreducible, unstable after reduction, or involve significant soft tissue, tendon, or neurovascular injury. Additional indications include fractures involving a large portion of the articular surface (typically >30%), significant displacement or angulation (>15°), malrotation, comminution, and persistent subluxation or dislocation on imaging. Open fractures (exposed bone or joint) and injuries with vascular compromise or loss of function also require urgent surgical evaluation."

    "options": [
      "A) Supportive care only",

  {

    "question": "A 49-year-old female with a past medical history of epilepsy presents to your office because of sadness, sleep disruption, generalized anhedonia, and a recent increase in appetite. Her Patient Health Questionnaire–9 (PHQ-9) score is elevated at 14. Which one of the following medications should be AVOIDED in this patient?",
    "options": [
      "A) Bupropion",

    "correctAnswer": 0,

  },
  {
    "id": 150,
    "question": "A 20-year-old female presents for a health maintenance examination. She has no significant past medical history and no concerns. Based on U.S. Preventive Services Task Force guidelines, screening for which one of the following would be most appropriate at this time?",
    "options": [
      "A) Hepatitis C",
      "B) Hyperlipidemia",
      "C) Cervical cancer",
      "D) Skin cancer"
    ],
    "correctAnswer": 0,
    "rationale": "The U.S. Preventive Services Task Force gives a B recommendation for screening for hepatitis C in individuals 18–79 years of age. Cervical cancer screening is not recommended until at least age 21 (A recommendation). Evidence for screening for hyperlipidemia and skin cancer is uncertain. Current evidence is insufficient to assess the balance of the benefits and harms of visual skin examination to screen for skin cancer (I recommendation), but counseling for ultraviolet exposure is recommended for persons 6 months to 24 years of age with fair skin types (B recommendation)."
  }
];

        function ITEQuizApp() {
          const [currentQuestion, setCurrentQuestion] = useState(0);
          const [selectedAnswer, setSelectedAnswer] = useState(null);
          const [showRationale, setShowRationale] = useState(false);
          const [score, setScore] = useState(0);
          const [answeredQuestions, setAnsweredQuestions] = useState([]);
          const [quizComplete, setQuizComplete] = useState(false);

          const question = questionsData[currentQuestion];

          const handleAnswerSelect = (index) => {
            if (!showRationale) {
              setSelectedAnswer(index);
            }
          };

          const handleSubmit = () => {
            if (selectedAnswer !== null && !showRationale) {
              setShowRationale(true);
              const isCorrect = selectedAnswer === question.correctAnswer;
              
              if (isCorrect) {
                setScore(score + 1);
              }
              
              setAnsweredQuestions([...answeredQuestions, {
                questionId: question.id,
                correct: isCorrect
              }]);
            }
          };

          const handleNext = () => {
            if (currentQuestion < questionsData.length - 1) {
              setCurrentQuestion(currentQuestion + 1);
              setSelectedAnswer(null);
              setShowRationale(false);
            } else {
              setQuizComplete(true);
            }
          };

          const handlePrevious = () => {
            if (currentQuestion > 0) {
              setCurrentQuestion(currentQuestion - 1);
              setSelectedAnswer(null);
              setShowRationale(false);
            }
          };

          const handleRestart = () => {
            setCurrentQuestion(0);
            setSelectedAnswer(null);
            setShowRationale(false);
            setScore(0);
            setAnsweredQuestions([]);
            setQuizComplete(false);
          };

          const getOptionClass = (index) => {
            let baseClass = "p-4 mb-3 rounded-lg border-2 cursor-pointer transition-all ";
            
            if (!showRationale) {
              if (selectedAnswer === index) {
                return baseClass + "border-blue-500 bg-blue-50";
              }
              return baseClass + "border-gray-300 hover:border-blue-300 hover:bg-gray-50";
            } else {
              if (index === question.correctAnswer) {
                return baseClass + "border-green-500 bg-green-50";
              }
              if (selectedAnswer === index && index !== question.correctAnswer) {
                return baseClass + "border-red-500 bg-red-50";
              }
              return baseClass + "border-gray-300 bg-gray-50";
            }
          };

          if (quizComplete) {
            const percentage = Math.round((score / questionsData.length) * 100);
            
            return (
              <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
                <div className="max-w-2xl mx-auto">
                  <div className="bg-white rounded-xl shadow-lg p-8 text-center">
                    <div className="flex justify-center mb-4"><Trophy /></div>
                    <h1 className="text-3xl font-bold mb-4 text-gray-800">Quiz Complete!</h1>
                    <div className="mb-6">
                      <p className="text-6xl font-bold text-indigo-600 mb-2">{percentage}%</p>
                      <p className="text-xl text-gray-600">
                        You scored {score} out of {questionsData.length}
                      </p>
                    </div>
                    
                    <div className="mb-6 p-4 bg-gray-50 rounded-lg">
                      <h3 className="font-semibold mb-3 text-gray-700">Results Summary:</h3>
                      <div className="space-y-2">
                        {answeredQuestions.map((answer, idx) => (
                          <div key={idx} className="flex items-center justify-between">
                            <span className="text-gray-600">Question {answer.questionId}</span>
                            <div className="flex items-center">
                              {answer.correct ? <CheckCircle /> : <XCircle />}
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                    
                    <button
                      onClick={handleRestart}
                      className="bg-indigo-600 text-white px-8 py-3 rounded-lg hover:bg-indigo-700 transition-colors inline-flex items-center gap-2"
                    >
                      <RotateCcw />
                      Start Over
                    </button>
                  </div>
                </div>
              </div>
            );
          }

          return (
            <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
              <div className="max-w-4xl mx-auto">
                <div className="bg-white rounded-xl shadow-lg p-6 mb-6">
                  <div className="flex items-center justify-between mb-4">
                    <h1 className="text-2xl font-bold text-gray-800 flex items-center gap-2">
                      <BookOpen />
                      2025 ITE Quiz (Questions 141-150)
                    </h1>
                    <div className="text-right">
                      <p className="text-sm text-gray-600">Score</p>
                      <p className="text-2xl font-bold text-indigo-600">{score}/{answeredQuestions.length}</p>
                    </div>
                  </div>
                  
                  <div className="flex items-center gap-2 mb-2">
                    <div className="flex-1 bg-gray-200 rounded-full h-2">
                      <div 
                        className="bg-indigo-600 h-2 rounded-full transition-all duration-300"
                        style={{ width: `${((currentQuestion + 1) / questionsData.length) * 100}%` }}
                      />
                    </div>
                    <span className="text-sm text-gray-600 whitespace-nowrap">
                      {currentQuestion + 1} / {questionsData.length}
                    </span>
                  </div>
                </div>

                <div className="bg-white rounded-xl shadow-lg p-6 mb-6">
                  <div className="mb-6">
                    <p className="text-sm text-gray-500 mb-2">Question {question.id}</p>
                    <p className="text-lg text-gray-800 leading-relaxed">{question.question}</p>
                    {question.image && (
                      <div className="mt-4">
                        <img src={question.image} alt={`Question ${question.id} figure`} className="max-w-full rounded-lg border" />
                      </div>
                    )}
                  </div>

                  <div className="space-y-3 mb-6">
                    {question.options.map((option, index) => (
                      <div
                        key={index}
                        onClick={() => handleAnswerSelect(index)}
                        className={getOptionClass(index)}
                      >
                        <div className="flex items-start gap-3">
                          <span className="text-gray-700 flex-1">{option}</span>
                          {showRationale && index === question.correctAnswer && (
                            <div className="flex-shrink-0 mt-1"><CheckCircle /></div>
                          )}
                          {showRationale && selectedAnswer === index && index !== question.correctAnswer && (
                            <div className="flex-shrink-0 mt-1"><XCircle /></div>
                          )}
                        </div>
                      </div>
                    ))}
                  </div>

                  {showRationale && (
                    <div className="bg-blue-50 border-l-4 border-blue-500 p-4 mb-6">
                      <h3 className="font-semibold text-blue-900 mb-2">Explanation:</h3>
                      <p className="text-blue-800 leading-relaxed">{question.rationale}</p>
                    </div>
                  )}

                  <div className="flex gap-3">
                    <button
                      onClick={handlePrevious}
                      disabled={currentQuestion === 0}
                      className="px-4 py-2 rounded-lg border-2 border-gray-300 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition-colors flex items-center gap-2"
                    >
                      <ChevronLeft />
                      Previous
                    </button>
                    
                    {!showRationale ? (
                      <button
                        onClick={handleSubmit}
                        disabled={selectedAnswer === null}
                        className="flex-1 bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                      >
                        Submit Answer
                      </button>
                    ) : (
                      <button
                        onClick={handleNext}
                        className="flex-1 bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 transition-colors flex items-center justify-center gap-2"
                      >
                        {currentQuestion < questionsData.length - 1 ? (
                          <>
                            Next Question
                            <ChevronRight />
                          </>
                        ) : (
                          <>
                            Finish Quiz
                            <CheckCircle />
                          </>
                        )}
                      </button>
                    )}
                  </div>
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ITEQuizApp />);
    </script>
</body>
</html>
