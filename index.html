<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ABFM Study Resource Hub</title>
  <style>
    :root {
      --bg-main: #f8fafc;
      --bg-card: #ffffff;
      --primary: #2563eb;
      --success: #10b981;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --accent: #f1f5f9;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      --radius: 12px;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      line-height: 1.6;
      padding: 40px 20px;
    }

    .container { max-width: 1000px; margin: 0 auto; }

    header { text-align: center; margin-bottom: 40px; }
    header h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 10px; letter-spacing: -0.025em; }
    
    /* Collapsible Sections */
    details {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 16px;
      overflow: hidden;
    }

    summary {
      padding: 20px 24px;
      list-style: none;
      cursor: pointer;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    summary:hover { background-color: var(--accent); }
    summary::after { content: '＋'; color: var(--primary); }
    details[open] summary::after { content: '－'; }

    .content-wrapper { padding: 0 24px 24px; border-top: 1px solid var(--border); }

    /* Quiz Grid & Progress Styles */
    .quiz-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      margin-top: 20px;
    }

    .quiz-card {
      background: var(--accent);
      border: 1px solid var(--border);
      padding: 16px;
      border-radius: 8px;
      text-decoration: none;
      color: var(--text-main);
      text-align: center;
      transition: all 0.2s ease;
      position: relative;
    }

    .quiz-card:hover { border-color: var(--primary); transform: translateY(-2px); }

    /* Completed State */
    .quiz-card.completed {
      background: #ecfdf5;
      border-color: var(--success);
    }
    
    .quiz-card.completed h3::after {
      content: ' ✓';
      color: var(--success);
      font-weight: bold;
    }

    .quiz-card h3 { font-size: 0.95rem; margin-bottom: 4px; }
    .quiz-card p { font-size: 0.75rem; opacity: 0.8; }

    .btn-reset {
      margin-top: 20px;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
    }

    .btn-reset:hover { background: #fee2e2; color: #dc2626; }

    footer { text-align: center; margin-top: 40px; color: var(--text-muted); }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>ABFM Study Hub</h1>
      <p>Progress is saved automatically as you study.</p>
    </header>

    <details open>
      <summary>ITE 2025 Quizzes</summary>
      <div class="content-wrapper">
        <div class="quiz-grid">
          <a href="quiz-01-10.html" class="quiz-card" data-quiz-id="2025-q1"><h3>Quiz 1</h3><p>Q 1–10</p></a>
          <a href="quiz-11-20.html" class="quiz-card" data-quiz-id="2025-q2"><h3>Quiz 2</h3><p>Q 11–20</p></a>
          </div>
      </div>
    </details>

    <details>
      <summary>ITE 2024 Quizzes</summary>
      <div class="content-wrapper">
        <div class="quiz-grid">
          <a href="ite2024-quiz-001-010.html" class="quiz-card" data-quiz-id="2024-q1"><h3>Quiz 1</h3><p>Q 1–10</p></a>
        </div>
      </div>
    </details>

    <footer>
      <button class="btn-reset" onclick="resetProgress()">Clear All Progress</button>
      <p style="margin-top:20px;">Built for FM Residents</p>
    </footer>
  </div>

  <script>
    // Load progress on page load
    document.addEventListener('DOMContentLoaded', () => {
      const completed = JSON.parse(localStorage.getItem('ite_progress') || '[]');
      completed.forEach(id => {
        const card = document.querySelector(`[data-quiz-id="${id}"]`);
        if (card) card.classList.add('completed');
      });

      // Track clicks
      document.querySelectorAll('.quiz-card').forEach(card => {
        card.addEventListener('click', function() {
          const id = this.getAttribute('data-quiz-id');
          let progress = JSON.parse(localStorage.getItem('ite_progress') || '[]');
          
          if (!progress.includes(id)) {
            progress.push(id);
            localStorage.setItem('ite_progress', JSON.stringify(progress));
            this.classList.add('completed');
          }
        });
      });
    });

    function resetProgress() {
      if (confirm('Clear all your study progress?')) {
        localStorage.removeItem('ite_progress');
        location.reload();
      }
    }
  </script>
</body>
</html>
