<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        const ChevronLeft = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" /></svg>;
        const ChevronRight = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" /></svg>;
        const CheckCircle = () => <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd" /></svg>;

        const questionsData = [
  {
    "id": 191,
    "question": "A 48-year-old female presents to your office because of an erythematous rash on her left posterior \ncalf and right posterior thigh (shown below). Five days ago she was stung by wasps in those \nlocations. The stings were initially associated with intense pain and small areas of erythema that have \nsince expanded to approximately 10-cm erythematous patches surrounding the original sting sites. \n \nOn examination there are erythematous patches on her left posterior calf and right posterior thigh \nwith warmth, induration, and tenderness to palpation. She does not have any fevers or chills. The \nexamination findings are otherwise within normal limits. \nWhich one of the following would be the most appropriate treatment at this time?",
    "options": [
      "A) Topical neomycin/polymyxin B/pramoxine (Neosporin)",
      "B) Oral cephalexin",
      "C) Oral diphenhydramine",
      "D) Oral prednisone",
      "E) Oral sulfamethoxazole/trimethoprim (Bactrim)"
    ],
    "correctAnswer": 3,
    "rationale": "This patient is experiencing a large local reaction to an insect sting, occurring between \na few days to 1 week after the initial sting. This occurs in about 19% of reactions and \ncarries a 5%–10% risk for a systemic reaction in subsequent exposures. The treatment \nis prednisone, 40–60 mg daily for 3–5 days. This is not an infection but rather a \nreaction to the Hymenoptera sting, so oral or topical antibiotics are not indicated. \nAntihistamines such as diphenhydramine are useful for pruritus but are not a treatment \nfor the reaction.",
    "image": "quiz_images_2024/2024_mc_page_078.png"
  },
  {
    "id": 192,
    "question": "A 39-year-old female presents with a sudden onset of palpitations. Her vital signs include a blood \npressure of 114/68 mm Hg and a pulse rate of 166 beats/min. She is cooperative and alert. An EKG \nshows regular narrow complex tachycardia with normal intervals. She has tried vagal maneuvers with \nno improvement. \n \nWhich one of the following would be the most appropriate treatment at this time?",
    "options": [
      "A) Adenosine",
      "B) Atropine",
      "C) Diltiazem (Cardizem)",
      "D) Metoprolol",
      "E) Synchronized cardioversion"
    ],
    "correctAnswer": 0,
    "rationale": "If vagal maneuvers are not effective in the management of stable supraventricular \ntachycardia (SVT), the most appropriate next step is treatment with intravenous \nadenosine at an initial dose of 6 mg. Atropine is a treatment option for bradycardia, \nparticularly in the setting of heart block. Diltiazem or metoprolol may be used acutely in \natrial fibrillation or in the prevention of SVT. Synchronized cardioversion is indicated in \npatients with SVT who become hypotensive or unresponsive."
  },
  {
    "id": 193,
    "question": "A 29-year-old female presents with low back pain that began after giving birth 3 months ago. She \nreports pain on her right side when climbing and descending stairs and when lying on her right side. \nOn examination she has mild lumbar paraspinal muscle tightness on the left and moderate tenderness \ninferomedial to the posterior superior iliac spine on the right. Muscle strength testing and lower \nextremity reflexes are normal. \n \nWhich one of the following conditions is the most likely cause of this patient’s pain?",
    "options": [
      "A) Lumbar strain",
      "B) Piriformis syndrome",
      "C) Pudendal nerve entrapment",
      "D) Sacroiliac joint dysfunction",
      "E) Spondyloarthropathy"
    ],
    "correctAnswer": 3,
    "rationale": "Sacroiliac joint dysfunction is commonly seen in primary care and is an important \nconsideration in the evaluation of low back pain. It often occurs during pregnancy and \npost partum. Other inciting incidents include a motor vehicle accident or a mechanical \nfall onto the buttocks. It can be associated with ankylosing spondylitis and other \nspondyloarthropathies; however, the etiology in this case is more likely to be childbirth. \nSymptoms often include pain at the sacroiliac joint that worsens with climbing stairs, \nlying on the affected side, prolonged standing and sitting, and weight-bearing on the \nleg of the affected side. Examination findings include tenderness that is inferomedial to \nthe posterior superior iliac spine. A number of provocation tests for sacroiliac joint \ndysfunction can help to confirm the diagnosis. NSAIDs, physical therapy, and joint \nmanipulation are first-line treatments. Pelvic belts, corticosteroid injections, and \nsacroiliac joint fusion are used for refractory cases.  \n \nLumbar strain is in the differential diagnosis, but sacroiliac joint dysfunction is more \nlikely given this patient’s history and the duration and location of tenderness. Piriformis \nsyndrome is usually unilateral and causes sciatic-like symptoms. Pudendal nerve \nentrapment would cause perineal pain or labial numbness. Spondyloarthropathies are \nassociated with sacroiliac joint inflammation but are not as likely in this postpartum \npatient."
  },

    "correctAnswer": 0,

  {
    "id": 195,
    "question": "A 52-year-old male presents to the emergency department with a sudden onset of what he describes \nas the worst headache of his life. You are concerned about the possibility of an intracranial \nhemorrhage. \n \nAfter performing an examination to rule out neurologic deficits, which one of the follo\nwing would be \nthe most appropriate next step in evaluation?",
    "options": [
      "A) CT of the head without contrast",

    ],
    "correctAnswer": 0,
    "rationale": "A patient describing a headache as the worst headache of their life can be a red-flag \nsymptom of an intracranial hemorrhage, and CT of the head without contrast is the \nrecommended next step in evaluation. Contrast should not be used because it can \nobscure the signs of bleeding. If a subarachnoid hemorrhage is suspected, CT of the \nhead should be completed before performing a lumbar puncture to ensure there is no \nevidence of intracranial hemorrhage or midline shift."
  },
  {
    "id": 196,
    "question": "A 45-year-old male with a history of hypertension and poorly controlled anxiety and depression \npresents to your office to establish care. He requests refills of his current medications, which include \nthe following: \nAlprazolam (Xanax), 0.5 mg nightly \nBuspirone, 10 mg 3 times daily \nGabapentin (Neurontin), 600 mg 3 times daily \nLorazepam (Ativan), 1 mg twice daily \nLosartan (Cozaar), 50 mg daily \nSertraline (Zoloft), 200 mg daily \nYou tell the patient that you will provide refills for buspirone, gabapentin, losartan, and sertraline \nwithout dosage adjustments; however, he will need to taper and ultimately discontinue the alprazolam \nand lorazepam. You both agree hospitalization is not necessary. After discussion, the patient agrees \nwith your approach. \n \nIn addition to cognitive behavioral therapy, which one of the following strategies would be most \nappropriate for this patient?",
    "options": [
      "A) Discontinuing both benzodiazepines and initiating buprenorphine maintenance therapy",
      "B) Discontinuing both benzodiazepines and initiating flumazenil maintenance therapy",
      "C) Discontinuing lorazepam now and gradually decreasing alprazolam over 6 months",
      "D) Tapering the alprazolam and lorazepam dosages simultaneously over 6 months",
      "E) Switching both alprazolam and lorazepam to diazepam (Valium), and then decreasing the \ndiazepam dosage over 6 months"
    ],
    "correctAnswer": 4,
    "rationale": "Benzodiazepine prescriptions and overdoses have increased over the last 15 years and \nlong-term benzodiazepine use is rarely recommended. Current recommendations \ninclude the following: substitution of multiple benzodiazepines for a single longer-acting \nbenzodiazepine such as diazepam, tapering of medication over weeks to months, and \nuse of cognitive behavioral therapy. Buprenorphine is indicated for patients with opioid \nuse disorder and can be helpful for patients who are taking both opioids and \nbenzodiazepines. Flumazenil is an intravenous injection that is used for benzodiazepine \noverdoses and reversing benzodiazepine sedation. It is not used in maintenance \ntherapy for benzodiazepine cessation."
  },
  {
    "id": 197,
    "question": "A 15-year-old female is brought to your office in May with a 3-week history of nasal congestion, \nsneezing, and itchy eyes. She reports that these episodes occur every spring and last about 6 weeks. \nShe has been taking oral cetirizine (Zyrtec) with no improvement. You initiate an intranasal \ncorticosteroid. \n \nThe patient returns for follow-up 4 weeks later and says that she has seen some improvement but is \ndissatisfied with her progress. The patient and her parent ask about further steps in diagnosis. \n \nWhich one of the following would be the most appropriate next step in diagnosis?",
    "options": [
      "A) A CBC",
      "B) Skin allergen testing",
      "C) Serum allergy testing",
      "D) Chest radiography",
      "E) Sinus CT"
    ],
    "correctAnswer": 1,
    "rationale": "This patient most likely has seasonal allergic rhinitis that has not responded to empiric \ntreatment. The most appropriate next step in diagnosis is skin allergen testing. Serum \nallergy testing is more expensive and less specific than skin allergen testing. It also \ndoes not provide the immediate results of skin allergen testing.  \n \nA CBC will likely show eosinophilia, given the patient’s likely diagnosis of allergic rhinitis. \nHowever, this is a nonspecific finding. This patient likely does not have a true \nrespiratory illness such as pneumonia, so a chest x-ray would not be appropriate. Sinus \nCT likely will not lead to actionable management. It is also expensive and carries the \nrisk for radiation exposure, which needs to be weighed carefully in a pediatric patient."

    ],
    "correctAnswer": 0,
    "rationale": "Achalasia is a smooth muscle motility disorder that impairs swallowing of both solids \nand liquids. In contrast, anatomic causes of dysphagia that impede the lumen of the \nesophagus through mass effect or inflammation, such as eosinophilic esophagitis, \nesophageal cancer, esophageal stricture, and Schatzki rings, typically impair swallowing \nof solids but not liquids."

  {
    "id": 199,
    "question": "A 55-year-old male with a medical history of GERD and osteoarthritis presents to the emergency \ndepartment 2 hours after a sudden onset of intense epigastric pain. He takes naproxen almost daily for \njoint pain. \n \nOn examination the patient is noticeably pale. His vital signs include a blood pressure of 90/60 mm \nHg and a pulse rate of 125 beats/min. He is exquisitely tender to palpation in his abdomen, \nparticularly at the epigastrium. There is no fluid wave or hepatomegaly. You do not note any obvious \nstigmata of chronic liver disease. \n \nWhich one of the following tests should be performed to assist in the diagnosis?",
    "options": [

      "C) Abdominal and pelvic CT",
      "D) Abdominal paracentesis",

    "correctAnswer": 2,
    "rationale": "This patient most likely has a perforated peptic ulcer and the recommended test is CT \nof the abdomen and pelvis. Aortic ultrasonography is not productive in this case, as the \npatient’s symptoms are unlikely to be caused by an abdominal aortic aneurysm. \nAbdominal radiography lacks the definition to visualize a perforated peptic ulcer. This \npatient's abdomen is not distended, and it is unlikely that abdominal paracentesis will \nyield the diagnosis or be therapeutic. Exploratory laparotomy is excessive and \npremature, as CT is diagnostic and less invasive."
  },
  {
    "id": 200,
    "question": "A 55-year-old male presents for evaluation of recent-onset tinnitus that has adversely affected his \nsleep and concentration. A physical examination including otoscopy is unremarkable. \n \nWhich one of the following additional findings, if present, would be an indication for head imaging?",
    "options": [
      "A) Associated development of major depressive disorder",
      "B) Bilateral hearing loss on audiometry",
      "C) Lack of improvement with a trial of a tricyclic antidepressant",
      "D) A pulsatile quality of the tinnitus",
      "E) Symptom duration >6 months"
    ],
    "correctAnswer": 3,
    "rationale": "Tinnitus is a common problem that is experienced by up to 25% of adults, although \n<10% of affected individuals report bothersome symptoms that impair sleep, focus, \nemotions, or general quality of life. Audiometry should be performed for patients with \nsevere or persistent symptoms, as hearing loss is a common comorbid finding. \nEvaluation for potential structural causes with MRI or CT of the temporal bone is \nindicated for any of the following: a pulsatile quality of the tinnitus, unilateral tinnitus, \nasymmetric hearing loss, or focal neurologic findings. Of the options given in this clinical \nscenario, only pulsatile tinnitus would provide an indication for head imaging.  \nWhile patients with tinnitus may be more susceptible to mood disturbances due to the \nadverse impact on quality of life and functioning that their symptoms may cause, an \nassociated onset of major depression would not provide a reason to order diagnostic \nhead imaging. Bilateral hearing loss on audiometry is often noted in the setting of \ntinnitus and does not suggest the presence of a structural lesion. No medication \nstrategies have proven effective to treat tinnitus; thus, prescribing a tricyclic \nantidepressant would not be expected to provide benefit. Symptoms often persist for \nmonths to years; the duration of symptoms alone does not provide a reason to order \nhead imaging."
  }
];

        function ITEQuizApp() {
          const [currentQuestion, setCurrentQuestion] = useState(0);
          const [selectedAnswer, setSelectedAnswer] = useState(null);
          const [showRationale, setShowRationale] = useState(false);
          const [score, setScore] = useState(0);
          const [answeredQuestions, setAnsweredQuestions] = useState([]);
          const [quizComplete, setQuizComplete] = useState(false);

          const question = questionsData[currentQuestion];

          const handleAnswerSelect = (index) => {
            if (!showRationale) {
              setSelectedAnswer(index);
            }
          };

          const handleSubmit = () => {
            if (selectedAnswer !== null && !showRationale) {
              setShowRationale(true);
              const isCorrect = selectedAnswer === question.correctAnswer;
              
              if (isCorrect) {
                setScore(score + 1);
              }
              
              setAnsweredQuestions([...answeredQuestions, {
                questionId: question.id,
                correct: isCorrect
              }]);
            }
          };

          const handleNext = () => {
            if (currentQuestion < questionsData.length - 1) {
              setCurrentQuestion(currentQuestion + 1);
              setSelectedAnswer(null);
              setShowRationale(false);
            } else {
              setQuizComplete(true);
            }
          };

          const handlePrevious = () => {
            if (currentQuestion > 0) {
              setCurrentQuestion(currentQuestion - 1);
              setSelectedAnswer(null);
              setShowRationale(false);
            }
          };

          const handleRestart = () => {
            setCurrentQuestion(0);
            setSelectedAnswer(null);
            setShowRationale(false);
            setScore(0);
            setAnsweredQuestions([]);
            setQuizComplete(false);
          };

          const getOptionClass = (index) => {
            let baseClass = "p-4 mb-3 rounded-lg border-2 cursor-pointer transition-all ";
            
            if (!showRationale) {
              if (selectedAnswer === index) {
                return baseClass + "border-blue-500 bg-blue-50";
              }
              return baseClass + "border-gray-300 hover:border-blue-300 hover:bg-gray-50";
            } else {
              if (index === question.correctAnswer) {
                return baseClass + "border-green-500 bg-green-50";
              }
              if (selectedAnswer === index && index !== question.correctAnswer) {
                return baseClass + "border-red-500 bg-red-50";
              }
              return baseClass + "border-gray-300 bg-gray-50";
            }
          };

          if (quizComplete) {
            const percentage = Math.round((score / questionsData.length) * 100);
            
            return (
              <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
                <div className="max-w-2xl mx-auto">
                  <div className="bg-white rounded-xl shadow-lg p-8 text-center">
                    <div className="flex justify-center mb-4"><Trophy /></div>
                    <h1 className="text-3xl font-bold mb-4 text-gray-800">Quiz Complete!</h1>
                    <div className="mb-6">
                      <p className="text-6xl font-bold text-indigo-600 mb-2">{percentage}%</p>
                      <p className="text-xl text-gray-600">
                        You scored {score} out of {questionsData.length}
                      </p>
                    </div>
                    
                    <div className="mb-6 p-4 bg-gray-50 rounded-lg">
                      <h3 className="font-semibold mb-3 text-gray-700">Results Summary:</h3>
                      <div className="space-y-2">
                        {answeredQuestions.map((answer, idx) => (
                          <div key={idx} className="flex items-center justify-between">
                            <span className="text-gray-600">Question {answer.questionId}</span>
                            <div className="flex items-center">
                              {answer.correct ? <CheckCircle /> : <XCircle />}
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                    
                    <button
                      onClick={handleRestart}
                      className="bg-indigo-600 text-white px-8 py-3 rounded-lg hover:bg-indigo-700 transition-colors inline-flex items-center gap-2"
                    >
                      <RotateCcw />
                      Start Over
                    </button>
                  </div>
                </div>
              </div>
            );
          }

          return (
            <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
              <div className="max-w-4xl mx-auto">
                <div className="bg-white rounded-xl shadow-lg p-6 mb-6">
                  <div className="flex items-center justify-between mb-4">
                    <h1 className="text-2xl font-bold text-gray-800 flex items-center gap-2">
                      <BookOpen />
                      2024 ITE Quiz (Questions 191-200)
                    </h1>
                    <div className="text-right">
                      <p className="text-sm text-gray-600">Score</p>
                      <p className="text-2xl font-bold text-indigo-600">{score}/{answeredQuestions.length}</p>
                    </div>
                  </div>
                  
                  <div className="flex items-center gap-2 mb-2">
                    <div className="flex-1 bg-gray-200 rounded-full h-2">
                      <div 
                        className="bg-indigo-600 h-2 rounded-full transition-all duration-300"
                        style={{ width: `${((currentQuestion + 1) / questionsData.length) * 100}%` }}
                      />
                    </div>
                    <span className="text-sm text-gray-600 whitespace-nowrap">
                      {currentQuestion + 1} / {questionsData.length}
                    </span>
                  </div>
                </div>

                <div className="bg-white rounded-xl shadow-lg p-6 mb-6">
                  <div className="mb-6">
                    <p className="text-sm text-gray-500 mb-2">Question {question.id}</p>
                    <p className="text-lg text-gray-800 leading-relaxed">{question.question}</p>
                    {question.image && (
                      <div className="mt-4">
                        <img src={question.image} alt={`Question ${question.id} figure`} className="max-w-full rounded-lg border" />
                      </div>
                    )}
                  </div>

                  <div className="space-y-3 mb-6">
                    {question.options.map((option, index) => (
                      <div
                        key={index}
                        onClick={() => handleAnswerSelect(index)}
                        className={getOptionClass(index)}
                      >
                        <div className="flex items-start gap-3">
                          <span className="text-gray-700 flex-1">{option}</span>
                          {showRationale && index === question.correctAnswer && (
                            <div className="flex-shrink-0 mt-1"><CheckCircle /></div>
                          )}
                          {showRationale && selectedAnswer === index && index !== question.correctAnswer && (
                            <div className="flex-shrink-0 mt-1"><XCircle /></div>
                          )}
                        </div>
                      </div>
                    ))}
                  </div>

                  {showRationale && (
                    <div className="bg-blue-50 border-l-4 border-blue-500 p-4 mb-6">
                      <h3 className="font-semibold text-blue-900 mb-2">Explanation:</h3>
                      <p className="text-blue-800 leading-relaxed">{question.rationale}</p>
                    </div>
                  )}

                  <div className="flex gap-3">
                    <button
                      onClick={handlePrevious}
                      disabled={currentQuestion === 0}
                      className="px-4 py-2 rounded-lg border-2 border-gray-300 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition-colors flex items-center gap-2"
                    >
                      <ChevronLeft />
                      Previous
                    </button>
                    
                    {!showRationale ? (
                      <button
                        onClick={handleSubmit}
                        disabled={selectedAnswer === null}
                        className="flex-1 bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                      >
                        Submit Answer
                      </button>
                    ) : (
                      <button
                        onClick={handleNext}
                        className="flex-1 bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 transition-colors flex items-center justify-center gap-2"
                      >
                        {currentQuestion < questionsData.length - 1 ? (
                          <>
                            Next Question
                            <ChevronRight />
                          </>
                        ) : (
                          <>
                            Finish Quiz
                            <CheckCircle />
                          </>
                        )}
                      </button>
                    )}
                  </div>
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ITEQuizApp />);
    </script>
</body>
</html>
