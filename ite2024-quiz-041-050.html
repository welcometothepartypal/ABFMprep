<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        // ── SAVE QUIZ RESULT FOR SCORE CALCULATOR ──
        // Call this function when the quiz is scored / results are shown.
        function saveQuizResult(correctCount, totalCount, missedQuestionsArray) {
          try {
            localStorage.setItem(
              'ite_quiz_result_2024_5',
              JSON.stringify({
                correct: correctCount,
                total:   totalCount,
                missed:  missedQuestionsArray
              })
            );
          } catch(e) {}
        }


        const ChevronLeft = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" /></svg>;
        const ChevronRight = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" /></svg>;
        const CheckCircle = () => <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd" /></svg>;
        const XCircle = () => <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clipRule="evenodd" /></svg>;
        const BookOpen = () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>;
        const RotateCcw = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>;
        const Trophy = () => <svg className="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z" /></svg>;

        const questionsData = [
  {
    "id": 41,
    "question": "An 80-year-old male who is taking furosemide (Lasix), 80 mg, for heart failure presents to the \nemergency department (ED) with a gradual onset of somnolence. He is found to be hyponatremic \nwith a serum sodium level of 104 mEq/L (N 135–145). \n \nYou should order the administration of which one of the following?",
    "options": [
      "A) 100 mL of 3% sodium chloride over 10 minutes",
      "B) 150 mL of 5% sodium chloride over 30 minutes",
      "C) 500 mL of 3% sodium chloride over 30 minutes",
      "D) 1 L of 0.9% sodium chloride over 1 hour",
      "E) 1 L of 3% sodium chloride over 1 hour"
    ],
    "correctAnswer": 0,
    "rationale": "Current guidelines recommend correction of the serum sodium level by 4–6 mEq/L \nwithin 1–2 hours, which can reverse hyponatremic encephalopathy. This may be \naccomplished with either a 100-mL or 150-mL bolus of 3% sodium chloride \nadministered over 10–20 minutes and repeated 2–3 times until the desired sodium level \nis achieved."
  },
  {
    "id": 42,
    "question": "A 45-year-old female presents for evaluation of a 3-month history of left knee pain. She commutes \nby bicycle and is now finding it painful to cycle or even walk. On examination she does not have any \ndeformity, and there is normal range of motion of the hips and knees. She has bilateral knee crepitus, \npain on flexion of the left knee, and point tenderness that is noted 2 cm proximal to the left lateral \njoint line while flexing the knee. \n \nWhich one of the following is the most likely diagnosis?",
    "options": [
      "A) Iliotibial band syndrome",
      "B) Lateral compartment osteoarthritis",
      "C) Patellar tendinitis",
      "D) Patellofemoral syndrome",
      "E) Pes anserine bursitis"
    ],
    "correctAnswer": 0,
    "rationale": "This patient has iliotibial band syndrome, a common overuse injury in cyclists and \nrunners. Pain occurs due to impingement of the iliotibial band over the lateral femoral \nepicondyle. The Noble compression test is diagnostic for iliotibial band syndrome and is \nconsidered positive if it evokes pain in the area of impingement, as in this patient. \nCrepitus occurs with osteoarthritis but is not specific, and this patient’s history and the \nexamination are more suggestive of iliotibial band syndrome. Patellar tendinitis is more \ncentral, usually at the inferior pole of the patella. Patellofemoral syndrome causes \ndiffuse pain without point tenderness. The pes anserine bursa is distal to the medial \nknee."
  },
  {

    "options": [
      "A) in a crib and on their backs in the parents’ room",
      "B) in a crib and on their stomachs in the parents’ room",
      "C) in a crib and on their backs in their own room",

    "question": "A 55-year-old female presents to your office because of a several-month history of progressively \nworsening fatigue, weakness, and unexplained weight loss. Physical examination findings are \nremarkable for hyperpigmentation of the skin and buccal mucosa. Initial laboratory studies reveal a \nlow morning cortisol level. \n \nWhich one of the following is the most likely diagnosis?",
    "options": [

    ],
    "correctAnswer": 0,
    "rationale": "Addison disease is usually marked by fatigue, weakness, unexplained weight loss, and \nhyperpigmentation along with low cortisol levels. Hyperpigmentation is the result of \nelevated levels of melanocyte-stimulating hormone, a cleavage product of corticotropin \n(ACTH). Cushing disease is the result of excessive cortisol production due to a \ncorticotropin-secreting pituitary adenoma and is marked by weight gain, central obesity, \nmoon facies, buffalo hump, and muscle weakness. Pheochromocytoma is a \ncatecholamine-secreting tumor of the adrenal medulla. It usually presents with episodic \nsymptoms, including hypertension, headache, palpitations, and diaphoresis. Primary \nhyperaldosteronism is due to excessive aldosterone production leading to sodium \nretention, potassium loss, and hypertension. Clinical features of primary \nhyperaldosteronism include hypertension, hypokalemia, and metabolic alkalosis. \nSyndrome of inappropriate antidiuretic hormone secretion (SIADH) is caused by the \ninappropriate release of vasopressin despite normal or increased plasma volume and \nmay be triggered by stroke, infection, trauma, medications, pulmonary disease, or HIV. \nClinical symptoms of SIADH include confusion, muscle weakness, tremor, muscle \ncramps, hallucinations, seizures, and death."
  },
  {
    "id": 45,
    "question": "A 65-year-old male presents to your office for a Welcome to Medicare visit. The whisper test is \nabnormal with both ears. \n \nIn addition to difficulty hearing and participating in day-to-day conversation, the patient is at \nincreased risk for which one of the following health problems due to his hearing loss?",
    "options": [
      "A) Benign paroxysmal positional vertigo",
      "B) Dementia",
      "C) Ear infection",
      "D) Heart failure",
      "E) Temporomandibular joint dysfunction"
    ],
    "correctAnswer": 1,
    "rationale": "Hearing loss is associated with dementia, decreased quality of life, depression, debility, \ndelirium, falls, and mortality. It does not increase the risk for benign paroxysmal \npositional vertigo, ear infection, heart failure, or temporomandibular joint dysfunction."

  {
    "id": 46,
    "question": "A 32-year-old female presents with concerns regarding infertility. She has been married for 3 years \nand has been attempting to conceive for the past 18 months. She reports early menarche at age 10 and \na long-standing history of dysmenorrhea and heavy bleeding. These symptoms improved when she \nwas using oral contraceptive therapy in her 20s. Transvaginal ultrasound results are inconclusive. \n \nWhich one of the following would be the most appropriate next step in management?",
    "options": [
      "A) A 6-month trial of oral contraceptive therapy",
      "B) A trial of aromatase inhibitor therapy such as letrozole (Femara)",
      "C) Placement of a levonorgestrel-releasing IUD (Mirena)",
      "D) Diagnostic laparoscopic surgery to confirm the diagnosis"
    ],
    "correctAnswer": 3,
    "rationale": "There is a high suspicion for endometriosis in this patient who desires pregnancy. She \nhas classic symptoms, including painful menses and early menarche, and she is now \nexperiencing infertility. Her symptoms improved with oral contraceptive treatment in the \npast. Laparoscopic surgery can assist with both diagnosis and treatment. Given that the \npatient desires pregnancy, a trial of oral contraceptive therapy and placement of a \nlevonorgestrel-releasing IUD are not appropriate. While aromatase inhibitor therapy \nsuch as letrozole may be considered in the future, a complete infertility workup, \nincluding evaluation for male factor infertility, should be completed first."
  },
  {
    "id": 47,
    "question": "A 70-year-old male presents to the emergency department with a sudden onset of severe abdominal \npain that radiates to his back. The patient has a history of stroke, hypertension, and type 2 diabetes. \nHe has a 40-pack-year smoking history. A physical examination reveals a pulsatile mass just above \nthe umbilicus. CT of the abdomen confirms the diagnosis. \n \nWhich one of the following is the greatest risk factor for developing this condition?",
    "options": [
      "A) Cigarette smoking",
      "B) Hypertension",
      "C) Male sex",
      "D) Stroke",
      "E) Type 2 diabetes"
    ],
    "correctAnswer": 0,
    "rationale": "This patient has an abdominal aortic aneurysm (AAA) that may have ruptured. Tobacco \nuse (in the form of cigarette smoking) is the greatest risk factor for developing AAA. \nCurrent U.S. Preventive Services Task Force guidelines recommend one-time abdominal \nscreening ultrasonography for all men ages 65–75 who have ever smoked. Additional \nrisk factors include hypertension, male sex, stroke, a family history of AAA, obesity, \ncoronary artery disease, peripheral artery disease, and age >65."
  },
  {
    "id": 48,
    "question": "Of the following, which one is the most effective abortive treatment for cluster headache?",
    "options": [
      "A) Hydromorphone (Dilaudid)",
      "B) Ketorolac",
      "C) Ondansetron",
      "D) Propranolol",
      "E) Sumatriptan (Imitrex)"
    ],
    "correctAnswer": 4,
    "rationale": "Cluster headache is a type of primary headache in the category of trigeminal autonomic \ncephalgia, and abortive therapy consists of 100% high-flow oxygen and triptans. Its \ntypical onset is age 30 and it is 2–3 times more common in males than females. The \npain is severe and unilateral in the orbital, supraorbital, or temporal locations. It is \nassociated with at least one of the following symptoms on the ipsilateral side: \nconjunctival injection or lacrimation, nasal congestion or rhinorrhea, miosis or ptosis, \neyelid swelling, and sweating of the forehead and face. The pain can last from 30 \nminutes to almost 3 hours. Hydromorphone and ketorolac can be used to mask other \ntypes of pain but are ineffective in stopping cluster headache. Ondansetron stops \nvomiting, but its side effects include headache. Propranolol can be used to prevent \nmigraine."
  },
  {
    "id": 49,
    "question": "A 4-month-old female is brought to your office for a well child check. She is here with her mother and \n2 older brothers, who are also your patients. The family looks forward to swimming at the local outdoor \ncommunity pool, going to the beach, and gardening this summer. \n \nWhich one of the following should you recommend to reduce this family's risk for skin cancer related \nto sun exposure?",
    "options": [
      "A) Applying sunscreen with an SPF ≥15 to the infant before taking her outside",
      "B) Avoiding going to the pool during the middle of the day, and encouraging them to take breaks in \nthe shade",
      "C) Going to the beach only on cloudy days when ultraviolet rays are absent",
      "D) Wearing a baseball cap for sun protection when gardening"
    ],
    "correctAnswer": 1,
    "rationale": "Exposure to UV light is known to increase the risk for skin cancer. UV rays are strongest \nfrom 10:00 a.m. to 4:00 p.m., so going to the pool in the early morning will reduce \nexposure. The FDA does not recommend the use of sunscreen in infants under 6 \nmonths of age. Children under 6 months of age should be kept out of direct sunlight. \nUV rays still damage skin on cloudy days. Hats should shade the ears and the back of \nthe neck as well as the face, so a baseball cap is not a good choice."
  },
  {
    "id": 50,
    "question": "A 36-year-old female presents with a medical history of hypertension, hyperlipidemia, obesity, and 3 \nmiscarriages. She is not currently pregnant. She was recently discharged from the hospital with her \nsecond deep vein thrombosis (DVT) in the past several years. A workup for the underlying cause of \nher thrombophilia is positive for antiphospholipid antibodies. \n \nWhich one of the following medications would be most appropriate for the long-term treatment of \nthis patient’s DVT?",
    "options": [
      "A) Apixaban (Eliquis)",
      "B) Aspirin",
      "C) Clopidogrel (Plavix)",
      "D) Enoxaparin (Lovenox)",
      "E) Warfarin"
    ],
    "correctAnswer": 4,
    "rationale": "The correct treatment of a deep vein thrombosis (DVT) in a patient with \nantiphospholipid syndrome is warfarin. Most DVTs can be treated with a direct oral \nanticoagulant (DOAC). DOACs may be acceptable in low-risk patients with a single \nprevious DVT, but they are not preferred for patients with antiphospholipid antibody \nsyndrome due to the risk for increased arterial thrombotic events. Aspirin is clearly not \nappropriate in a patient with recurrent DVTs. Clopidogrel would never be indicated for \nthe treatment of a DVT. If this patient were pregnant, enoxaparin would be preferred.  \nThrombophilia evaluation should not be considered in patients with a provoked venous \nthromboembolism (VTE). However, in select patients with recurrent VTE, evaluation \nshould be considered, specifically when the results of the testing would influence the \ntreatment plan (SOR A). Thrombophilia testing may be considered in patients who are \ninterested in stopping anticoagulation because of concerns such as bleeding risk, \nintolerance, or cost. These patients include those with an initial VTE before age 50, a \nhistory of recurrent pregnancy loss, a first-degree relative who had an initial VTE before \n50 years of age, recurrent VTEs, arterial and venous thrombi, or VTE in an unusual site."
  }
];

        function ITEQuizApp() {
          const [currentQuestion, setCurrentQuestion] = useState(0);
          const [selectedAnswer, setSelectedAnswer] = useState(null);
          const [showRationale, setShowRationale] = useState(false);
          const [score, setScore] = useState(0);
          const [answeredQuestions, setAnsweredQuestions] = useState([]);
          const [quizComplete, setQuizComplete] = useState(false);

          const question = questionsData[currentQuestion];

          const handleAnswerSelect = (index) => {
            if (!showRationale) {
              setSelectedAnswer(index);
            }
          };

          const handleSubmit = () => {
            if (selectedAnswer !== null && !showRationale) {
              setShowRationale(true);
              const isCorrect = selectedAnswer === question.correctAnswer;
              
              if (isCorrect) {
                setScore(score + 1);
              }
              
              setAnsweredQuestions([...answeredQuestions, {
                questionId: question.id,
                correct: isCorrect
              }]);
            }
          };

          const handleNext = () => {
            if (currentQuestion < questionsData.length - 1) {
              setCurrentQuestion(currentQuestion + 1);
              setSelectedAnswer(null);
              setShowRationale(false);
            } else {
              setQuizComplete(true);
            }
          };

          const handlePrevious = () => {
            if (currentQuestion > 0) {
              setCurrentQuestion(currentQuestion - 1);
              setSelectedAnswer(null);
              setShowRationale(false);
            }
          };

          const handleRestart = () => {
            setCurrentQuestion(0);
            setSelectedAnswer(null);
            setShowRationale(false);
            setScore(0);
            setAnsweredQuestions([]);
            setQuizComplete(false);
          };

          const getOptionClass = (index) => {
            let baseClass = "p-4 mb-3 rounded-lg border-2 cursor-pointer transition-all ";
            
            if (!showRationale) {
              if (selectedAnswer === index) {
                return baseClass + "border-blue-500 bg-blue-50";
              }
              return baseClass + "border-gray-300 hover:border-blue-300 hover:bg-gray-50";
            } else {
              if (index === question.correctAnswer) {
                return baseClass + "border-green-500 bg-green-50";
              }
              if (selectedAnswer === index && index !== question.correctAnswer) {
                return baseClass + "border-red-500 bg-red-50";
              }
              return baseClass + "border-gray-300 bg-gray-50";
            }
          };

          if (quizComplete) {
            const percentage = Math.round((score / questionsData.length) * 100);
            
            return (
              <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
                <div className="max-w-2xl mx-auto">
                  <div className="bg-white rounded-xl shadow-lg p-8 text-center">
                    <div className="flex justify-center mb-4"><Trophy /></div>
                    <h1 className="text-3xl font-bold mb-4 text-gray-800">Quiz Complete!</h1>
                    <div className="mb-6">
                      <p className="text-6xl font-bold text-indigo-600 mb-2">{percentage}%</p>
                      <p className="text-xl text-gray-600">
                        You scored {score} out of {questionsData.length}
                      </p>
                    </div>
                    
                    <div className="mb-6 p-4 bg-gray-50 rounded-lg">
                      <h3 className="font-semibold mb-3 text-gray-700">Results Summary:</h3>
                      <div className="space-y-2">
                        {answeredQuestions.map((answer, idx) => (
                          <div key={idx} className="flex items-center justify-between">
                            <span className="text-gray-600">Question {answer.questionId}</span>
                            <div className="flex items-center">
                              {answer.correct ? <CheckCircle /> : <XCircle />}
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                    
                    <button
                      onClick={handleRestart}
                      className="bg-indigo-600 text-white px-8 py-3 rounded-lg hover:bg-indigo-700 transition-colors inline-flex items-center gap-2"
                    >
                      <RotateCcw />
                      Start Over
                    </button>
                  </div>
                </div>
              </div>
            );
          }

          return (
            <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
              <div className="max-w-4xl mx-auto">
                <div className="bg-white rounded-xl shadow-lg p-6 mb-6">
                  <div className="flex items-center justify-between mb-4">
                    <h1 className="text-2xl font-bold text-gray-800 flex items-center gap-2">
                      <BookOpen />
                      2025 ITE Quiz (Questions 41-50)
                    </h1>
                    <div className="text-right">
                      <p className="text-sm text-gray-600">Score</p>
                      <p className="text-2xl font-bold text-indigo-600">{score}/{answeredQuestions.length}</p>
                    </div>
                  </div>
                  
                  <div className="flex items-center gap-2 mb-2">
                    <div className="flex-1 bg-gray-200 rounded-full h-2">
                      <div 
                        className="bg-indigo-600 h-2 rounded-full transition-all duration-300"
                        style={{ width: `${((currentQuestion + 1) / questionsData.length) * 100}%` }}
                      />
                    </div>
                    <span className="text-sm text-gray-600 whitespace-nowrap">
                      {currentQuestion + 1} / {questionsData.length}
                    </span>
                  </div>
                </div>

                <div className="bg-white rounded-xl shadow-lg p-6 mb-6">
                  <div className="mb-6">
                    <p className="text-sm text-gray-500 mb-2">Question {question.id}</p>
                    <p className="text-lg text-gray-800 leading-relaxed">{question.question}</p>
                    {question.image && (
                      <div className="mt-4">
                        <img src={question.image} alt={`Question ${question.id} figure`} className="max-w-full rounded-lg border" />
                      </div>
                    )}
                  </div>

                  <div className="space-y-3 mb-6">
                    {question.options.map((option, index) => (
                      <div
                        key={index}
                        onClick={() => handleAnswerSelect(index)}
                        className={getOptionClass(index)}
                      >
                        <div className="flex items-start gap-3">
                          <span className="text-gray-700 flex-1">{option}</span>
                          {showRationale && index === question.correctAnswer && (
                            <div className="flex-shrink-0 mt-1"><CheckCircle /></div>
                          )}
                          {showRationale && selectedAnswer === index && index !== question.correctAnswer && (
                            <div className="flex-shrink-0 mt-1"><XCircle /></div>
                          )}
                        </div>
                      </div>
                    ))}
                  </div>

                  {showRationale && (
                    <div className="bg-blue-50 border-l-4 border-blue-500 p-4 mb-6">
                      <h3 className="font-semibold text-blue-900 mb-2">Explanation:</h3>
                      <p className="text-blue-800 leading-relaxed">{question.rationale}</p>
                    </div>
                  )}

                  <div className="flex gap-3">
                    <button
                      onClick={handlePrevious}
                      disabled={currentQuestion === 0}
                      className="px-4 py-2 rounded-lg border-2 border-gray-300 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition-colors flex items-center gap-2"
                    >
                      <ChevronLeft />
                      Previous
                    </button>
                    
                    {!showRationale ? (
                      <button
                        onClick={handleSubmit}
                        disabled={selectedAnswer === null}
                        className="flex-1 bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                      >
                        Submit Answer
                      </button>
                    ) : (
                      <button
                        onClick={handleNext}
                        className="flex-1 bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 transition-colors flex items-center justify-center gap-2"
                      >
                        {currentQuestion < questionsData.length - 1 ? (
                          <>
                            Next Question
                            <ChevronRight />
                          </>
                        ) : (
                          <>
                            Finish Quiz
                            <CheckCircle />
                          </>
                        )}
                      </button>
                    )}
                  </div>
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ITEQuizApp />);
    </script>
</body>
</html>
