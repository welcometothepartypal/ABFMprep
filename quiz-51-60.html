<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2025 ITE Quiz - Questions 51-60</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        // ── SAVE QUIZ RESULT FOR SCORE CALCULATOR ──
        // Call this function when the quiz is scored / results are shown.
        function saveQuizResult(correctCount, totalCount, missedQuestionsArray) {
          try {
            localStorage.setItem(
              'ite_quiz_result_2025_6',
              JSON.stringify({
                correct: correctCount,        // number of correct answers, e.g. 7
                total:   totalCount,          // total questions, always 10
                missed:  missedQuestionsArray // array of question numbers wrong, e.g. [2, 5, 9]
              })
            );
          } catch(e) {}
        }


        const ChevronLeft = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" /></svg>;
        const ChevronRight = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" /></svg>;
        const CheckCircle = () => <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd" /></svg>;
        const XCircle = () => <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clipRule="evenodd" /></svg>;
        const BookOpen = () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>;
        const RotateCcw = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>;
        const Trophy = () => <svg className="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z" /></svg>;

       
// QUIZ 6: Questions 51-60
const questionsData = [
  {
    id: 51,
    question: "A 74-year-old female presents to your office for follow-up of cardioembolic stroke 1 day after being discharged from the hospital. She presented to the hospital with acute left-sided hand and face weakness. An evaluation in the hospital revealed new atrial fibrillation, mild mitral regurgitation, and a small right-sided cerebral infarction. Cardioembolic stroke was diagnosed. She was discharged 48 hours later after her left-sided weakness had almost completely resolved. Which one of the following therapeutic options is preferred for this patient?",
    options: [
      "A) Apixaban (Eliquis)",
      "B) Aspirin",
      "C) Clopidogrel (Plavix)",
      "D) Warfarin",
      "E) Aspirin plus clopidogrel"
    ],
    correctAnswer: 0,
    rationale: "This patient presents with a recent history of cardioembolic stroke. In patients who have a TIA or small cardioembolic stroke and nonvalvular atrial fibrillation, guidelines recommend starting anticoagulation without antiplatelet agents 2–14 days after the event. Nonvalvular atrial fibrillation is defined by the lack of moderate to severe mitral stenosis or a mechanical heart valve; direct-acting oral anticoagulants are preferred to warfarin in these patients. The 2024 Optimal Timing of Anticoagulation After Acute Ischaemic Stroke (OPTIMAS) trial confirmed the safety of starting anticoagulation within 4 days of a stroke. In patients with larger strokes that may be at high risk for hemorrhagic conversion, initiating anticoagulation may be delayed to 14 days."
  },
  {
    id: 52,
    question: "A 75-year-old female with an ST-elevation myocardial infarction (STEMI) diagnosed in the emergency department has been admitted to your service. She underwent a percutaneous coronary intervention with a drug-eluting stent to the circumflex artery and had been recovering well until she developed acute shortness of breath on the fourth day of hospitalization. Today, her vital signs reveal a blood pressure of 91/55 mm Hg, a heart rate of 110 beats/min, and an oxygen saturation of 89% on room air. On physical examination, the patient appears moderately distressed and has no jugular venous pulse. Auscultation reveals a regular rate, normal S1 and S2, and a systolic murmur over the mitral post. Crackles are heard in all lung fields. There is no lower extremity edema. Which one of the following is the likely etiology of this condition?",
    options: [
      "A) Cardiac tamponade",
      "B) Papillary muscle rupture",
      "C) Pericarditis",
      "D) Pulmonary embolism",
      "E) Supraventricular tachyarrhythmia"
    ],
    correctAnswer: 1,
    rationale: "Advances in angiography, pharmacology, and systems of care have improved morbidity and mortality for acute myocardial infarction (AMI). Acute papillary muscle rupture occurs 3–5 days after a transmural infarction involving the right coronary artery or circumflex artery, depending on coronary anatomy. This leads to acute mitral regurgitation, resulting in flash pulmonary edema and shock, as seen in this patient. Cardiac tamponade can occur after an AMI if the ventricular free wall ruptures, which is rare; clinical clues include chest pain, shortness of breath, muffled heart sounds, and distended neck veins. Chest pain is also a core feature of pericarditis, making it an unlikely diagnosis in this patient. While pulmonary embolism is a common complication seen in immobile hospitalized patients, the lack of lower extremity edema makes a venous thromboembolism etiology less likely. Supraventricular tachyarrhythmias may present similarly to this patient, but a ventricular rate of 110 beats/min is unlikely to result in the hemodynamic compromise described in this case."
  },
  {
    id: 53,
    question: "A 14-year-old male sees you to establish care. He has a past medical history of asthma and uses an albuterol inhaler (Proventil, Ventolin) as needed. He normally has symptoms about 3–4 days per week. Recent pulmonary function tests showed mildly reduced lung function. Based on the Global Initiative for Asthma (GINA) guidelines, which one of the following would be the preferred treatment strategy for this patient?",
    options: [
      "A) Continuing as-needed albuterol",
      "B) Switching to as-needed formoterol",
      "C) Switching to an as-needed low-dose inhaled corticosteroid (ICS) plus formoterol",
      "D) Continuing as-needed albuterol, and adding a low-dose ICS for maintenance",
      "E) Continuing as-needed albuterol, and adding a low-dose ICS plus salmeterol for maintenance"
    ],
    correctAnswer: 2,
    rationale: "Based on the Global Initiative for Asthma (GINA) guideline, patients who have symptoms <3–5 days per week with normal or mildly reduced lung function are classified as having mild asthma. For patients 12 years and older with mild asthma, the guidelines recommend treatment with as-needed low-dose inhaled corticosteroid plus formoterol (ICS/formoterol). As-needed low-dose ICS/formoterol reduces the risk of severe asthma exacerbations by 60%–64% compared to as-needed short-acting β-agonists (SABAs) such as albuterol. ICS/formoterol also reduces the risk of severe exacerbations compared to other regimens that include a SABA reliever. Formoterol should not be used without an ICS."
  },
  {
    id: 54,
    question: "A 37-year-old male who recently returned from a trip to Vietnam presents for evaluation of an intensely pruritic rash on his feet. Physical examination findings are normal other than an erythematous, serpiginous rash on his feet and lower legs. Which one of the following is the most likely diagnosis?",
    options: [
      "A) Cutaneous larva migrans",
      "B) Cutaneous leishmaniasis",
      "C) Herpesvirus B",
      "D) Neisseria meningitidis",
      "E) Scabies"
    ],
    correctAnswer: 0,
    rationale: "The most likely diagnosis is cutaneous larva migrans. The typical rash that occurs with this infection is an intensely pruritic, erythematous, serpiginous rash. It is typically seen on the feet and gluteal areas. There are no diagnostic tests for this infection and the diagnosis is made clinically. Infections are generally self-limited but can be treated with albendazole. Cutaneous larva migrans infections are mainly found in Asia and Africa where macaque monkeys are the reservoir. Cutaneous leishmaniasis generally presents with small papules that develop into nonhealing open sores with a raised border and central ulceration. Herpesvirus B presents with a vesicular rash near the site of inoculation and influenza-like symptoms. The clinical manifestations of Neisseria meningitidis range from asymptomatic dermatologic findings such as petechiae to severe systemic disease. Scabies presents with a very pruritic rash that is red with small bumps, typically appears along skinfolds, and often forms a line."
  },
  {
    id: 55,
    question: "A 10-year-old male is brought to your office by his mother for follow-up of treatment for a Cryptosporidium infection that he likely contracted during a camping trip after swimming in a freshwater lake. He has completed treatment and is asymptomatic. His mother asks when he is allowed to resume swimming. Because of concerns for ongoing asymptomatic shedding, you should recommend that the patient may return to swimming",
    options: [
      "A) 3 days after treatment is completed",
      "B) 1 week after treatment is completed",
      "C) 3 days after symptoms resolve",
      "D) 1 week after symptoms resolve",
      "E) 2 weeks after symptoms resolve"
    ],
    correctAnswer: 4,
    rationale: "Infection with Cryptosporidium is caused by ingesting oocysts, which can survive for up to 10 days in treated water. Diarrhea is the predominant symptom, and a stool sample is used for diagnosis. Treatment for infection with Cryptosporidium is supportive with fluid and electrolyte replacement. Nitazoxanide can be used in cases of severe or prolonged disease. Because shedding of oocysts continues even after symptoms resolve, it is recommended that patients refrain from swimming for 2 weeks after resolution of symptoms."
  },
  {
    id: 56,
    question: "A previously healthy 27-year-old female at 36 weeks' gestation presents to the emergency department in a rural town. She reports a 1-week history of headaches, nausea, fatigue, and right upper quadrant pain. On examination she has a temperature of 36.8 °C (98.2 °F), a blood pressure of 150/95 mm Hg, a respiratory rate of 18/min, and a pulse rate of 104 beats/min. Laboratory findings include: WBCs 12,400/mm3 (N 4000–11,000), Hemoglobin 9.8 g/dL (N 12.0–15.0), Platelets 43,000/mm3 (N 150,000–400,000), AST 112 U/L (N 10–59), ALT 95 U/L (N 10–28), Serum creatinine 0.8 mg/dL (N 0.6–1.1), Urine protein to creatinine ratio 422 mg/g (N <300). There are no signs of distress on neonatal tracing. Which one of the following would be the most appropriate next step?",
    options: [
      "A) Administering oral prednisone",
      "B) Administering N-acetylcysteine",
      "C) Consultation with a gastroenterologist",
      "D) Arranging for urgent delivery"
    ],
    correctAnswer: 3,
    rationale: "Hemolysis, elevated liver enzymes, and low platelet count (HELLP) syndrome should be suspected in pregnant women presenting with malaise, headache, hypertension, and proteinuria. Women with HELLP syndrome have 10%–15% maternal morbidity and mortality rates compared to those without. The elevated risks are due to the potential of severe complications such as cerebral hemorrhage, cardiopulmonary arrest, disseminated intravascular coagulation, acute respiratory distress syndrome, renal failure, sepsis, and hepatic hemorrhage. Early diagnosis and management are critical. Quick and targeted evaluation with urgent delivery in patients over 34 weeks' gestation is key to avoiding maternal deaths. Corticosteroids can be used to treat low platelet count, but will not address the symptoms of liver failure. Although this patient has been taking acetaminophen, the examination and laboratory results are consistent with HELLP syndrome; therefore, treatment for acetaminophen overdose with N-acetylcysteine is not warranted."
  },
  {
    id: 57,
    question: "A 64-year-old female with a history of hypertension and no prior evidence of kidney disease presents for follow-up of a recent basic metabolic panel that showed an estimated glomerular filtration rate (eGFR) of 49 mL/min/1.73 m2. Which one of the following would confirm a diagnosis of chronic kidney disease?",
    options: [
      "A) A urine albumin to creatinine ratio >30 mg/g at this time",
      "B) A urine albumin to creatinine ratio >300 mg/g at this time",
      "C) An additional eGFR <60 mL/min/1.73 m2 in 1 month",
      "D) An additional eGFR <90 mL/min/1.73 m2 in 2 months",
      "E) An additional eGFR <60 mL/min/1.73 m2 in 3 months"
    ],
    correctAnswer: 4,
    rationale: "Before a diagnosis of chronic kidney disease can be made, evidence of renal impairment or damage must be present for 3 months in order to differentiate the renal abnormalities from an acute kidney injury (AKI). This is most often an estimated glomerular filtration rate <60 mL/min/1.73 m2; however, the Kidney Disease: Improving Global Outcomes (KDIGO) guidelines do allow for other evidence of persistent renal damage or decreased function, such as albuminuria or proteinuria, that persists for at least 3 months. Previous documentation of kidney damage or impairment can also be sought. Renal imaging abnormalities such as decreased kidney volume, cortical thickening, or multiple cysts are also evidence of chronicity."
  },
  {
    id: 58,
    question: "A 4-year-old male presents with a 6-day history of fever, rash, and an enlarged lymph node. On examination, you note erythema of the lips, bilateral conjunctivitis, and a diffuse maculopapular rash on the trunk and extremities. The right anterior cervical lymph node is nontender and 2 cm in size. Which one of the following is the most serious complication of this patient's condition?",
    options: [
      "A) Cardiac",
      "B) Hematologic",
      "C) Hepatic",
      "D) Pulmonary",
      "E) Renal"
    ],
    correctAnswer: 0,
    rationale: "This patient presents with Kawasaki disease, which commonly occurs in children <5 years of age. Classic Kawasaki disease presents with 4 of the following features: oral mucous membrane changes, bilateral conjunctivitis, diffuse rash, hand and foot edema, and unilateral cervical adenopathy ≥1.5 cm. Inflammation occurs and can affect multiple organ systems. The most serious complication is cardiac. If untreated, 15%–25% of patients will develop cardiovascular abnormalities, including coronary artery dilation, aortic root dilation, cardiac aneurysms, tachycardia, hypotension, and shock. Echocardiography must be performed as soon as possible. Less serious complications of Kawasaki disease include anemia, elevated liver function test results, pyuria, and pulmonary edema."
  },
  {
    id: 59,
    question: "A 40-year-old female presents for a health maintenance examination. Her medical history is unremarkable, but her family history is significant for colorectal cancer in her father, thyroid cancer in her paternal aunt, and endometrial cancer in her maternal grandmother. The patient says that her friend was diagnosed with breast cancer 2 weeks ago and is BRCA2 positive. She is anxious about her risk of breast cancer and requests a mammogram and BRCA testing. According to the U.S. Preventive Services Task Force guidelines, which one of the following would be most appropriate for this patient regarding genetic testing for BRCA1/2?",
    options: [
      "A) Reassurance only",
      "B) Risk assessment using the 7-Question Family History Screening Tool",
      "C) Testing for BRCA1/2 mutation",
      "D) Genetic counseling"
    ],
    correctAnswer: 0,
    rationale: "For this patient, reassurance only is indicated. The U.S. Preventive Services Task Force recommends against routine screening, risk assessment, counseling, and testing in all women for BRCA1/2 mutations (D recommendation). Only women with a personal or family history of breast, ovarian, tubal, or peritoneum cancer or specific susceptibility to BRCA1 and BRCA2 mutations should be formally evaluated with a risk assessment tool. Furthermore, genetic testing for BRCA1 and BRCA2 is indicated only after a positive risk assessment score is calculated and subsequent genetic counseling is received."
  },
  {
    id: 60,
    question: "You are seeing a patient at 12 weeks' gestation for prenatal care. She has a family history of neural tube defects and is taking 4 mg of high-dose folic acid supplementation daily. Her pregnancy is progressing normally, and she has no concerns. Which one of the following should you recommend for this patient regarding ongoing folic acid supplementation?",
    options: [
      "A) Continuing with 4 mg daily for the remainder of the pregnancy",
      "B) Decreasing the dosage to 1 mg daily for the remainder of the pregnancy",
      "C) Decreasing the dosage to 0.4 mg daily for the remainder of the pregnancy",
      "D) Discontinuing folic acid"
    ],
    correctAnswer: 2,
    rationale: "Supplementation with folic acid leading up to and during pregnancy can significantly reduce the risk of neural tube defects (NTDs). Ideally, supplementation should be started 1–3 months prior to conception. Those with pregnancies at higher risk of NTDs are candidates for high-dose folic acid supplementation. This patient is considered high risk as she has a family history of NTDs. The recommended dose of folic acid is 4 mg per day until 12 weeks after conception, and then 0.4 mg per day after 12 weeks. The rationale for decreasing the dose after 12 weeks is that organogenesis is largely complete by this stage and there is theoretical concern for fetal toxicity. Folic acid supplementation is recommended in addition to the usual dietary sources of folic acid."
  }
];

        function ITEQuizApp() {
          const [currentQuestion, setCurrentQuestion] = useState(0);
          const [selectedAnswer, setSelectedAnswer] = useState(null);
          const [showRationale, setShowRationale] = useState(false);
          const [score, setScore] = useState(0);
          const [answeredQuestions, setAnsweredQuestions] = useState([]);
          const [quizComplete, setQuizComplete] = useState(false);

          const question = questionsData[currentQuestion];

          const handleAnswerSelect = (index) => {
            if (!showRationale) {
              setSelectedAnswer(index);
            }
          };

          const handleSubmit = () => {
            if (selectedAnswer !== null && !showRationale) {
              setShowRationale(true);
              const isCorrect = selectedAnswer === question.correctAnswer;
              
              if (isCorrect) {
                setScore(score + 1);
              }
              
              setAnsweredQuestions([...answeredQuestions, {
                questionId: question.id,
                correct: isCorrect
              }]);
            }
          };

          const handleNext = () => {
            if (currentQuestion < questionsData.length - 1) {
              setCurrentQuestion(currentQuestion + 1);
              setSelectedAnswer(null);
              setShowRationale(false);
            } else {
              setQuizComplete(true);
            }
          };

          const handlePrevious = () => {
            if (currentQuestion > 0) {
              setCurrentQuestion(currentQuestion - 1);
              setSelectedAnswer(null);
              setShowRationale(false);
            }
          };

          const handleRestart = () => {
            setCurrentQuestion(0);
            setSelectedAnswer(null);
            setShowRationale(false);
            setScore(0);
            setAnsweredQuestions([]);
            setQuizComplete(false);
          };

          const getOptionClass = (index) => {
            let baseClass = "p-4 mb-3 rounded-lg border-2 cursor-pointer transition-all ";
            
            if (!showRationale) {
              if (selectedAnswer === index) {
                return baseClass + "border-blue-500 bg-blue-50";
              }
              return baseClass + "border-gray-300 hover:border-blue-300 hover:bg-gray-50";
            } else {
              if (index === question.correctAnswer) {
                return baseClass + "border-green-500 bg-green-50";
              }
              if (selectedAnswer === index && index !== question.correctAnswer) {
                return baseClass + "border-red-500 bg-red-50";
              }
              return baseClass + "border-gray-300 bg-gray-50";
            }
          };

          if (quizComplete) {
            const percentage = Math.round((score / questionsData.length) * 100);
            
            return (
              <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
                <div className="max-w-2xl mx-auto">
                  <div className="bg-white rounded-xl shadow-lg p-8 text-center">
                    <div className="flex justify-center mb-4"><Trophy /></div>
                    <h1 className="text-3xl font-bold mb-4 text-gray-800">Quiz Complete!</h1>
                    <div className="mb-6">
                      <p className="text-6xl font-bold text-indigo-600 mb-2">{percentage}%</p>
                      <p className="text-xl text-gray-600">
                        You scored {score} out of {questionsData.length}
                      </p>
                    </div>
                    
                    <div className="mb-6 p-4 bg-gray-50 rounded-lg">
                      <h3 className="font-semibold mb-3 text-gray-700">Results Summary:</h3>
                      <div className="space-y-2">
                        {answeredQuestions.map((answer, idx) => (
                          <div key={idx} className="flex items-center justify-between">
                            <span className="text-gray-600">Question {answer.questionId}</span>
                            <div className="flex items-center">
                              {answer.correct ? <CheckCircle /> : <XCircle />}
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                    
                    <button
                      onClick={handleRestart}
                      className="bg-indigo-600 text-white px-8 py-3 rounded-lg hover:bg-indigo-700 transition-colors inline-flex items-center gap-2"
                    >
                      <RotateCcw />
                      Start Over
                    </button>
                  </div>
                </div>
              </div>
            );
          }

          return (
            <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
              <div className="max-w-4xl mx-auto">
                <div className="bg-white rounded-xl shadow-lg p-6 mb-6">
                  <div className="flex items-center justify-between mb-4">
                    <h1 className="text-2xl font-bold text-gray-800 flex items-center gap-2">
                      <BookOpen />
                      2025 ITE Quiz (Questions 51-60)
                    </h1>
                    <div className="text-right">
                      <p className="text-sm text-gray-600">Score</p>
                      <p className="text-2xl font-bold text-indigo-600">{score}/{answeredQuestions.length}</p>
                    </div>
                  </div>
                  
                  <div className="flex items-center gap-2 mb-2">
                    <div className="flex-1 bg-gray-200 rounded-full h-2">
                      <div 
                        className="bg-indigo-600 h-2 rounded-full transition-all duration-300"
                        style={{ width: `${((currentQuestion + 1) / questionsData.length) * 100}%` }}
                      />
                    </div>
                    <span className="text-sm text-gray-600 whitespace-nowrap">
                      {currentQuestion + 1} / {questionsData.length}
                    </span>
                  </div>
                </div>

                <div className="bg-white rounded-xl shadow-lg p-6 mb-6">
                  <div className="mb-6">
                    <p className="text-sm text-gray-500 mb-2">Question {question.id}</p>
                    <p className="text-lg text-gray-800 leading-relaxed">{question.question}</p>
                  </div>

                  <div className="space-y-3 mb-6">
                    {question.options.map((option, index) => (
                      <div
                        key={index}
                        onClick={() => handleAnswerSelect(index)}
                        className={getOptionClass(index)}
                      >
                        <div className="flex items-start gap-3">
                          <span className="text-gray-700 flex-1">{option}</span>
                          {showRationale && index === question.correctAnswer && (
                            <div className="flex-shrink-0 mt-1"><CheckCircle /></div>
                          )}
                          {showRationale && selectedAnswer === index && index !== question.correctAnswer && (
                            <div className="flex-shrink-0 mt-1"><XCircle /></div>
                          )}
                        </div>
                      </div>
                    ))}
                  </div>

                  {showRationale && (
                    <div className="bg-blue-50 border-l-4 border-blue-500 p-4 mb-6">
                      <h3 className="font-semibold text-blue-900 mb-2">Explanation:</h3>
                      <p className="text-blue-800 leading-relaxed">{question.rationale}</p>
                    </div>
                  )}

                  <div className="flex gap-3">
                    <button
                      onClick={handlePrevious}
                      disabled={currentQuestion === 0}
                      className="px-4 py-2 rounded-lg border-2 border-gray-300 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition-colors flex items-center gap-2"
                    >
                      <ChevronLeft />
                      Previous
                    </button>
                    
                    {!showRationale ? (
                      <button
                        onClick={handleSubmit}
                        disabled={selectedAnswer === null}
                        className="flex-1 bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                      >
                        Submit Answer
                      </button>
                    ) : (
                      <button
                        onClick={handleNext}
                        className="flex-1 bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 transition-colors flex items-center justify-center gap-2"
                      >
                        {currentQuestion < questionsData.length - 1 ? (
                          <>
                            Next Question
                            <ChevronRight />
                          </>
                        ) : (
                          <>
                            Finish Quiz
                            <CheckCircle />
                          </>
                        )}
                      </button>
                    )}
                  </div>
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ITEQuizApp />);
    </script>
</body>
</html>
