<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2024 ITE Quiz - Questions 101-110</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        const ChevronLeft = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" /></svg>;
        const ChevronRight = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" /></svg>;
        const CheckCircle = () => <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd" /></svg>;
        const XCircle = () => <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clipRule="evenodd" /></svg>;
        const BookOpen = () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>;
        const RotateCcw = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>;
        const Trophy = () => <svg className="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z" /></svg>;

        const questionsData = [
  {
    "id": 101,
    "question": "A 62-year-old male presents to your office with a 3-month history of increasing dyspnea and cough. \nHe has a history of allergic rhinitis and uses fluticasone propionate nasal spray (Flonase) daily. He \nhas a 15-pack-year smoking history but quit more than 20 years ago. He has a family history of \nasthma in both his mother and 1 sibling. \n \nExamination findings include a respiratory rate of 18/min and an oxygen saturation of 92% on room \nair. His lung sounds are diminished with scattered rhonchi and no wheezes. The remainder of the \nexamination findings are normal. Spirometry shows an FEV1/FVC ratio of 0.6 and the FEV1 is 70% \nof predicted with no improvement with a bronchodilator. \n \nWhich one of the following is the most likely cause of his dyspnea?",
    "options": [
      "A) Asthma",
      "B) Bronchiectasis",
      "C) COPD",
      "D) Heart failure",
      "E) Pulmonary fibrosis"
    ],
    "correctAnswer": 2,
    "rationale": "The most likely cause of this patient’s dyspnea is COPD. This patient has an obstructive \npattern on spirometry with an FEV1/FVC ratio <0.7 and no improvement with \nadministration of a bronchodilator, which rules out asthma and is consistent with COPD. \nBronchiectasis is associated with a purulent cough and recurrent lower respiratory tract \ninfections on imaging. Heart failure is unlikely because there are no signs of fluid \noverload and this patient’s presentation is more consistent with COPD. Pulmonary \nfibrosis shows a restrictive pattern on spirometry."
  },
  {
    "id": 102,
    "question": "A 17-year-old student athlete is brought to your office for evaluation of a head injury that occurred \nearlier today. The patient was playing soccer when she performed a header and struck the ball with \nher head. She reports a frontal headache and mild nausea. Neurologic examination findings are \nnormal. \n \nWhich one of the following would be the most appropriate management?",
    "options": [
      "A) A rest period of at least 24–48 hours",
      "B) A brief course of prednisone",
      "C) Returning to normal daily activities only when she is symptom-free",
      "D) Head CT"
    ],
    "correctAnswer": 0,
    "rationale": "Most guidelines recommend a brief rest period of at least 24–48 hours following a \nconcussion. No medications are available specifically for concussion. A more \nconservative approach, including a longer rest period before returning to activity/play, is \nrecommended for children and adolescents with concussions. Guidelines recommend \nwaiting until the child or adolescent has successfully tolerated return to school before \nresuming full activity or play. After an initial brief period of rest, individuals with \nconcussions should be encouraged to gradually return to normal daily activities such as \nschool, work, or leisure activities as tolerated. Children do not need to be asymptomatic \nto return to school. Imaging should be used only to eliminate concerns of more \nsignificant injuries and not for evaluation of uncomplicated concussion."
  },
  {
    "id": 103,
    "question": "A 68-year-old male presents for his annual Medicare wellness visit. A routine alcohol screen finds \nthat he consumes 2 drinks every night, but twice per month he consumes 5 or more drinks. However, \nthe screening does not reveal symptoms of alcohol use disorder. \n \nWhich one of the following would be the most appropriate clinical response to address his alcohol \nuse?",
    "options": [
      "A) No intervention",
      "B) A brief counseling intervention",
      "C) Disulfiram",
      "D) Naltrexone",
      "E) Referral for cognitive behavioral therapy"
    ],
    "correctAnswer": 1,
    "rationale": "This patient drinks more than the recommended amount of alcohol and is at increased \nrisk for associated adverse clinical outcomes such as atrial fibrillation, disordered sleep, \nand cancers of the gastrointestinal tract. A brief counseling intervention is \nrecommended and has been consistently shown to decrease alcohol consumption in \nadults. Medical therapy or a referral to a mental health specialist can be very helpful \nsteps in further treatment once a diagnosis of alcohol use disorder has been established \nand the patient has shown readiness and motivation to change."
  },
  {
    "id": 104,
    "question": "A 25-year-old primigravida at 30 weeks’ gestation presents with a 2-week history of intense pruritus \nof the palms and soles. The pregnancy has otherwise been uncomplicated. There are no skin lesions \non examination. A CBC is unremarkable, but a metabolic panel is notable for the following: \nALT 85 U/L (N 7–55) \nAST 75 U/L (N 8–48) \nAlkaline phosphatase 140 U/L (N 45–114) \nBilirubin 1.8 mg/dL (N 0.1–1.2) \nWhich one of the following tests is most likely to confirm the diagnosis?",
    "options": [
      "A) An acute hepatitis profile",
      "B) A bile acid level",
      "C) A gamma-glutamyl transferase level",
      "D) Ultrasonography of the liver",
      "E) A punch biopsy of the skin"
    ],
    "correctAnswer": 1,
    "rationale": "Intrahepatic cholestasis of pregnancy can occur in up to 2% of pregnancies and is most \nfrequent in the second or third trimester. The condition causes severe pruritus initially \noccurring on the palms and soles without skin lesions. The pruritus may become \ngeneralized, and excoriations are often noted due to scratching. Liver enzymes may be \nmildly elevated and up to 10% of patients develop jaundice. A diagnosis can be made \nclinically and by elevated serum bile acid levels. The maternal prognosis is good, but \nthe elevated bile acids present a risk for the fetus, and fetal surveillance should be \ninitiated at the time of diagnosis. Due to the risk for preterm labor and fetal demise, \ndelivery at 36–37 weeks’ gestation is recommended. Antihistamines can be used to \ncontrol pruritus, and ursodeoxycholic acid can be used to bind bile acids.  \nHepatitis is a reasonable consideration, but this clinical picture is more compatible with \nintrahepatic cholestasis of pregnancy. A serum gamma-glutamyl transferase level would \ntest for liver inflammation but would not add any useful information. Liver \nultrasonography should be performed if obstruction is suspected. A skin biopsy may \nreveal excoriations but would not be diagnostic."
  },
  {
    "id": 105,
    "question": "Which one of the following endocrine abnormalities is associated with an increased rate of \nhidradenitis suppurativa?",
    "options": [
      "A) Diabetes mellitus",
      "B) Hyperparathyroidism",
      "C) Hyperthyroidism",
      "D) Hypopituitarism",
      "E) Hypothyroidism"
    ],
    "correctAnswer": 0,
    "rationale": "Hidradenitis suppurativa is a chronic inflammatory disease of the skin that \npredominantly affects the apocrine glands of the axillae and the groin. Multiple \nsystematic reviews and meta-analyses have shown an increased association of \nhidradenitis suppurativa with type 2 diabetes. Associations have also been seen with \ncardiovascular risk factors such as metabolic syndrome, increased BMI, and smoking. \nCurrent research has not demonstrated any association with pituitary or thyroid \ndisorders."
  },
  {
    "id": 106,
    "question": "A new vaccine is being developed. The risk for infection after vaccination is 19%. The risk for \ninfection without vaccination is 47%. \n \nWhat is the relative risk of the subjects who received the newly manufactured vaccine?",
    "options": [
      "A) 0.10",
      "B) 0.28",
      "C) 0.40",
      "D) 0.66",
      "E) 0.90"
    ],
    "correctAnswer": 2,
    "rationale": "The relative risk (risk ratio) of infection for the participants who received the newly \ndeveloped vaccine compared to those who did not is 0.40. The risk ratio is calculated by \ndividing the risk of the population under study by the risk of the population who is not \n(those who are vaccinated and those who are not, respectively): 0.19/0.47 = 0.40. In \nother words, vaccinated participants were 40% as likely (or 60% less likely) to contract \nthe infection as those who were not vaccinated."
  },
  {
    "id": 107,
    "question": "A 39-year-old female presents to discuss long-standing dysmenorrhea and menorrhagia. Her \nsymptoms have been present for years and have not significantly changed. She is up to date on \ncervical cancer screening and does not have any risk factors for sexually transmitted infections. She \nhas given birth once and does not wish to conceive again. She has a medical history of hypertension \nthat is well controlled on amlodipine (Norvasc). On bimanual examination you note a slightly \nenlarged uterus with some mild tenderness and no cervical motion tenderness. You suspect \nadenomyosis. \n \nWhich one of the following would be the most appropriate next step to confirm the diagnosis?",
    "options": [
      "A) Transvaginal ultrasonography",
      "B) CT of the pelvis",
      "C) MRI of the pelvis",
      "D) Hysteroscopy",
      "E) Endometrial biopsy"
    ],
    "correctAnswer": 0,
    "rationale": "The preferred initial diagnostic test for patients with suspected adenomyosis is a \ntransvaginal ultrasound. CT scans are not helpful in the diagnosis. While there is higher \nspecificity with MRI of the pelvis, its cost and availability make it a less desirable first \nchoice. Hysteroscopy may be helpful if the diagnosis is in question due to an \ninconclusive ultrasound. Endometrial biopsy does not aid in the diagnosis of \nadenomyosis, but it may be indicated to evaluate for hyperplasia or malignancy in a \npatient who is older or has worsening symptoms."
  },
  {
    "id": 108,
    "question": "A 76-year-old female presents to the emergency department after a fall when stepping out of the \nshower. Her past medical history is notable for hypothyroidism, severe asthma, and a low BMI. Her \nvital signs are normal, but she is unable to bear weight on the left lower extremity. The left lower \nextremity is shortened and externally rotated with intact neurovascular status. The left anterior groin \nis also tender to palpation. \n \nWhich one of the following would be the most appropriate next step?",
    "options": [
      "A) Radiography of the hip and pelvis",
      "B) Ultrasonography of the left leg to evaluate for a blood clot",
      "C) CT of the hip and pelvis",
      "D) MRI of the left hip",
      "E) Evaluation by a physical therapist"
    ],
    "correctAnswer": 0,
    "rationale": "This patient has sustained a traumatic left hip fracture after falling while getting out of \nthe shower. Hip fractures can present with anterior groin pain and the affected \nextremity is often visually deformed with external rotation, shortening, and abduction.  \nAssuming the patient is stable and has an intact neurovascular status, the most \nappropriate next step would be to order radiography of the hip and pelvis. CT or MRI \nwould be indicated if x-rays were negative but a high suspicion for fracture persists. Hip \nfractures do increase the risk for blood clot, and ultrasonography could be performed if \nclotting were a concern, but this would not be the first diagnostic step for this patient. A \nphysical therapist should be consulted after making a diagnosis and developing a \ntreatment plan."
  },
  {
    "id": 109,
    "question": "A 26-year-old nulliparous female presents for an evaluation after she discovered a breast mass while \nshowering. An examination confirms a 4 × 3-cm nonpainful mass in the upper outer quadrant of the \nright breast. \n \nWhich one of the following should you recommend?",
    "options": [
      "A) Screening mammography of the breast",
      "B) Diagnostic mammography of the breast",
      "C) Ultrasonography of the breast",
      "D) MRI of the breast",
      "E) Surgical referral for excision and biopsy"
    ],
    "correctAnswer": 2,
    "rationale": "Diagnostic mammography is typically the preferred imaging modality for a palpable \nbreast mass. However, ultrasonography is more sensitive in women younger than 30 \nyears of age and is preferred. Screening mammography should be performed biennially \nfor asymptomatic women ages 40−74. MRI is not appropriate for this patient at this \ntime. Surgical excision and biopsy would be necessary if abnormalities are found on \nimaging."
  },
  {
    "id": 110,
    "question": "A 30-year-old female with no past medical history presents for a routine health maintenance \nexamination. Although she currently has a sedentary lifestyle, she is motivated to begin an exercise \nprogram to improve her health and reduce her risk for cardiovascular disease. She asks for specific \nexamples of exercise plans that would be most likely to provide this benefit. \n \nAccording to guidelines from the American College of Cardiology/American Heart Association, 5 \ndays per week of which one of the following would be the most appropriate recommendation for this \npatient?",
    "options": [
      "A) 10 minutes of running",
      "B) 20 minutes of brisk walking",
      "C) 30 minutes of water aerobics",
      "D) 40 minutes of stretching",
      "E) 50 minutes of casual walking"
    ],
    "correctAnswer": 2,
    "rationale": "The American College of Cardiology/American Heart Association (ACC/AHA) \nrecommends that adults engage in a minimum of 150 minutes of moderate-intensity or \n75 minutes of vigorous-intensity aerobic physical activity per week, or an equivalent \ncombination of moderate-intensity and vigorous-intensity aerobic activity, to reduce the \nrisk for cardiovascular disease. Examples of moderate-intensity aerobic physical activity \ninclude brisk walking, ballroom dancing, active yoga, water aerobics, cycling on level \nground, and doubles tennis. Examples of vigorous-intensity activities include jogging or \nrunning, swimming laps, cycling vigorously or on uneven ground, and playing singles \ntennis or basketball.  \n \nOf the examples given in this scenario, only 30 minutes of water aerobics (a moderate-\nintensity activity) 5 days per week meets the minimum recommended level of aerobic \nexercise. Casual walking, a light-intensity aerobic activity, is more favorable than \nsedentary behavior for reducing cardiovascular risk, but light-intensity activities do not \ncontribute toward reducing cardiovascular disease risk as effectively as moderate- and \nvigorous-intensity activities, according to ACC/AHA guidelines."
  }
];

        function ITEQuizApp() {
          const [currentQuestion, setCurrentQuestion] = useState(0);
          const [selectedAnswer, setSelectedAnswer] = useState(null);
          const [showRationale, setShowRationale] = useState(false);
          const [score, setScore] = useState(0);
          const [answeredQuestions, setAnsweredQuestions] = useState([]);
          const [quizComplete, setQuizComplete] = useState(false);

          const question = questionsData[currentQuestion];

          const handleAnswerSelect = (index) => {
            if (!showRationale) {
              setSelectedAnswer(index);
            }
          };

          const handleSubmit = () => {
            if (selectedAnswer !== null && !showRationale) {
              setShowRationale(true);
              const isCorrect = selectedAnswer === question.correctAnswer;
              
              if (isCorrect) {
                setScore(score + 1);
              }
              
              setAnsweredQuestions([...answeredQuestions, {
                questionId: question.id,
                correct: isCorrect
              }]);
            }
          };

          const handleNext = () => {
            if (currentQuestion < questionsData.length - 1) {
              setCurrentQuestion(currentQuestion + 1);
              setSelectedAnswer(null);
              setShowRationale(false);
            } else {
              setQuizComplete(true);
            }
          };

          const handlePrevious = () => {
            if (currentQuestion > 0) {
              setCurrentQuestion(currentQuestion - 1);
              setSelectedAnswer(null);
              setShowRationale(false);
            }
          };

          const handleRestart = () => {
            setCurrentQuestion(0);
            setSelectedAnswer(null);
            setShowRationale(false);
            setScore(0);
            setAnsweredQuestions([]);
            setQuizComplete(false);
          };

          const getOptionClass = (index) => {
            let baseClass = "p-4 mb-3 rounded-lg border-2 cursor-pointer transition-all ";
            
            if (!showRationale) {
              if (selectedAnswer === index) {
                return baseClass + "border-blue-500 bg-blue-50";
              }
              return baseClass + "border-gray-300 hover:border-blue-300 hover:bg-gray-50";
            } else {
              if (index === question.correctAnswer) {
                return baseClass + "border-green-500 bg-green-50";
              }
              if (selectedAnswer === index && index !== question.correctAnswer) {
                return baseClass + "border-red-500 bg-red-50";
              }
              return baseClass + "border-gray-300 bg-gray-50";
            }
          };

          if (quizComplete) {
            const percentage = Math.round((score / questionsData.length) * 100);
            
            return (
              <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
                <div className="max-w-2xl mx-auto">
                  <div className="bg-white rounded-xl shadow-lg p-8 text-center">
                    <div className="flex justify-center mb-4"><Trophy /></div>
                    <h1 className="text-3xl font-bold mb-4 text-gray-800">Quiz Complete!</h1>
                    <div className="mb-6">
                      <p className="text-6xl font-bold text-indigo-600 mb-2">{percentage}%</p>
                      <p className="text-xl text-gray-600">
                        You scored {score} out of {questionsData.length}
                      </p>
                    </div>
                    
                    <div className="mb-6 p-4 bg-gray-50 rounded-lg">
                      <h3 className="font-semibold mb-3 text-gray-700">Results Summary:</h3>
                      <div className="space-y-2">
                        {answeredQuestions.map((answer, idx) => (
                          <div key={idx} className="flex items-center justify-between">
                            <span className="text-gray-600">Question {answer.questionId}</span>
                            <div className="flex items-center">
                              {answer.correct ? <CheckCircle /> : <XCircle />}
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                    
                    <button
                      onClick={handleRestart}
                      className="bg-indigo-600 text-white px-8 py-3 rounded-lg hover:bg-indigo-700 transition-colors inline-flex items-center gap-2"
                    >
                      <RotateCcw />
                      Start Over
                    </button>
                  </div>
                </div>
              </div>
            );
          }

          return (
            <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
              <div className="max-w-4xl mx-auto">
                <div className="bg-white rounded-xl shadow-lg p-6 mb-6">
                  <div className="flex items-center justify-between mb-4">
                    <h1 className="text-2xl font-bold text-gray-800 flex items-center gap-2">
                      <BookOpen />
                      2024 ITE Quiz (Questions 101-110)
                    </h1>
                    <div className="text-right">
                      <p className="text-sm text-gray-600">Score</p>
                      <p className="text-2xl font-bold text-indigo-600">{score}/{answeredQuestions.length}</p>
                    </div>
                  </div>
                  
                  <div className="flex items-center gap-2 mb-2">
                    <div className="flex-1 bg-gray-200 rounded-full h-2">
                      <div 
                        className="bg-indigo-600 h-2 rounded-full transition-all duration-300"
                        style={{ width: `${((currentQuestion + 1) / questionsData.length) * 100}%` }}
                      />
                    </div>
                    <span className="text-sm text-gray-600 whitespace-nowrap">
                      {currentQuestion + 1} / {questionsData.length}
                    </span>
                  </div>
                </div>

                <div className="bg-white rounded-xl shadow-lg p-6 mb-6">
                  <div className="mb-6">
                    <p className="text-sm text-gray-500 mb-2">Question {question.id}</p>
                    <p className="text-lg text-gray-800 leading-relaxed">{question.question}</p>
                    {question.image && (
                      <div className="mt-4">
                        <img src={question.image} alt={`Question ${question.id} figure`} className="max-w-full rounded-lg border" />
                      </div>
                    )}
                  </div>

                  <div className="space-y-3 mb-6">
                    {question.options.map((option, index) => (
                      <div
                        key={index}
                        onClick={() => handleAnswerSelect(index)}
                        className={getOptionClass(index)}
                      >
                        <div className="flex items-start gap-3">
                          <span className="text-gray-700 flex-1">{option}</span>
                          {showRationale && index === question.correctAnswer && (
                            <div className="flex-shrink-0 mt-1"><CheckCircle /></div>
                          )}
                          {showRationale && selectedAnswer === index && index !== question.correctAnswer && (
                            <div className="flex-shrink-0 mt-1"><XCircle /></div>
                          )}
                        </div>
                      </div>
                    ))}
                  </div>

                  {showRationale && (
                    <div className="bg-blue-50 border-l-4 border-blue-500 p-4 mb-6">
                      <h3 className="font-semibold text-blue-900 mb-2">Explanation:</h3>
                      <p className="text-blue-800 leading-relaxed">{question.rationale}</p>
                    </div>
                  )}

                  <div className="flex gap-3">
                    <button
                      onClick={handlePrevious}
                      disabled={currentQuestion === 0}
                      className="px-4 py-2 rounded-lg border-2 border-gray-300 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition-colors flex items-center gap-2"
                    >
                      <ChevronLeft />
                      Previous
                    </button>
                    
                    {!showRationale ? (
                      <button
                        onClick={handleSubmit}
                        disabled={selectedAnswer === null}
                        className="flex-1 bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                      >
                        Submit Answer
                      </button>
                    ) : (
                      <button
                        onClick={handleNext}
                        className="flex-1 bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 transition-colors flex items-center justify-center gap-2"
                      >
                        {currentQuestion < questionsData.length - 1 ? (
                          <>
                            Next Question
                            <ChevronRight />
                          </>
                        ) : (
                          <>
                            Finish Quiz
                            <CheckCircle />
                          </>
                        )}
                      </button>
                    )}
                  </div>
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ITEQuizApp />);
    </script>
</body>
</html>
