<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2025 ITE Quiz - Questions 1-10</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        // ── SAVE QUIZ RESULT FOR SCORE CALCULATOR ──
        // Call this function when the quiz is scored / results are shown.
        function saveQuizResult(correctCount, totalCount, missedQuestionsArray) {
          try {
            localStorage.setItem(
              'ite_quiz_result_2025_1',
              JSON.stringify({
                correct: correctCount,        // number of correct answers, e.g. 7
                total:   totalCount,          // total questions, always 10
                missed:  missedQuestionsArray // array of question numbers wrong, e.g. [2, 5, 9]
              })
            );
          } catch(e) {}
        }


        const ChevronLeft = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" /></svg>;
        const ChevronRight = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" /></svg>;
        const CheckCircle = () => <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd" /></svg>;
        const XCircle = () => <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clipRule="evenodd" /></svg>;
        const BookOpen = () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>;
        const RotateCcw = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>;
        const Trophy = () => <svg className="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z" /></svg>;

        const questionsData = [
          {
            id: 1,
            question: "Your practice management team has reviewed the clinic-wide cancer screening rates and found that the frequency of cervical cancer screening appears to have fallen behind other cancer screenings. You are asked to lead a quality improvement project to increase rates of cervical cancer screening for appropriate patients. Which one of the following would be the most appropriate first step?",
            options: [
              "A) Establishing a system for reviewing charts and contacting patients who are overdue for cervical cancer screening",
              "B) Evaluating barriers to cervical cancer screening and reporting",
              "C) Placing posters with information about cervical cancer screening inside the clinic",
              "D) Sending generalized reminders to patients who may qualify for cervical cancer screening",
              "E) Sending generalized reminders to all clinicians regarding cervical cancer screening guidelines"
            ],
            correctAnswer: 1,
            rationale: "Quality improvement is a key area for clinical practice, but initiating these projects can be challenging. Many different methodologies have been used, including the Plan-Do-Study-Act cycle or Plan-Do-Check-Act cycle, but clear identification of the current issues is critical in any framework. In order to plan appropriate interventions, it must first be determined what barriers are responsible for hindering performance in a certain area. If evaluation shows that there is a systemic issue in capturing data, rather than a clinician issue, no other interventions will be beneficial. When used as part of an organizational plan for staffing and clinical procedures, patient-specific reminders and use of the entire health care team are more likely to improve screening uptake than other methods, but the initial step should be delineating any current issues prior to implementing a change. Educating patients about preventive health care and screenings is essential and should be part of routine care. However, general materials such as clinic posters are less likely to increase screening rates than direct physician recommendations or conversations. Sending generalized reminders for preventive care may miss the patients in most critical need of services. General reminders that rely on clinician evaluation of every individual visit may be less effective than patient-specific reminders that can be addressed at the point of care."
          },
          {
            id: 2,
            question: "You are seeing a 32-year-old male in the office. His most recent hemoglobin A1c was 6.1%, indicating prediabetes. Which one of the following is most likely to prevent the development of diabetes?",
            options: [
              "A) Intensive lifestyle and behavior change program",
              "B) Low-carbohydrate diet",
              "C) Reduction in daily caloric intake by 250 kcal per day",
              "D) Strength training for 90 minutes per week"
            ],
            correctAnswer: 0,
            rationale: "Given the growing prevalence of diabetes mellitus, clinicians should be familiar with effective prevention strategies. Intensive lifestyle and behavior modification programs, such as the National Diabetes Prevention Program, are low-cost and can reduce the development of diabetes, with one U.S. study demonstrating a 27% reduction over 15 years. These programs help patients set weight loss goals ≥7% of their baseline, which is thought to be a key component of diabetes prevention. This is typically achieved through a caloric reduction of 500–1000 kcal per day, with activity goals ≥150 minutes per week, including up to 75 minutes per week of strength training. While a variety of dietary patterns are thought to be effective for diabetes prevention, including low intake of carbohydrates, the evidence for changes in dietary patterns is not as strong as that of intensive lifestyle programs."
          },
          {
            id: 3,
            question: "An otherwise healthy 47-year-old male presents to the urgent care clinic with pain and swelling of his right foot after sustaining an injury during a game of ultimate frisbee. He jumped to catch the frisbee and landed on uneven ground. He is unsure of how he landed, but thinks he may have twisted his right foot, causing him to trip and fall. He has significant pain and swelling of his right foot but is weight-bearing. He rates the pain as 10 on a scale of 10. On examination, his vital signs are unremarkable. His right lateral foot shows significant bruising and swelling. The skin is intact. Range of movement is impaired due to the swelling and discomfort, and sensation and circulation are intact. An x-ray of the right foot shows a fifth metatarsal shaft fracture. Which one of the following is the most appropriate next step in management?",
            options: [
              "A) Weight-bearing with a walking boot for 3–6 weeks",
              "B) Non–weight-bearing with a walking boot for 3–6 weeks",
              "C) Non–weight-bearing with a short leg cast for 6 weeks",
              "D) Referral to a physical therapist",
              "E) Referral to an orthopedic surgeon"
            ],
            correctAnswer: 0,
            rationale: "This patient's imaging reveals a fifth metatarsal shaft fracture, which should be managed with a boot or hard-soled shoe for 3–6 weeks with weight-bearing. Foot fractures are typically caused by an axial or twisting force on the foot or a crush injury and account for about one-third of lower extremity fractures in adults. Patients present with swelling and bony point tenderness of the affected area, as seen in this patient. The ability to bear weight varies based on the patient's pain tolerance and the extent of the fracture. Complications of foot fractures include infection, arthritis, nonunion, malunion, and compartment syndrome. A short leg cast is not appropriate because it is used to treat proximal fifth metatarsal and tarsal bone fractures. Physical therapy is not first-line management for this patient's injury. If reduction is needed or if nonunion is present after 6 months, then referral to an orthopedic surgeon would be indicated."
          },
          {
            id: 4,
            question: "A 78-year-old female presents to the emergency department with a 2-day history of cough and fever and a 2-hour history of confusion. Her vital signs include a weight of 67 kg (148 lb), a temperature of 38.8 °C (101.8 °F), a pulse rate of 122 beats/min, and a blood pressure of 72/44 mm Hg with a mean arterial pressure (MAP) of 53 mm Hg. A chest x-ray shows left lower lobe pneumonia. She is given 2 L of lactated Ringer solution and started on broad-spectrum antibiotics for sepsis secondary to pneumonia. Her blood pressure 3 hours later is 82/46 mm Hg with a MAP of 58 mm Hg. Which one of the following is the most appropriate immediate next step in management?",
            options: [
              "A) A 1-L bolus of normal saline",
              "B) A dopamine infusion",
              "C) A norepinephrine infusion",
              "D) A vasopressin infusion",
              "E) Placement of a central line"
            ],
            correctAnswer: 2,
            rationale: "This patient is in septic shock secondary to pneumonia. Surviving Sepsis Campaign guidelines recommend early goal-directed therapy (EGDT) consisting of initial fluid resuscitation with 30 mL/kg of crystalloid solution within the first 3 hours and appropriate antibiotics within 1 hour of evaluation, which have already been done for this patient. The guidelines also recommend initiating vasopressor therapy with norepinephrine as the first-line agent if the mean arterial pressure remains <65 mm Hg after fluid resuscitation. Norepinephrine is a more potent vasoconstrictor than dopamine. Additional fluid therapy is controversial and patient-specific, with some experts recommending discrete 500-mL boluses with hemodynamic monitoring of response, and others recommending balanced crystalloids such as lactate Ringer solution over normal saline. Vasopressin should be added for adults with septic shock who are receiving norepinephrine but continue to have inadequate mean arterial pressure. Vasopressor therapy should not be delayed for placement of a central line."
          },
          {
            id: 5,
            question: "You are called to the emergency department (ED) to admit a 48-year-old female with a past medical history of hyperthyroidism who presented with agitation, palpitations, and diarrhea. The ED team diagnosed thyroid storm secondary to the abrupt discontinuation of the patient's methimazole 2 weeks ago due to a lapse in insurance. On examination, she is tachycardic and hypertensive but can sustain a conversation without dyspnea. Laboratory studies are significant for elevated free T3 and T4 levels and an undetectable TSH level. A urine pregnancy test is negative. Which one of the following would be the most appropriate initial step in management?",
            options: [
              "A) Inorganic iodine",
              "B) Prednisone",
              "C) Propylthiouracil",
              "D) Plasmapheresis"
            ],
            correctAnswer: 2,
            rationale: "Thyroid storm is a medical emergency that must be treated promptly. The initial treatment for thyroid storm is propylthiouracil (PTU). While PTU has been shown to decrease circulating T3 hormone levels more quickly than methimazole, they have both been shown to be equally effective clinically. Glucocorticoids can also be used to block the conversion of T4 to T3. Hydrocortisone and dexamethasone, not prednisone, are the preferred glucocorticoids if used in addition to PTU. While iodine is used to block the synthesis of new thyroid hormone, it should be started at least 1 hour after the initiation of PTU. Plasmapheresis is reserved for patients who do not respond to pharmacologic treatment."
          },
          {
            id: 6,
            question: "According to guidelines from the American Gastroenterological Association, which one of the following is recommended as the best pharmacologic treatment of typical symptoms in diarrhea-predominant irritable bowel syndrome?",
            options: [
              "A) Amitriptyline",
              "B) Dicyclomine",
              "C) Linaclotide (Linzess)",
              "D) Lubiprostone (Amitiza)",
              "E) Rifaximin (Xifaxan)"
            ],
            correctAnswer: 4,
            rationale: "According to the 2022 American Gastroenterological Association guidelines for diarrhea-predominant irritable bowel syndrome (IBS-D), the nonabsorbable antibiotic rifaximin has the best evidence for controlling diarrhea, discomfort, bloating, and abdominal pain. It has a broad spectrum with activity against gram-positive, gram-negative (including Clostridioides difficile), and anaerobic bacteria. It is thought to work by reducing bacterial byproducts and altering the gut flora. It is prescribed as a 14-day course for acute and recurrent symptoms. Rifaximin does not have any significant adverse effects, but it is a high-cost medication. Low-dose amitriptyline and dicyclomine are often effective in reducing symptoms, but the evidence is not as strong as that of rifaximin. Linaclotide is used for constipation-predominant IBS (IBS-C), but its chief side effect of diarrhea results in many patients discontinuing the medication. Lubiprostone is another medication used for IBS-C and for opioid-induced constipation, not IBS-D."
          },
          {
            id: 7,
            question: "A 56-year-old female with moderately controlled type 2 diabetes presents with painful diabetic neuropathy in her feet. You address her diabetic control and other risk factors, but she says the pain continues and is affecting her life adversely. Which one of the following is considered a first-line treatment for pain relief in this condition?",
            options: [
              "A) Topical capsaicin",
              "B) Topical lidocaine",
              "C) Oral gabapentin",
              "D) Oral hydrocodone",
              "E) Peripheral transcutaneous electrical nerve stimulation"
            ],
            correctAnswer: 2,
            rationale: "First-line treatments for the relief of painful diabetic neuropathy include amitriptyline, duloxetine, gabapentin, and pregabalin. Second-line treatments include topical lidocaine and capsaicin, with less evidence of benefit. Opioids such as hydrocodone should be avoided in the treatment of neuropathic pain. Studies of peripheral transcutaneous electrical nerve stimulation have shown modest benefit; however, it is not a first-line treatment."
          },
          {
            id: 8,
            question: "A generally healthy 60-year-old female presents to your office because she is concerned about urinary leakage. Her symptoms started a couple of years ago and have worsened. The leakage occurs when she coughs or laughs, but can also happen if she waits too long to urinate. She hydrates throughout the day. She does not take any medications and does not smoke. She has a remote surgical history of a hysterectomy after delivering her third child. She does not have any fever or abdominal pain and has not been exposed to any sexually transmitted infections. Recent laboratory studies, including a CBC, comprehensive metabolic panel, TSH level, and hemoglobin A1c, were unremarkable. Today she has a blood pressure of 120/70 mm Hg and a BMI of 32 kg/m2. Which one of the following would be the most appropriate next step in the workup?",
            options: [
              "A) No testing",
              "B) Urinalysis",
              "C) Renal and bladder ultrasonography",
              "D) Urodynamic testing",
              "E) Cystoscopy"
            ],
            correctAnswer: 1,
            rationale: "Urinary incontinence is common among women and can substantially diminish quality of life while contributing to increased financial strain. Risk factors include obesity, parity, increasing age, and a history of hysterectomy. The initial evaluation includes a thorough history and should establish whether the incontinence is transient or chronic. It should also identify the incontinence subtype as well as any red flags that would warrant subspecialist referral, such as pelvic organ prolapse or fistula. Urinalysis should be ordered for all patients with urinary incontinence. An incontinence screening questionnaire, cough stress test (SOR C), postvoid residual measurement, and a 3-day voiding diary are helpful tools. Renal and bladder ultrasonography, urodynamic testing, and cystoscopy are not recommended for the initial evaluation of uncomplicated urinary incontinence. Treatments include weight loss, pelvic floor training, lifestyle modifications including appropriate fluid intake, smoking cessation, and pharmacologic therapy. Patients with refractory urinary incontinence can be referred for more invasive treatments, such as mechanical devices, intravesical onabotulinumtoxinA injection, and surgical procedures."
          },
          {
            id: 9,
            question: "A 68-year-old female with previously diagnosed immune thrombocytopenia presents to your office to establish care. She has no current bleeding. A CBC is normal except for a platelet count of 47,000/mm3 (N 130,000–400,000). You refer her to a hematologist for long-term management. Which one of the following is the most appropriate treatment for this patient's current thrombocytopenia?",
            options: [
              "A) No treatment",
              "B) Oral hydroxychloroquine sulfate (Plaquenil)",
              "C) Oral prednisone",
              "D) Intravenous methylprednisolone sodium succinate (Solu-Medrol)",
              "E) Intravenous rituximab (Rituxan)"
            ],
            correctAnswer: 0,
            rationale: "Immune thrombocytopenia (ITP) is caused by autoimmune destruction of platelets in the spleen and causes chronic thrombocytopenia of varying severity. Although hematologists typically oversee care for patients with ITP, family physicians may need to make acute treatment decisions in collaboration with these patients. The American Society of Hematology recommends not to treat ITP unless there is active bleeding or very low platelet counts, defined as <30,000/mm3. This patient does not require treatment at this time because she does not have any current bleeding and her platelet count is above the threshold for treatment. Corticosteroids and rituximab are both used to treat ITP, along with intravenous immunoglobulin. Hydroxychloroquine sulfate is not typically recommended in the treatment of ITP."
          },
          {
            id: 10,
            question: "A 45-year-old male who is living with HIV and has been on highly active antiretroviral therapy (HAART) for the past 10 years presents for routine follow-up. Which one of the following would be part of an appropriate screening strategy for long-term complications associated with HAART?",
            options: [
              "A) Calculation of the Framingham Risk Score now, and a fasting lipid profile annually",
              "B) Neurocognitive screening annually",
              "C) Transient elastography annually",
              "D) A DXA scan annually",
              "E) Urinalysis annually, and a glomerular filtration rate twice yearly"
            ],
            correctAnswer: 4,
            rationale: "The Infectious Diseases Society of America recommends performing urinalysis at least once yearly and obtaining a glomerular filtration rate at least twice yearly in stable patients on highly active antiretroviral therapy (HAART) to detect kidney function abnormalities and drug nephrotoxicity. While cardiovascular risk assessment is important in persons living with HIV, the Framingham Risk Score is not well validated in this population. The American College of Cardiology/American Heart Association recommend using traditional risk factors and clinical judgment for cardiovascular risk assessment in this population. Neurocognitive screening is typically performed based on clinical indications rather than as an annual routine screening for all patients on HAART. Liver fibrosis screening is appropriate in patients with coinfection with hepatitis B or C, but it is not a routine annual screening. Although bone mineral density screening is important in persons living with HIV, especially those at risk for osteoporosis, it is not recommended annually for all patients on HAART."
          }
        ];

        function ITEQuizApp() {
          const [currentQuestion, setCurrentQuestion] = useState(0);
          const [selectedAnswer, setSelectedAnswer] = useState(null);
          const [showRationale, setShowRationale] = useState(false);
          const [score, setScore] = useState(0);
          const [answeredQuestions, setAnsweredQuestions] = useState([]);
          const [quizComplete, setQuizComplete] = useState(false);

          const question = questionsData[currentQuestion];

          const handleAnswerSelect = (index) => {
            if (!showRationale) {
              setSelectedAnswer(index);
            }
          };

          const handleSubmit = () => {
            if (selectedAnswer !== null && !showRationale) {
              setShowRationale(true);
              const isCorrect = selectedAnswer === question.correctAnswer;
              
              if (isCorrect) {
                setScore(score + 1);
              }
              
              setAnsweredQuestions([...answeredQuestions, {
                questionId: question.id,
                correct: isCorrect
              }]);
            }
          };

          const handleNext = () => {
            if (currentQuestion < questionsData.length - 1) {
              setCurrentQuestion(currentQuestion + 1);
              setSelectedAnswer(null);
              setShowRationale(false);
            } else {
              setQuizComplete(true);
            }
          };

          const handlePrevious = () => {
            if (currentQuestion > 0) {
              setCurrentQuestion(currentQuestion - 1);
              setSelectedAnswer(null);
              setShowRationale(false);
            }
          };

          const handleRestart = () => {
            setCurrentQuestion(0);
            setSelectedAnswer(null);
            setShowRationale(false);
            setScore(0);
            setAnsweredQuestions([]);
            setQuizComplete(false);
          };

          const getOptionClass = (index) => {
            let baseClass = "p-4 mb-3 rounded-lg border-2 cursor-pointer transition-all ";
            
            if (!showRationale) {
              if (selectedAnswer === index) {
                return baseClass + "border-blue-500 bg-blue-50";
              }
              return baseClass + "border-gray-300 hover:border-blue-300 hover:bg-gray-50";
            } else {
              if (index === question.correctAnswer) {
                return baseClass + "border-green-500 bg-green-50";
              }
              if (selectedAnswer === index && index !== question.correctAnswer) {
                return baseClass + "border-red-500 bg-red-50";
              }
              return baseClass + "border-gray-300 bg-gray-50";
            }
          };

          if (quizComplete) {
            const percentage = Math.round((score / questionsData.length) * 100);
            
            return (
              <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
                <div className="max-w-2xl mx-auto">
                  <div className="bg-white rounded-xl shadow-lg p-8 text-center">
                    <div className="flex justify-center mb-4"><Trophy /></div>
                    <h1 className="text-3xl font-bold mb-4 text-gray-800">Quiz Complete!</h1>
                    <div className="mb-6">
                      <p className="text-6xl font-bold text-indigo-600 mb-2">{percentage}%</p>
                      <p className="text-xl text-gray-600">
                        You scored {score} out of {questionsData.length}
                      </p>
                    </div>
                    
                    <div className="mb-6 p-4 bg-gray-50 rounded-lg">
                      <h3 className="font-semibold mb-3 text-gray-700">Results Summary:</h3>
                      <div className="space-y-2">
                        {answeredQuestions.map((answer, idx) => (
                          <div key={idx} className="flex items-center justify-between">
                            <span className="text-gray-600">Question {answer.questionId}</span>
                            <div className="flex items-center">
                              {answer.correct ? <CheckCircle /> : <XCircle />}
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                    
                    <button
                      onClick={handleRestart}
                      className="bg-indigo-600 text-white px-8 py-3 rounded-lg hover:bg-indigo-700 transition-colors inline-flex items-center gap-2"
                    >
                      <RotateCcw />
                      Start Over
                    </button>
                  </div>
                </div>
              </div>
            );
          }

          return (
            <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
              <div className="max-w-4xl mx-auto">
                <div className="bg-white rounded-xl shadow-lg p-6 mb-6">
                  <div className="flex items-center justify-between mb-4">
                    <h1 className="text-2xl font-bold text-gray-800 flex items-center gap-2">
                      <BookOpen />
                      2025 ITE Quiz (Questions 1-10)
                    </h1>
                    <div className="text-right">
                      <p className="text-sm text-gray-600">Score</p>
                      <p className="text-2xl font-bold text-indigo-600">{score}/{answeredQuestions.length}</p>
                    </div>
                  </div>
                  
                  <div className="flex items-center gap-2 mb-2">
                    <div className="flex-1 bg-gray-200 rounded-full h-2">
                      <div 
                        className="bg-indigo-600 h-2 rounded-full transition-all duration-300"
                        style={{ width: `${((currentQuestion + 1) / questionsData.length) * 100}%` }}
                      />
                    </div>
                    <span className="text-sm text-gray-600 whitespace-nowrap">
                      {currentQuestion + 1} / {questionsData.length}
                    </span>
                  </div>
                </div>

                <div className="bg-white rounded-xl shadow-lg p-6 mb-6">
                  <div className="mb-6">
                    <p className="text-sm text-gray-500 mb-2">Question {question.id}</p>
                    <p className="text-lg text-gray-800 leading-relaxed">{question.question}</p>
                  </div>

                  <div className="space-y-3 mb-6">
                    {question.options.map((option, index) => (
                      <div
                        key={index}
                        onClick={() => handleAnswerSelect(index)}
                        className={getOptionClass(index)}
                      >
                        <div className="flex items-start gap-3">
                          <span className="text-gray-700 flex-1">{option}</span>
                          {showRationale && index === question.correctAnswer && (
                            <div className="flex-shrink-0 mt-1"><CheckCircle /></div>
                          )}
                          {showRationale && selectedAnswer === index && index !== question.correctAnswer && (
                            <div className="flex-shrink-0 mt-1"><XCircle /></div>
                          )}
                        </div>
                      </div>
                    ))}
                  </div>

                  {showRationale && (
                    <div className="bg-blue-50 border-l-4 border-blue-500 p-4 mb-6">
                      <h3 className="font-semibold text-blue-900 mb-2">Explanation:</h3>
                      <p className="text-blue-800 leading-relaxed">{question.rationale}</p>
                    </div>
                  )}

                  <div className="flex gap-3">
                    <button
                      onClick={handlePrevious}
                      disabled={currentQuestion === 0}
                      className="px-4 py-2 rounded-lg border-2 border-gray-300 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition-colors flex items-center gap-2"
                    >
                      <ChevronLeft />
                      Previous
                    </button>
                    
                    {!showRationale ? (
                      <button
                        onClick={handleSubmit}
                        disabled={selectedAnswer === null}
                        className="flex-1 bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                      >
                        Submit Answer
                      </button>
                    ) : (
                      <button
                        onClick={handleNext}
                        className="flex-1 bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 transition-colors flex items-center justify-center gap-2"
                      >
                        {currentQuestion < questionsData.length - 1 ? (
                          <>
                            Next Question
                            <ChevronRight />
                          </>
                        ) : (
                          <>
                            Finish Quiz
                            <CheckCircle />
                          </>
                        )}
                      </button>
                    )}
                  </div>
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ITEQuizApp />);
    </script>
</body>
</html>
